# Fixture: aggregation case — a clean caller here, a stale caller in
# claude-ci-auto-fix.yml, and an unknown-contract caller in claude-unknown.yml,
# all in the same project.
name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    uses: CodySwannGT/lisa/.github/workflows/reusable-claude.yml@main
    with:
      event_name: ${{ github.event_name }}
      author_association: ${{ github.event.comment.author_association || '' }}
      comment_body: ${{ github.event.comment.body || '' }}
      review_body: ${{ github.event.review.body || '' }}
      issue_body: ${{ github.event.issue.body || '' }}
      issue_title: ${{ github.event.issue.title || '' }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
