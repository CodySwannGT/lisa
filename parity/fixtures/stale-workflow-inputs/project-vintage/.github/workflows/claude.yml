# Fixture: an early-generation ("vintage") caller that still passes
# `package_manager`, an input the reusable workflow has never declared
# (see issue #1423). GitHub hard-fails this at startup in the real world;
# this fixture reproduces the caller shape so the detector can catch it.
name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    uses: CodySwannGT/lisa/.github/workflows/reusable-claude.yml@main
    with:
      event_name: ${{ github.event_name }}
      author_association: ${{ github.event.comment.author_association || '' }}
      comment_body: ${{ github.event.comment.body || '' }}
      package_manager: 'bun'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
