# Stamp Codex-authored commits with an attribution trailer so the commit-msg
# hook's AI co-authorship check passes (mirrors Claude Code's attribution.commit).
# Emits: "Co-authored-by: Codex <noreply@openai.com>". Requires features.codex_git_commit.
commit_attribution = "Codex <noreply@openai.com>"

[features]
codex_hooks = true
codex_git_commit = true

[mcp_servers.linear-server]
url = "https://mcp.linear.app/mcp"

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
BASH_DEFAULT_TIMEOUT_MS = "1800000"
BASH_MAX_TIMEOUT_MS = "7200000"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
CLAUDE_DEBUG = "0"
ENABLE_LSP_TOOL = "1"
