# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.
# -----------------------------------------------------------------------------
# Rails Quality Checks Workflow (Reusable)
# -----------------------------------------------------------------------------
# Runs quality checks for Rails projects including:
# - Linting (RuboCop)
# - Security scanning (Brakeman, Bundler Audit)
# - Tests (RSpec with PostgreSQL or MySQL)
# - Code quality (Reek, Flog, Flay)
# - Secret detection (GitGuardian)
# - AST pattern scanning (ast-grep)
# - License compliance (FOSSA)
# - DAST scanning (OWASP ZAP)
#
# Example usage in another workflow:
# ```yaml
# quality:
#   uses: ./.github/workflows/quality-rails.yml
#   with:
#     database_type: 'postgres'
#     database_name: 'test'
#     skip_jobs: 'code_quality,secret_scanning'
#     zap_target_url: 'http://localhost:3000'
#   secrets:
#     GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
#     FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
# ```

name: 🔍 Rails Quality Checks

on:
  workflow_call:
    inputs:
      database_type:
        description: 'Database type to use for tests (postgres or mysql)'
        required: false
        type: string
        default: 'postgres'
      database_name:
        description: 'Database name for the test database'
        required: false
        type: string
        default: 'test'
      skip_jobs:
        description: 'Comma-separated list of jobs to skip (lint, security, test, mutation, code_quality, secret_scanning, sg_scan, learnings_budget, threshold_ratchet, license_compliance, zap_baseline)'
        required: false
        type: string
        default: ''
      zap_target_url:
        description: 'Target URL for OWASP ZAP baseline scan (leave empty to skip ZAP)'
        required: false
        type: string
        default: ''
      zap_rules_file:
        description: 'Path to ZAP rules configuration file'
        required: false
        type: string
        default: '.zap/baseline.conf'
    secrets:
      GITGUARDIAN_API_KEY:
        required: false
      FOSSA_API_KEY:
        required: false

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',lint,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: 🔍 Run RuboCop
        run: bundle exec rubocop --format github

  # Threshold ratchet: quality thresholds (simplecov minimums, rubocop Metrics
  # maximums) may tighten, never weaken. Same deterministic comparator as the
  # agent-time hooks and the lefthook pre-commit layer; this is the
  # non-bypassable layer. Human-approved exceptions live in .lisa.config.json
  # (thresholdRatchet.allow) and are honored only once merged into the base.
  threshold_ratchet:
    name: 📐 Threshold Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',threshold_ratchet,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          # fetch-depth 0 brings all branches, so the base ref is available
          # without a credentialed fetch later in the job.
          fetch-depth: 0
          persist-credentials: false

      - name: 📐 Compare thresholds against merge-base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -z "$BASE_REF" ]; then
            echo "Not a pull request — nothing to ratchet against."
            exit 0
          fi
          if [ ! -f scripts/check-threshold-ratchet.mjs ]; then
            echo "scripts/check-threshold-ratchet.mjs not present — project not yet on the ratchet template; skipping."
            exit 0
          fi
          if ! git rev-parse --verify "origin/$BASE_REF" >/dev/null 2>&1; then
            echo "Base ref origin/$BASE_REF is not available in this checkout — cannot evaluate the ratchet."
            exit 1
          fi
          node scripts/check-threshold-ratchet.mjs --base "origin/$BASE_REF"

  security:
    name: Security
    runs-on: ubuntu-latest
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',security,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: 🔒 Run Brakeman
        run: bundle exec brakeman --no-pager --quiet

      - name: 🔒 Run Bundler Audit
        run: bundle exec bundler-audit check --update

  test-postgres:
    name: Test (PostgreSQL)
    runs-on: ubuntu-latest
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',test,') && inputs.database_type == 'postgres' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ${{ inputs.database_name }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/${{ inputs.database_name }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: 🗄️ Prepare database
        run: bin/rails db:prepare

      - name: 🧪 Run tests
        run: bundle exec rspec

  test-mysql:
    name: Test (MySQL)
    runs-on: ubuntu-latest
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',test,') && inputs.database_type == 'mysql' }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ${{ inputs.database_name }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      PRIMARY_DB_HOST: 127.0.0.1
      DATABASE_NAME: ${{ inputs.database_name }}
      DATABASE_PASSWORD: password
      DATABASE_USER: root
      DATABASE_PORT: 3306
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: 🗄️ Prepare database
        run: bin/rails db:prepare

      - name: 🧪 Run tests
        run: bundle exec rspec

  mutation:
    name: 🧬 Mutation Testing Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Diff-only mutation gate. Self-skips instantly when disabled
    # (mutation.gate.yml: enabled: false). PostgreSQL-based; MySQL projects can
    # adapt the service block or skip via skip_jobs: mutation.
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',mutation,') && inputs.database_type == 'postgres' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ${{ inputs.database_name }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/${{ inputs.database_name }}
      # Diff against the PR base branch (falls back to 'main' outside PRs).
      MUTATION_SINCE: ${{ github.base_ref || 'main' }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history so the gate can diff changed files against the PR base.
          fetch-depth: 0

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: 🗄️ Prepare database
        run: bin/rails db:prepare

      - name: 🧬 Run mutation-testing gate (diff-only, self-skips when disabled)
        run: |
          if [ -f scripts/lisa-mutation.sh ]; then
            bash scripts/lisa-mutation.sh
          else
            echo "Skipping mutation gate - scripts/lisa-mutation.sh not found"
          fi

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',code_quality,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: 🔍 Run Reek
        run: bundle exec reek app/ lib/

      - name: 🔍 Run Flog
        run: bundle exec flog --all --group app/ lib/

      - name: 🔍 Run Flay
        run: bundle exec flay app/ lib/

  secret_scanning:
    name: 🔐 GitGuardian Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',secret_scanning,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔍 Check for GitGuardian API key
        id: check_gitguardian
        run: |
          if [[ -z "${GITGUARDIAN_API_KEY// }" ]]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ GITGUARDIAN_API_KEY is not configured"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "✅ GITGUARDIAN_API_KEY is available"
          fi
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

      - name: 🔐 GitGuardian scan
        if: steps.check_gitguardian.outputs.has_token == 'true'
        shell: bash
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          python -m pip install --user 'ggshield==1.50.3'
          export PATH="$HOME/.local/bin:$PATH"

          set +e
          ggshield secret scan ci 2>&1 | tee ggshield.log
          scan_status=${PIPESTATUS[0]}
          set -e

          if [ "$scan_status" -eq 0 ]; then
            exit 0
          fi

          if grep -qiE 'no more API calls available|quota.*exhaust|exhaust.*quota|quota.*exceed|rate limit' ggshield.log; then
            echo "::warning::GitGuardian secret detection skipped because API quota is exhausted"
            echo "GitGuardian quota exhaustion is treated as non-blocking; real secret findings still fail this job."
            exit 0
          fi

          exit "$scan_status"

      - name: 🔐 GitGuardian Scan Skipped
        if: steps.check_gitguardian.outputs.has_token != 'true'
        run: |
          echo "::warning::GitGuardian secret detection skipped - GITGUARDIAN_API_KEY not configured"
          echo "To enable secret detection, add GITGUARDIAN_API_KEY to your repository secrets"

  sg_scan:
    name: 🔎 AST Grep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',sg_scan,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Install ast-grep
        run: npm install -g @ast-grep/cli@0.40.4

      - name: 🔍 Check for sgconfig.yml
        id: check_config
        run: |
          if [ -f "sgconfig.yml" ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔍 Check for ast-grep rules
        id: check_rules
        if: steps.check_config.outputs.has_config == 'true'
        run: |
          RULES_DIR="ast-grep/rules"
          if [ -d "$RULES_DIR" ]; then
            RULE_COUNT=$(find "$RULES_DIR" -name "*.yml" -o -name "*.yaml" 2>/dev/null | grep -cv ".gitkeep")
            if [ "$RULE_COUNT" -gt 0 ]; then
              echo "has_rules=true" >> "$GITHUB_OUTPUT"
              echo "rule_count=$RULE_COUNT" >> "$GITHUB_OUTPUT"
            else
              echo "has_rules=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_rules=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔎 Run ast-grep scan
        if: steps.check_config.outputs.has_config == 'true' && steps.check_rules.outputs.has_rules == 'true'
        run: sg scan

      - name: ⏭️ AST Grep Skipped (no config)
        if: steps.check_config.outputs.has_config != 'true'
        run: |
          echo "::warning::ast-grep scan skipped - no sgconfig.yml found"
          echo "To enable ast-grep scanning, add sgconfig.yml to your project root"

      - name: ⏭️ AST Grep Skipped (no rules)
        if: steps.check_config.outputs.has_config == 'true' && steps.check_rules.outputs.has_rules != 'true'
        run: |
          echo "::warning::ast-grep scan skipped - no rules defined in ast-grep/rules/"
          echo "To enable ast-grep scanning, add rule YAML files to ast-grep/rules/"

  learnings_budget:
    name: 📚 Learnings Budget
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Hard budget gate for the project learnings surface (per-entry length cap,
    # entry count, and token ceiling). The learnings file is loaded eagerly by
    # every coding agent in every session, so an over-budget file degrades them
    # all — this job fails the build when it grows too large. The check reads the
    # learnings file resolved from .lisa.config.json; a Rails project that has
    # never recorded a learning has no file and passes silently.
    # Read-only: this job needs no write scopes, so it drops the workflow's
    # inherited checks:write / pull-requests:write.
    permissions:
      contents: read
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',learnings_budget,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      # Pinned for reproducibility: the gate must not change behavior under
      # unchanged host commits. Bump deliberately when the learnings contract
      # changes. (Publishing npm and pushing this @main workflow are the same
      # trust domain; the pin buys determinism, not a trust boundary.) The pin
      # must be >= 2.243.0: earlier CLIs lack the relocated .lisa/ resolver or
      # this subcommand, and pre-2.237.0 CLIs self-skip in non-interactive
      # environments with exit 0, silently voiding the gate — which is why the
      # marker grep below asserts the check actually ran.
      - name: 📚 Check learnings budget
        run: |
          set -o pipefail
          bunx @codyswann/lisa@2.297.0 check-learnings-budget | tee learnings-budget.out
          grep -qE "learnings budget passed|no learnings file" learnings-budget.out

  license_compliance:
    name: 📜 FOSSA License Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',license_compliance,') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔍 Check for FOSSA API key
        id: check_fossa
        run: |
          if [[ -z "${FOSSA_API_KEY// }" ]]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ FOSSA_API_KEY is not configured"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "✅ FOSSA_API_KEY is available"
          fi
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

      - name: 📜 Run FOSSA license scan
        if: steps.check_fossa.outputs.has_token == 'true'
        uses: fossas/fossa-action@v1.8.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: 📜 FOSSA Scan Skipped
        if: steps.check_fossa.outputs.has_token != 'true'
        run: |
          echo "::warning::FOSSA license compliance check skipped - FOSSA_API_KEY not configured"
          echo "To enable license compliance checking, add FOSSA_API_KEY to your repository secrets"

  zap_baseline:
    name: 🕷️ OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !contains(format(',{0},', inputs.skip_jobs), ',zap_baseline,') && inputs.zap_target_url != '' }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔍 Check for ZAP rules file
        id: check_rules
        run: |
          if [ -f "${{ inputs.zap_rules_file }}" ]; then
            echo "has_rules=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rules=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🕷️ Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.zap_target_url }}
          rules_file_name: ${{ steps.check_rules.outputs.has_rules == 'true' && inputs.zap_rules_file || '' }}
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zap-report'

      - name: 📤 Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-baseline-report-${{ github.run_id }}
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
          retention-days: 14
