# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Claude Nightly Test Coverage (Reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '22.21.1'
        type: string
      package_manager:
        description: 'Package manager to use (npm, yarn, or bun)'
        required: false
        default: 'npm'
        type: string
      coverage_increment:
        description: 'Percentage points to increase coverage thresholds per run (lower for large gaps)'
        required: false
        default: 5
        type: number
      auto_merge:
        description: 'Enable auto-merge on created PRs (requires repo auto-merge setting enabled)'
        required: false
        default: true
        type: boolean
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  improve-coverage:
    if: vars.ENABLE_CLAUDE_NIGHTLY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Read plugins from project settings
        id: plugins
        run: |
          if [ -f .claude/settings.json ]; then
            MARKETPLACES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source | if .source == "github" then "https://github.com/\(.repo).git" else empty end' .claude/settings.json 2>/dev/null || echo "")
            MARKETPLACE_NAMES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source.repo // .key | split("/") | last' .claude/settings.json 2>/dev/null || echo "")
            PLUGINS=$(jq -r '(.enabledPlugins // {}) | to_entries[] | select(.value == true) | .key' .claude/settings.json 2>/dev/null | while IFS= read -r plugin; do
              mk="${plugin##*@}"
              if echo "$MARKETPLACE_NAMES" | grep -qx "$mk"; then
                echo "$plugin"
              fi
            done)
          else
            MARKETPLACES=""
            PLUGINS=""
          fi
          {
            echo "marketplaces<<PLUGINS_EOF"
            echo "$MARKETPLACES"
            echo "PLUGINS_EOF"
            echo "plugins<<PLUGINS_EOF"
            echo "$PLUGINS"
            echo "PLUGINS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup Bun
        if: inputs.package_manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package_manager }}" = "npm" ]; then
            npm ci
          elif [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "${{ inputs.package_manager }}" = "bun" ]; then
            bun install --frozen-lockfile
          fi

      - name: Check for existing PR
        id: check-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = pulls.data.find(pr =>
              pr.head.ref.startsWith('claude/nightly-test-coverage-')
            );
            core.setOutput('has_existing_pr', existing ? 'true' : 'false');
            if (existing) {
              console.log(`Found existing PR: #${existing.number} - ${existing.title}`);
            }

      - name: Read coverage thresholds
        if: steps.check-pr.outputs.has_existing_pr != 'true'
        id: thresholds
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const vitestPath = 'vitest.thresholds.json';
            const jestPath = 'jest.thresholds.json';
            const path = fs.existsSync(vitestPath) ? vitestPath : jestPath;

            if (!fs.existsSync(path)) {
              core.setOutput('all_at_target', 'true');
              console.log('No thresholds file found (checked vitest.thresholds.json and jest.thresholds.json), skipping.');
              return;
            }

            core.setOutput('thresholds_file', path);
            console.log(`Detected thresholds file: ${path}`);
            const thresholds = JSON.parse(fs.readFileSync(path, 'utf8'));
            const global = thresholds.global || {};
            const metrics = ['statements', 'branches', 'functions', 'lines'];
            const target = 90;
            const increment = ${{ inputs.coverage_increment }};

            const current = {};
            const proposed = {};
            const bumps = [];

            for (const metric of metrics) {
              const value = global[metric] ?? 0;
              current[metric] = value;
              if (value < target) {
                const newValue = Math.min(value + increment, target);
                proposed[metric] = newValue;
                bumps.push(`${metric} ${value}% -> ${newValue}%`);
              } else {
                proposed[metric] = value;
              }
            }

            if (bumps.length === 0) {
              core.setOutput('all_at_target', 'true');
              console.log('All coverage metrics are already at or above 90%. Skipping.');
              return;
            }

            core.setOutput('all_at_target', 'false');
            core.setOutput('current', JSON.stringify(current));
            core.setOutput('proposed', JSON.stringify(proposed));
            core.setOutput('bumps', bumps.join(', '));
            console.log(`Current thresholds: ${JSON.stringify(current)}`);
            console.log(`Proposed thresholds: ${JSON.stringify(proposed)}`);
            console.log(`Metrics to bump: ${bumps.join(', ')}`);

      - name: Run Claude Code to improve coverage
        id: claude
        if: |
          steps.check-pr.outputs.has_existing_pr != 'true' &&
          steps.thresholds.outputs.all_at_target != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          plugin_marketplaces: ${{ steps.plugins.outputs.marketplaces }}
          plugins: ${{ steps.plugins.outputs.plugins }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          branch_prefix: claude/nightly-test-coverage-
          prompt: |
            Use the /lisa:nightly-add-test-coverage skill to increase test coverage.

            Thresholds file: ${{ steps.thresholds.outputs.thresholds_file }}
            Current coverage thresholds: ${{ steps.thresholds.outputs.current }}
            Proposed new thresholds (each metric increased by ${{ inputs.coverage_increment }}%, capped at 90%): ${{ steps.thresholds.outputs.proposed }}
            Metrics being bumped: ${{ steps.thresholds.outputs.bumps }}
          claude_args: |
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,Bash(*),Skill(*)"
            --max-turns 75
            --system-prompt "You are improving test coverage to meet higher thresholds. Read CLAUDE.md for project rules. Follow TDD practices. Write tests that verify behavior, not implementation details. CRITICAL: Always run test:cov FIRST to identify coverage gaps before reading any source files."

      - name: Trigger CodeRabbit review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch --show-current)
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "No feature branch detected — skipping CodeRabbit trigger."
            exit 0
          fi
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "@coderabbitai review"
            echo "Triggered CodeRabbit review on PR #$PR_NUMBER"
          fi

      - name: Enable auto-merge
        if: inputs.auto_merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch --show-current)
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "No feature branch detected — skipping auto-merge."
            exit 0
          fi
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh pr merge "$PR_URL" --auto --squash && echo "Auto-merge enabled for $PR_URL" || echo "Auto-merge not available for this repo — skipping."
          else
            echo "No open PR found for branch $BRANCH."
          fi
