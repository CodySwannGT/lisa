# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Claude Nightly Test Coverage (Reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '22.21.1'
        type: string
      package_manager:
        description: 'Package manager to use (npm, yarn, or bun)'
        required: false
        default: 'npm'
        type: string
      coverage_increment:
        description: 'Percentage points to increase coverage thresholds per run (lower for large gaps)'
        required: false
        default: 5
        type: number
      auto_merge:
        description: 'Enable auto-merge on created PRs (requires repo auto-merge setting enabled)'
        required: false
        default: true
        type: boolean
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  improve-coverage:
    if: vars.ENABLE_CLAUDE_NIGHTLY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup Bun
        if: inputs.package_manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package_manager }}" = "npm" ]; then
            npm ci
          elif [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "${{ inputs.package_manager }}" = "bun" ]; then
            bun install --frozen-lockfile
          fi

      - name: Check for existing PR
        id: check-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = pulls.data.find(pr =>
              pr.head.ref.startsWith('claude/nightly-test-coverage-')
            );
            core.setOutput('has_existing_pr', existing ? 'true' : 'false');
            if (existing) {
              console.log(`Found existing PR: #${existing.number} - ${existing.title}`);
            }

      - name: Read coverage thresholds
        if: steps.check-pr.outputs.has_existing_pr != 'true'
        id: thresholds
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'jest.thresholds.json';

            if (!fs.existsSync(path)) {
              core.setOutput('all_at_target', 'true');
              console.log('jest.thresholds.json not found, skipping.');
              return;
            }

            const thresholds = JSON.parse(fs.readFileSync(path, 'utf8'));
            const global = thresholds.global || {};
            const metrics = ['statements', 'branches', 'functions', 'lines'];
            const target = 90;
            const increment = ${{ inputs.coverage_increment }};

            const current = {};
            const proposed = {};
            const bumps = [];

            for (const metric of metrics) {
              const value = global[metric] ?? 0;
              current[metric] = value;
              if (value < target) {
                const newValue = Math.min(value + increment, target);
                proposed[metric] = newValue;
                bumps.push(`${metric} ${value}% -> ${newValue}%`);
              } else {
                proposed[metric] = value;
              }
            }

            if (bumps.length === 0) {
              core.setOutput('all_at_target', 'true');
              console.log('All coverage metrics are already at or above 90%. Skipping.');
              return;
            }

            core.setOutput('all_at_target', 'false');
            core.setOutput('current', JSON.stringify(current));
            core.setOutput('proposed', JSON.stringify(proposed));
            core.setOutput('bumps', bumps.join(', '));
            console.log(`Current thresholds: ${JSON.stringify(current)}`);
            console.log(`Proposed thresholds: ${JSON.stringify(proposed)}`);
            console.log(`Metrics to bump: ${bumps.join(', ')}`);

      - name: Run Claude Code to improve coverage
        id: claude
        if: |
          steps.check-pr.outputs.has_existing_pr != 'true' &&
          steps.thresholds.outputs.all_at_target != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          branch_prefix: claude/nightly-test-coverage-
          prompt: |
            Increase test coverage thresholds for this project.

            Current coverage thresholds in jest.thresholds.json:
            ${{ steps.thresholds.outputs.current }}

            Proposed new thresholds (each metric increased by ${{ inputs.coverage_increment }}%, capped at 90%):
            ${{ steps.thresholds.outputs.proposed }}

            Metrics being bumped: ${{ steps.thresholds.outputs.bumps }}

            Instructions:
            1. Read CLAUDE.md and package.json for project conventions
            2. FIRST, run `bun run test:cov` to get the coverage report — this tells you exactly which files have low coverage and where the gaps are. Do NOT read source files before this step.
            3. Parse the coverage output to identify the specific files and lines with the lowest coverage. Prioritize files with the most uncovered lines/branches.
            4. ONLY THEN read the specific source files that need tests — read only the uncovered sections, not entire files. Use the coverage report line numbers to target your reads.
            5. Write new tests to increase coverage enough to meet the proposed thresholds. Focus on the metrics being bumped — write tests that cover untested branches, statements, functions, and lines.
            6. Run `bun run test:cov` to verify the new thresholds pass
            7. Update jest.thresholds.json with the proposed new threshold values
            8. Run `bun run test:cov` again to confirm the updated thresholds pass
            9. Commit all changes (new tests + updated jest.thresholds.json) with conventional commit messages
            10. Create a PR with `gh pr create` with a title like "Increase test coverage: ${{ steps.thresholds.outputs.bumps }}" summarizing coverage improvements
            11. SECURITY AUDIT FAILURES: If git push fails because the pre-push hook reports security vulnerabilities (GHSA advisories):
                a. Note the GHSA ID(s), affected package(s), and advisory URL from the error output
                b. Check the advisory URL to determine if a patched version of the vulnerable package exists
                c. If a patched version exists, add a resolution/override in package.json to force the patched version (add to both "resolutions" and "overrides" sections), then run the package manager install command to regenerate the lockfile, commit the changes, and retry the push
                d. If no patched version exists and the vulnerability is safe for this project (e.g., transitive dependency with no untrusted input, devDeps only, or build tool only), add an exclusion entry to audit.ignore.local.json with the format: {"id": "GHSA-xxx", "package": "pkg-name", "reason": "why this is safe for this project"}, then commit and retry the push
                e. Never use --no-verify to bypass the security audit
          claude_args: |
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,Bash(*),Skill(*)"
            --max-turns 40
            --system-prompt "You are improving test coverage to meet higher thresholds. Read CLAUDE.md for project rules. Follow TDD practices. Write tests that verify behavior, not implementation details. Include edge cases and error paths. You must update jest.thresholds.json with the new values after tests pass. CRITICAL: Always run test:cov FIRST to identify coverage gaps before reading any source files. Use the coverage report to target exactly which files and lines need tests. Never explore the codebase broadly — only read the specific uncovered code identified by the coverage report."

      - name: Trigger CodeRabbit review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch --show-current)
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "No feature branch detected — skipping CodeRabbit trigger."
            exit 0
          fi
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "@coderabbitai review"
            echo "Triggered CodeRabbit review on PR #$PR_NUMBER"
          fi

      - name: Enable auto-merge
        if: inputs.auto_merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch --show-current)
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "No feature branch detected — skipping auto-merge."
            exit 0
          fi
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh pr merge "$PR_URL" --auto --squash && echo "Auto-merge enabled for $PR_URL" || echo "Auto-merge not available for this repo — skipping."
          else
            echo "No open PR found for branch $BRANCH."
          fi
