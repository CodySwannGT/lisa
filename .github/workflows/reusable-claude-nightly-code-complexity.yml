# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Claude Nightly Code Complexity (Reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '22.21.1'
        type: string
      package_manager:
        description: 'Package manager to use (npm, yarn, or bun)'
        required: false
        default: 'npm'
        type: string
      auto_merge:
        description: 'Enable auto-merge on created PRs (requires repo auto-merge setting enabled)'
        required: false
        default: true
        type: boolean
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  reduce-complexity:
    if: vars.ENABLE_CLAUDE_NIGHTLY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup Bun
        if: inputs.package_manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package_manager }}" = "npm" ]; then
            npm ci
          elif [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "${{ inputs.package_manager }}" = "bun" ]; then
            bun install --frozen-lockfile
          fi

      - name: Check for existing PR
        id: check-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = pulls.data.find(pr =>
              pr.head.ref.startsWith('claude/nightly-code-complexity-')
            );
            core.setOutput('has_existing_pr', existing ? 'true' : 'false');
            if (existing) {
              console.log(`Found existing PR: #${existing.number} - ${existing.title}`);
            }

      - name: Read complexity thresholds
        if: steps.check-pr.outputs.has_existing_pr != 'true'
        id: thresholds
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'eslint.thresholds.json';

            if (!fs.existsSync(path)) {
              core.setOutput('all_at_target', 'true');
              console.log('eslint.thresholds.json not found, skipping.');
              return;
            }

            const thresholds = JSON.parse(fs.readFileSync(path, 'utf8'));
            const metrics = [
              { key: 'cognitiveComplexity', target: 15, decrement: 2 },
              { key: 'maxLinesPerFunction', target: 30, decrement: 5 },
            ];

            const current = {};
            const proposed = {};
            const reductions = [];

            for (const { key, target, decrement } of metrics) {
              const value = thresholds[key];
              if (value === undefined) {
                continue;
              }
              current[key] = value;
              if (value > target) {
                const newValue = Math.max(value - decrement, target);
                proposed[key] = newValue;
                reductions.push(`${key} ${value} -> ${newValue}`);
              } else {
                proposed[key] = value;
              }
            }

            if (reductions.length === 0) {
              core.setOutput('all_at_target', 'true');
              console.log('All complexity metrics are already at or below targets. Skipping.');
              return;
            }

            core.setOutput('all_at_target', 'false');
            core.setOutput('current', JSON.stringify(current));
            core.setOutput('proposed', JSON.stringify(proposed));
            core.setOutput('reductions', reductions.join(', '));
            console.log(`Current thresholds: ${JSON.stringify(current)}`);
            console.log(`Proposed thresholds: ${JSON.stringify(proposed)}`);
            console.log(`Metrics to reduce: ${reductions.join(', ')}`);

      - name: Run Claude Code to reduce complexity
        id: claude
        if: |
          steps.check-pr.outputs.has_existing_pr != 'true' &&
          steps.thresholds.outputs.all_at_target != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          branch_prefix: claude/nightly-code-complexity-
          prompt: |
            Use the /lisa:nightly-lower-code-complexity skill to reduce code complexity.

            Current complexity thresholds in eslint.thresholds.json: ${{ steps.thresholds.outputs.current }}
            Proposed new thresholds (each metric decreased toward target minimums): ${{ steps.thresholds.outputs.proposed }}
            Metrics being reduced: ${{ steps.thresholds.outputs.reductions }}
          claude_args: |
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,Bash(*),Skill(*)"
            --max-turns 40
            --system-prompt "You are reducing code complexity to meet stricter ESLint thresholds. Read CLAUDE.md for project rules. Do NOT modify the maxLines threshold. IMPORTANT: Always use the project's package manager scripts (e.g. bun run lint, bun run test) instead of running binaries from node_modules/.bin/ directly."

      - name: Trigger CodeRabbit review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch --show-current)
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "No feature branch detected — skipping CodeRabbit trigger."
            exit 0
          fi
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "@coderabbitai review"
            echo "Triggered CodeRabbit review on PR #$PR_NUMBER"
          fi

      - name: Enable auto-merge
        if: inputs.auto_merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch --show-current)
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "No feature branch detected — skipping auto-merge."
            exit 0
          fi
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh pr merge "$PR_URL" --auto --squash && echo "Auto-merge enabled for $PR_URL" || echo "Auto-merge not available for this repo — skipping."
          else
            echo "No open PR found for branch $BRANCH."
          fi
