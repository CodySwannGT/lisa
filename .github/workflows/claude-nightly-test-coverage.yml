name: Claude Nightly Test Coverage

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  improve-coverage:
    if: vars.ENABLE_CLAUDE_NIGHTLY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for existing PR
        id: check-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = pulls.data.find(pr =>
              pr.head.ref.startsWith('claude/nightly-') &&
              pr.title.toLowerCase().includes('test coverage')
            );
            core.setOutput('has_existing_pr', existing ? 'true' : 'false');
            if (existing) {
              console.log(`Found existing PR: #${existing.number} - ${existing.title}`);
            }

      - name: Run Claude Code to improve coverage
        if: steps.check-pr.outputs.has_existing_pr != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: claude/nightly-
          prompt: |
            Improve test coverage for this project.

            Instructions:
            1. Read CLAUDE.md and package.json for project conventions
            2. Run the test coverage report to identify coverage gaps
            3. Identify the 3-5 source files with the lowest coverage that would benefit most from new tests
            4. Write comprehensive tests for those files, covering happy paths, edge cases, and error paths
            5. Run the coverage report again to verify improvement
            6. Commit changes with conventional commit messages
            7. Create a PR with `gh pr create` summarizing coverage before/after for each file
          claude_args: |
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(bun:*),Bash(yarn:*),Bash(pnpm:*),Bash(gh:*)"
            --max-turns 30
            --system-prompt "You are improving test coverage. Read CLAUDE.md for project rules. Follow TDD practices. Write tests that verify behavior, not implementation details. Include edge cases and error paths."
