        uses: actions/checkout@v4

      - name: 🔍 Check for Snyk token
        id: check_snyk
        run: |
          if [[ -z "${SNYK_TOKEN// }" ]]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️ SNYK_TOKEN is not configured"
