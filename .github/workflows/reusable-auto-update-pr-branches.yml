# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Auto-update PR branches (Reusable)

on:
  workflow_call:
    inputs:
      event_name:
        description: 'The event that triggered the workflow'
        required: true
        type: string
      ref_name:
        description: 'The branch name that was pushed to'
        required: false
        type: string
        default: ''
      pr_base_ref:
        description: 'The base ref of the pull request'
        required: false
        type: string
        default: ''
      pr_number:
        description: 'The pull request number'
        required: false
        type: number
        default: 0
      repo_full_name:
        description: 'Full repository name (owner/repo)'
        required: true
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: 'Claude Code OAuth token for authenticating pushes that trigger downstream workflows'
        required: false
      TRIGGER_TOKEN:
        description: 'Optional token to use instead of GITHUB_TOKEN so pushes trigger downstream workflows'
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  autoupdate-on-push:
    name: Update open PRs targeting ${{ inputs.ref_name }}
    if: inputs.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch auto-update via repository_dispatch
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'auto-update-pr-branches',
              client_payload: {
                ref_name: '${{ inputs.ref_name }}',
                repo_full_name: '${{ inputs.repo_full_name }}',
              },
            });
            console.log('Dispatched auto-update-pr-branches event.');

  autoupdate-on-pr:
    name: Update PR branch against ${{ inputs.pr_base_ref }}
    if: inputs.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch auto-update via repository_dispatch
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'auto-update-pr-branch',
              client_payload: {
                pr_number: ${{ inputs.pr_number }},
                repo_full_name: '${{ inputs.repo_full_name }}',
              },
            });
            console.log('Dispatched auto-update-pr-branch event.');
