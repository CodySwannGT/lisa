# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Auto-update PR branches (Reusable)

on:
  workflow_call:
    inputs:
      event_name:
        description: 'The event that triggered the workflow'
        required: true
        type: string
      ref_name:
        description: 'The branch name that was pushed to'
        required: false
        type: string
        default: ''
      pr_base_ref:
        description: 'The base ref of the pull request'
        required: false
        type: string
        default: ''
      pr_number:
        description: 'The pull request number'
        required: false
        type: number
        default: 0
      repo_full_name:
        description: 'Full repository name (owner/repo)'
        required: true
        type: string
    secrets:
      TRIGGER_TOKEN:
        description: 'Optional token to use instead of GITHUB_TOKEN so pushes trigger downstream workflows'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate-on-push:
    name: Update open PRs targeting ${{ inputs.ref_name }}
    if: inputs.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Update all open PR branches
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_TOKEN || secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --repo "${{ inputs.repo_full_name }}" --base "${{ inputs.ref_name }}" --state open --json number --jq '.[].number')
          for pr in $prs; do
            echo "Updating PR #$pr..."
            gh api -X PUT "repos/${{ inputs.repo_full_name }}/pulls/$pr/update-branch" -f update_method=merge || echo "PR #$pr update failed or already up to date"
          done

  autoupdate-on-pr:
    name: Update PR branch against ${{ inputs.pr_base_ref }}
    if: inputs.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Update PR branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_TOKEN || secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh api -X PUT "repos/${{ inputs.repo_full_name }}/pulls/${{ inputs.pr_number }}/update-branch" -f update_method=merge
