# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.
# -----------------------------------------------------------------------------
# GitHub Issue Creation Workflow
# -----------------------------------------------------------------------------
# ⚠️ WARNING: THIS FILE IS AUTO-GENERATED. DO NOT EDIT MANUALLY! ⚠️
# Any changes may be overwritten by the generation process.
# This workflow creates a GitHub issue when another workflow fails.
# It deduplicates: if an open issue with the same title already exists, it
# comments the new run URL on that issue instead of filing a duplicate.
#
# In `mode: misconfiguration` it files a `lisa-misconfiguration` issue that
# names exactly which variables/secrets are missing for the tracker the
# project declared in .lisa.config.json, instead of a failure issue.
#
# Example usage in another workflow:
# ```yaml
# create_github_issue_on_failure:
#   if: failure()
#   uses: ./.github/workflows/create-github-issue-on-failure.yml
#   with:
#     workflow_name: 'My Workflow'
#     failed_job: 'build_and_test'
# ```

name: 🚨 GitHub Issue on Workflow Failure

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
        description: 'Name of the workflow that failed'
      failed_job:
        required: false
        type: string
        description: 'Name of the job that failed (optional)'
      mode:
        required: false
        type: string
        default: 'failure'
        description: "'failure' files a workflow-failure issue; 'misconfiguration' files a tracker-misconfiguration issue"
      misconfig_tracker:
        required: false
        type: string
        default: ''
        description: 'The tracker declared in .lisa.config.json (misconfiguration mode only)'
      misconfig_missing:
        required: false
        type: string
        default: ''
        description: 'Newline-separated list of missing variables/secrets (misconfiguration mode only)'
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '22.21.1'
        type: string
      package_manager:
        description: 'Package manager to use (npm, yarn, or bun)'
        required: false
        default: 'npm'
        type: string
      working_directory:
        description: 'Directory to run commands in (if not root)'
        required: false
        default: ''
        type: string
    secrets:
      PAT:
        required: false
        description: 'Personal Access Token (optional, falls back to GITHUB_TOKEN)'

# Concurrency is managed by the parent workflow that calls this one
# This avoids deadlocks between parent and child workflows

jobs:
  create_issue:
    name: 📝 Create GitHub Issue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          package-manager-cache: false
          node-version: ${{ inputs.node_version }}

      - name: 🔖 Create or Update Issue
        uses: actions/github-script@v8
        env:
          MISCONFIG_MISSING: ${{ inputs.misconfig_missing }}
        with:
          github-token: ${{ secrets.PAT || github.token }}
          script: |
            // Get repository and run information
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            // Get workflow information from inputs
            const workflowName = ${{ toJSON(inputs.workflow_name) }};
            const failedJob = ${{ toJSON(inputs.failed_job) }} || 'Unknown';
            const mode = ${{ toJSON(inputs.mode) }} || 'failure';
            const misconfigTracker = ${{ toJSON(inputs.misconfig_tracker) }};
            const misconfigMissing = (process.env.MISCONFIG_MISSING || '')
              .split('\n')
              .map(line => line.trim())
              .filter(Boolean);

            let title;
            let body;
            let labels;

            if (mode === 'misconfiguration') {
              // Deterministic title so repeated failures dedupe into one issue.
              title = `🚨 Lisa misconfiguration: CI failure tickets cannot reach tracker "${misconfigTracker}"`;
              labels = ['lisa-misconfiguration', 'automation'];
              body = `
            ## Tracker misconfiguration

            This project's \`.lisa.config.json\` says work items belong in **${misconfigTracker}**, but the automation that files CI failure tickets cannot reach ${misconfigTracker} from GitHub Actions. Until this is fixed, CI failures will be reported here instead of in ${misconfigTracker}.

            ### What is missing

            ${misconfigMissing.map(item => `- ${item}`).join('\n            ')}

            ### How to fix it

            Add the missing repository variables/secrets under **Settings → Secrets and variables → Actions** (or re-run the tracker setup: \`/lisa:setup:jira\`, \`/lisa:setup:linear\`). If a secret is already set on the repository, the calling workflow may not be passing it through — its \`secrets:\` block must map the token explicitly (see the claude-*-auto-fix caller templates).

            ### The failure that triggered this report

            - **Workflow**: ${workflowName}${failedJob !== 'Unknown' ? ` (job: **${failedJob}**)` : ''}
            - **Workflow Run**: [View Run Details](${runUrl})
            - **Commit**: ${context.sha}
            `;
            } else {
              // Create standardized issue title and body
              title = `🚨 Workflow Failure: ${workflowName}${failedJob !== 'Unknown' ? ` - ${failedJob}` : ''}`;
              labels = ['bug', 'automation', 'ci-failure'];
              body = `
            ## Workflow Failure

            The "${workflowName}" workflow has failed${failedJob !== 'Unknown' ? ` in job: **${failedJob}**` : ''}.

            ### Details
            - **Workflow Run**: [View Run Details](${runUrl})
            - **Commit**: ${context.sha}
            - **Commit Message**: ${context.payload.head_commit ? context.payload.head_commit.message : 'N/A'}
            - **Triggered by**: ${context.actor}
            - **Failed at**: ${new Date().toISOString()}

            Please investigate the workflow logs for more details on the failure.
            `;
            }

            // Dedupe: comment on an existing open issue with the same title
            // instead of filing a duplicate. Titles are deterministic per
            // workflow+job, so one persistent breakage stays one issue.
            const { data: search } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title ${JSON.stringify(title)}`,
              per_page: 10,
            });
            const existing = search.items.find(issue => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Recurred: [new failing run](${runUrl}) at ${new Date().toISOString()} (commit ${context.sha}).`,
              });
              console.log(`Deduped into existing issue #${existing.number}: ${runUrl}`);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels,
              });
              console.log(`Issue created for workflow failure: ${runUrl}`);
            }
