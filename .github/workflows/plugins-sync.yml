name: 🧩 Plugins Sync

# Guards against editing the generated plugin artifacts (plugins/lisa,
# plugins/lisa-*) directly. They are built from plugins/src by
# `bun run build:plugins`, which does `rm -rf plugins/lisa && cp -r plugins/src`,
# so an artifact-only edit is silently discarded on the next build. This check
# rebuilds from source and asserts the committed artifacts match.
#
# NOTE: This workflow is repo-specific to the Lisa monorepo and is NOT a Lisa
# template — do not move it under plugins/src or the create-only template sets.

on:
  pull_request:
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
      - 'scripts/build-plugins.sh'
      - 'scripts/generate-agy-plugin-artifacts.mjs'
      - 'scripts/generate-codex-plugin-artifacts.mjs'
      - 'scripts/generate-copilot-plugin-artifacts.mjs'
      - 'scripts/generate-cursor-plugin-artifacts.mjs'
      - 'scripts/lib/**'
      - 'scripts/internal-*-skill-policy.json'
      - 'scripts/internal-copilot-runtime-probe.json'
      - 'scripts/check-plugins-sync.sh'
      - 'scripts/check-learnings-budget.ts'
      - 'scripts/check-rules-pairing.sh'
      - 'all/create-only/.lisa/PROJECT_LEARNINGS.md'
      - 'src/core/**'
      - 'scripts/clean-dist.mjs'
      - 'tsconfig.json'
      - 'tsconfig.local.json'
      - 'tsconfig/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/plugins-sync.yml'
  workflow_dispatch:

jobs:
  plugins-sync:
    name: 🧩 Plugin artifacts match source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: '🍞 Setup Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check plugin artifacts are in sync with plugins/src
        run: bun run check:plugins
      - name: Check rules eager/reference pairing
        run: bun run check:rules-pairing
      - name: Check canonical project learnings budget
        run: bun run check:learnings-budget
