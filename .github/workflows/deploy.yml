# This is an example deployment workflow that demonstrates the recommended pattern:
# 1. Call the release.yml workflow to create a release
# 2. Implement your custom deployment logic
# 3. Optionally run load tests for staging deployments
#
# The release.yml workflow is kept separate from deployment to allow:
# - Different deployment strategies per project (AWS, Azure, GCP, etc.)
# - Custom deployment logic without modifying the release workflow
# - Optional load testing based on environment
# - Flexibility to deploy the same release to multiple environments

name: Release and Deploy

on:
  push:
    branches:
      - main
      - staging
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - main
          - staging
          - dev

# Prevent concurrent runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required permissions for creating releases and OIDC publishing
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write # Required for npm OIDC trusted publishing

jobs:
  # Environment setup
  determine_environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  release:
    name: Release
    uses: ./.github/workflows/release.yml
    needs: [determine_environment]
    with:
      environment: ${{ needs.determine_environment.outputs.environment }}
      release_strategy: 'standard-version'
      require_approval: false
      require_signatures: false
      generate_sbom: true
      override_blackout: true
      node_version: '22.21.1'
      package_manager: 'bun'
    secrets: inherit

  # Publish to npm (only on main, and only if a version was created)
  publish_npm:
    name: Publish to npm
    needs: [determine_environment, release]
    if: ${{ needs.determine_environment.outputs.environment == 'main' && !contains(github.event.head_commit.message, '[skip ci]') && needs.release.outputs.tag != '' }}
    uses: ./.github/workflows/publish-to-npm.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
      node_version: '22.21.1'
      package_manager: 'bun'

  # Publish workspace ESLint plugins to npm (idempotent - skips already-published versions)
  publish_workspace_packages:
    name: Publish workspace packages to npm
    needs: [determine_environment, release]
    if: ${{ needs.determine_environment.outputs.environment == 'main' && !contains(github.event.head_commit.message, '[skip ci]') && needs.release.outputs.tag != '' }}
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Get OIDC Token for npm
        id: npm-oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('https://registry.npmjs.org');
            core.setOutput('npm-token', token);
            core.setSecret(token);

      - name: Configure npm with OIDC Token
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ steps.npm-oidc.outputs.npm-token }}" >> ~/.npmrc
          npm config set registry https://registry.npmjs.org

      - name: Publish workspace packages
        run: |
          for pkg in eslint-plugin-code-organization eslint-plugin-component-structure eslint-plugin-ui-standards; do
            echo "Publishing @codyswann/$pkg..."
            cd "$pkg"
            npm publish --access public --provenance 2>&1 || echo "⚠️  @codyswann/$pkg may already be published at this version — skipping"
            cd ..
          done
