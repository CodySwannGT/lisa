# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Claude Code (Reusable)

on:
  workflow_call:
    inputs:
      event_name:
        description: 'The event that triggered the workflow'
        required: true
        type: string
      comment_body:
        description: 'Body of the comment (for issue_comment and PR review comment events)'
        required: false
        type: string
        default: ''
      review_body:
        description: 'Body of the review (for pull_request_review events)'
        required: false
        type: string
        default: ''
      issue_body:
        description: 'Body of the issue (for issues events)'
        required: false
        type: string
        default: ''
      issue_title:
        description: 'Title of the issue (for issues events)'
        required: false
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  claude:
    if: |
      (inputs.event_name == 'issue_comment' && contains(inputs.comment_body, '@claude')) ||
      (inputs.event_name == 'pull_request_review_comment' && contains(inputs.comment_body, '@claude')) ||
      (inputs.event_name == 'pull_request_review' && contains(inputs.review_body, '@claude')) ||
      (inputs.event_name == 'issues' && (contains(inputs.issue_body, '@claude') || contains(inputs.issue_title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Read plugins from project settings
        id: plugins
        run: |
          if [ -f .claude/settings.json ]; then
            MARKETPLACES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source | if .source == "github" then "https://github.com/\(.repo).git" else empty end' .claude/settings.json 2>/dev/null || echo "")
            MARKETPLACE_NAMES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source.repo // .key | split("/") | last' .claude/settings.json 2>/dev/null || echo "")
            PLUGINS=$(jq -r '(.enabledPlugins // {}) | to_entries[] | select(.value == true) | .key' .claude/settings.json 2>/dev/null | while IFS= read -r plugin; do
              mk="${plugin##*@}"
              if echo "$MARKETPLACE_NAMES" | grep -qx "$mk"; then
                echo "$plugin"
              fi
            done)
          else
            MARKETPLACES=""
            PLUGINS=""
          fi
          {
            echo "marketplaces<<PLUGINS_EOF"
            echo "$MARKETPLACES"
            echo "PLUGINS_EOF"
            echo "plugins<<PLUGINS_EOF"
            echo "$PLUGINS"
            echo "PLUGINS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          plugin_marketplaces: ${{ steps.plugins.outputs.marketplaces }}
          plugins: ${{ steps.plugins.outputs.plugins }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,Bash(*),Skill(*)"
            --system-prompt "Follow our coding standards. Ensure all new code has tests. Look at package.json for scripts. Make sure all quality checks pass before committing. Reuse existing helper functions when possible."
