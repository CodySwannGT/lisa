# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Auto-update PR branches - Dispatch Handler (Reusable)

on:
  workflow_call:
    inputs:
      action:
        description: 'The dispatch action type (auto-update-pr-branches or auto-update-pr-branch)'
        required: true
        type: string
      ref_name:
        description: 'The branch name that was pushed to'
        required: false
        type: string
        default: ''
      repo_full_name:
        description: 'Full repository name (owner/repo)'
        required: true
        type: string
      pr_number:
        description: 'The pull request number (for single PR updates)'
        required: false
        type: number
        default: 0
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: 'Claude Code OAuth token for authenticating the action'
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  check_claude_setup:
    name: 🔑 Check Claude Setup
    runs-on: ubuntu-latest
    outputs:
      has_claude_token: ${{ steps.check.outputs.has_claude_token }}
    steps:
      - name: Check for CLAUDE_CODE_OAUTH_TOKEN
        id: check
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "has_claude_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_claude_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not set - Claude automation will be skipped. Provision the secret to enable it."
          fi

  update-all-prs:
    needs: [check_claude_setup]
    name: Update open PRs targeting ${{ inputs.ref_name }}
    if: |
      needs.check_claude_setup.outputs.has_claude_token == 'true' &&
      (inputs.action == 'auto-update-pr-branches')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # `update-branch` merges on GitHub's servers, which never run a local
      # merge driver — that path stays uncovered by design. This registers the
      # driver for the fallback case where the server merge conflicts and the
      # agent resolves it locally in this clone (CodySwannGT/lisa#1995).
      - name: Register the learnings union merge driver
        continue-on-error: true
        run: npx --no-install lisa install-merge-driver . || true
      - name: Read plugins from project settings
        id: plugins
        run: |
          if [ -f .claude/settings.json ]; then
            MARKETPLACES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source | if .source == "github" then "https://github.com/\(.repo).git" else empty end' .claude/settings.json 2>/dev/null || echo "")
            MARKETPLACE_NAMES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source.repo // .key | split("/") | last' .claude/settings.json 2>/dev/null || echo "")
            PLUGINS=$(jq -r '(.enabledPlugins // {}) | to_entries[] | select(.value == true) | .key' .claude/settings.json 2>/dev/null | while IFS= read -r plugin; do
              mk="${plugin##*@}"
              if echo "$MARKETPLACE_NAMES" | grep -qx "$mk"; then
                echo "$plugin"
              fi
            done)
          else
            MARKETPLACES=""
            PLUGINS=""
          fi
          {
            echo "marketplaces<<PLUGINS_EOF"
            echo "$MARKETPLACES"
            echo "PLUGINS_EOF"
            echo "plugins<<PLUGINS_EOF"
            echo "$PLUGINS"
            echo "PLUGINS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update all open PR branches
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          plugin_marketplaces: ${{ steps.plugins.outputs.marketplaces }}
          plugins: ${{ steps.plugins.outputs.plugins }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions'
          prompt: |
            Update all open pull request branches targeting "${{ inputs.ref_name }}" in "${{ inputs.repo_full_name }}".

            Run this command:
            ```bash
            prs=$(gh pr list --repo "${{ inputs.repo_full_name }}" --base "${{ inputs.ref_name }}" --state open --json number --jq '.[].number')
            for pr in $prs; do
              echo "Updating PR #$pr..."
              gh api -X PUT "repos/${{ inputs.repo_full_name }}/pulls/$pr/update-branch" -f update_method=merge || echo "PR #$pr update failed or already up to date"
            done
            ```
          claude_args: |
            --allowedTools "Bash(*)"
            --max-turns 3

  update-single-pr:
    needs: [check_claude_setup]
    name: Update PR #${{ inputs.pr_number }}
    if: |
      needs.check_claude_setup.outputs.has_claude_token == 'true' &&
      (inputs.action == 'auto-update-pr-branch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # `update-branch` merges on GitHub's servers, which never run a local
      # merge driver — that path stays uncovered by design. This registers the
      # driver for the fallback case where the server merge conflicts and the
      # agent resolves it locally in this clone (CodySwannGT/lisa#1995).
      - name: Register the learnings union merge driver
        continue-on-error: true
        run: npx --no-install lisa install-merge-driver . || true

      - name: Update PR branch
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          plugin_marketplaces: ${{ steps.plugins.outputs.marketplaces }}
          plugins: ${{ steps.plugins.outputs.plugins }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions'
          prompt: |
            Update pull request #${{ inputs.pr_number }} branch in "${{ inputs.repo_full_name }}".

            Run this command:
            ```bash
            gh api -X PUT "repos/${{ inputs.repo_full_name }}/pulls/${{ inputs.pr_number }}/update-branch" -f update_method=merge
            ```
          claude_args: |
            --allowedTools "Bash(*)"
            --max-turns 3
