# This file is created by Lisa (create-only — edit freely, Lisa won't overwrite it).

# This is an example deployment workflow that demonstrates the recommended pattern:
# 1. Call the release.yml workflow to create a release
# 2. Implement your custom deployment logic
# 3. Optionally run load tests for staging deployments
#
# The release.yml workflow is kept separate from deployment to allow:
# - Different deployment strategies per project (AWS, Azure, GCP, etc.)
# - Custom deployment logic without modifying the release workflow
# - Optional load testing based on environment
# - Flexibility to deploy the same release to multiple environments

name: 🚀 Release and Deploy

on:
  push:
    branches:
      - main
      - staging
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - main
          - staging
          - dev
      force_build:
        description: 'Queue an EAS build even if app config did not change in the last commit (recovers builds lost to cancelled runs)'
        required: false
        default: false
        type: boolean

# Prevent concurrent runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Environment setup
  determine_environment:
    name: 🌍 Determine Environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      approval_environment: ${{ steps.approval.outputs.approval_environment }}
      require_approval: ${{ steps.approval.outputs.require_approval }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      - name: 🔄 Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: 🚦 Resolve approval gate from .lisa.config.json
        id: approval
        run: |
          BRANCH="${{ steps.env.outputs.environment }}"
          CONFIG=".lisa.config.json"
          APPROVAL_ENV="$BRANCH"
          REQUIRE="false"
          if [ -f "$CONFIG" ] && jq empty "$CONFIG" 2>/dev/null; then
            # Friendly environment name for the branch: an explicit
            # github.environments[].branch match wins, then the
            # deploy.branches map, then the branch name itself.
            NAME=$(jq -r --arg b "$BRANCH" '[.github.environments // {} | to_entries[] | select(.value.branch == $b) | .key] | first // empty' "$CONFIG")
            if [ -z "$NAME" ]; then
              NAME=$(jq -r --arg b "$BRANCH" '[.deploy.branches // {} | to_entries[] | select(.value == $b) | .key] | first // empty' "$CONFIG")
            fi
            APPROVAL_ENV="${NAME:-$BRANCH}"
            REQUIRE=$(jq -r --arg e "$APPROVAL_ENV" '.github.environments[$e].require_approval // false' "$CONFIG")
          fi
          echo "approval_environment=$APPROVAL_ENV" >> $GITHUB_OUTPUT
          echo "require_approval=$REQUIRE" >> $GITHUB_OUTPUT

  release:
    name: 📦 Release
    # Reference to the quality checks workflow
    uses: CodySwannGT/lisa/.github/workflows/release.yml@main
    needs: [determine_environment]
    permissions:
      contents: write
      pull-requests: read
    with:
      environment: ${{ needs.determine_environment.outputs.environment }}
      release_strategy: 'standard-version'
      skip_jobs: 'test:e2e,test:unit,test:integration'
      require_approval: ${{ needs.determine_environment.outputs.require_approval == 'true' }}
      approval_environment: ${{ needs.determine_environment.outputs.approval_environment }}
      require_signatures: false
      generate_sbom: true
      node_version: '22.21.1'
      package_manager: 'bun'
      override_blackout: true
      emergency_release: false
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  # Step 2: Deploy to AWS (Custom deployment logic)
  check_eas_setup:
    name: Check EAS Setup
    runs-on: ubuntu-latest
    needs: [determine_environment]
    permissions:
      contents: read
    outputs:
      has_eas_setup: ${{ steps.check.outputs.has_eas_setup }}
    steps:
      - id: check
        run: |
          if [[ -z "${EXPO_TOKEN}" ]]; then
            echo "has_eas_setup=false" >> $GITHUB_OUTPUT
          else
            echo "has_eas_setup=true" >> $GITHUB_OUTPUT
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # Check if native app config has changed
  check_app_config_changes:
    name: Check App Config Changes
    runs-on: ubuntu-latest
    needs: [determine_environment]
    permissions:
      contents: read
    outputs:
      app_config_changed: ${{ steps.check_changes.outputs.app_config_changed }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if app config changed
        id: check_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE "^(app\.config\.ts|app\.json|eas\.json)$"; then
            echo "app_config_changed=true" >> $GITHUB_OUTPUT
            echo "app config (app.config.ts / app.json / eas.json) has been modified"
          else
            echo "app_config_changed=false" >> $GITHUB_OUTPUT
            echo "app config has not been modified"
          fi

  # Trigger EAS Build if needed (only runs if app config changed)
  trigger_eas_build:
    name: Trigger EAS Build
    needs: [determine_environment, check_eas_setup, check_app_config_changes]
    if: needs.check_eas_setup.outputs.has_eas_setup == 'true' && (needs.check_app_config_changes.outputs.app_config_changed == 'true' || inputs.force_build == true)
    uses: CodySwannGT/lisa/.github/workflows/build.yml@main
    permissions:
      contents: read
    with:
      environment: ${{ needs.determine_environment.outputs.environment }}
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # EAS Deploy/Publish
  deploy:
    name: 🚀 Deploy to EAS
    runs-on: ubuntu-latest
    # Declaring the environment makes GitHub emit deployment /
    # deployment_status events for this run — the substrate that
    # deploy-status-sync listens to. Friendly name resolution (dev/staging/
    # production) comes from determine_environment; unconfigured branches
    # degrade to the branch name, same as the approval gate.
    # Mitigation A (double-approval): GitHub environment approvals are
    # per-job, so if this job named the same protected env release_approval
    # already gated, the operator would be prompted twice. On approval-gated
    # runs the deploy job routes to `<env>-deploy` (host projects leave it
    # unprotected — no required reviewers), giving exactly one prompt while
    # still recording a deployment with a Jira-classifiable env name (the
    # dev/staging/production substring is preserved).
    environment: ${{ needs.determine_environment.outputs.require_approval == 'true' && format('{0}-deploy', needs.determine_environment.outputs.approval_environment) || needs.determine_environment.outputs.approval_environment }}
    needs:
      [
        determine_environment,
        check_eas_setup,
        release,
        check_app_config_changes,
      ]
    # Run if EAS is set up, regardless of whether trigger_eas_build ran or was skipped
    if: |
      always() && 
      needs.check_eas_setup.outputs.has_eas_setup == 'true' &&
      needs.release.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # Use branch HEAD to include version bump from release job
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          package-manager-cache: false
          node-version: '22.21.1'
      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Set Env
        run: echo "PUPPETEER_SKIP_DOWNLOAD=true" >> $GITHUB_ENV
      - name: Install dependencies
        run: bun install
      - name: Copy environment file
        uses: canastro/copy-file-action@master
        with:
          source: ".env.${{ needs.determine_environment.outputs.environment == 'main' && 'production' || needs.determine_environment.outputs.environment == 'dev' && 'development' || needs.determine_environment.outputs.environment}}"
          target: '.env'
      - name: Copy environment file for production
        if: needs.determine_environment.outputs.environment != 'main'
        uses: canastro/copy-file-action@master
        with:
          source: ".env.${{ needs.determine_environment.outputs.environment == 'dev' && 'development' || needs.determine_environment.outputs.environment }}"
          target: '.env.production'
      - name: Copy amplify file (if exists)
        run: |
          ENV="${{ needs.determine_environment.outputs.environment }}"
          if [ "$ENV" == "staging" ]; then
            SOURCE_FILE="staging.aws-exports.js"
          elif [ "$ENV" == "dev" ]; then
            SOURCE_FILE="dev.aws-exports.js"
          else
            SOURCE_FILE="prod.aws-exports.js"
          fi
          if [ -f "$SOURCE_FILE" ]; then
            cp "$SOURCE_FILE" aws-exports.js
            echo "Copied $SOURCE_FILE to aws-exports.js"
          else
            echo "Skipping: $SOURCE_FILE does not exist"
          fi
      - name: Get version for deploy message
        id: get_version
        run: |
          # Use release output version if available, otherwise read from package.json
          RELEASE_VERSION="${{ needs.release.outputs.version }}"
          if [ -n "$RELEASE_VERSION" ]; then
            echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
            echo "Using release version: $RELEASE_VERSION"
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
            echo "Using package.json version (promotion detected): $PKG_VERSION"
          fi
      - name: Publish update
        run: STAGE=${{ needs.determine_environment.outputs.environment == 'main' && 'production' || needs.determine_environment.outputs.environment}} NODE_OPTIONS="--max-old-space-size=8192" eas update --auto --channel=${{ needs.determine_environment.outputs.environment == 'main' && 'production' || needs.determine_environment.outputs.environment}} --message="Update to v${{ steps.get_version.outputs.version }}"
      - name: Publish preview update
        run: STAGE=${{ needs.determine_environment.outputs.environment == 'main' && 'production' || needs.determine_environment.outputs.environment}} NODE_OPTIONS="--max-old-space-size=8192" eas update --channel=${{ needs.determine_environment.outputs.environment == 'main' && 'production' || needs.determine_environment.outputs.environment}}-preview --message="Preview update v${{ steps.get_version.outputs.version }}"

      - name: 📢 Notify on success
        run: echo "Successfully deployed version ${{ steps.get_version.outputs.version }} to ${{ needs.determine_environment.outputs.environment }}"
