# This file was created by Lisa on first setup.
# You can customize this file — Lisa will not overwrite it.

name: Claude CI Auto-Fix

on:
  workflow_run:
    workflows: ['🔍 CI Quality Checks']
    types: [completed]

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  auto-fix:
    uses: CodySwannGT/lisa/.github/workflows/reusable-claude-ci-auto-fix.yml@main
    with:
      workflow_run_conclusion: ${{ github.event.workflow_run.conclusion }}
      head_repo_full_name: ${{ github.event.workflow_run.head_repository.full_name }}
      repo_full_name: ${{ github.repository }}
      head_branch: ${{ github.event.workflow_run.head_branch }}
      run_id: ${{ github.event.workflow_run.id }}
      package_manager: 'bun'
    # `secrets: inherit` (not an explicit mapping) is load-bearing: the
    # reusable workflow forwards secrets to the issue dispatcher, which needs
    # JIRA_API_TOKEN / LINEAR_API_KEY to file failure tickets in the tracker
    # declared in .lisa.config.json. An explicit CLAUDE_CODE_OAUTH_TOKEN-only
    # mapping silently strands those tickets in GitHub Issues.
    secrets: inherit
