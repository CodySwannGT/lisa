# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Auto-update PR branches

on:
  push:
    branches:
      - main
      - staging
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    name: Update open PRs targeting ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Auto-update pull request branches
        id: autoupdate
        uses: chinthakagodawita/autoupdate@v1.7.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_FILTER: 'all'
          PR_READY_STATE: 'all'
          MERGE_CONFLICT_ACTION: 'ignore'
          RETRY_COUNT: '5'
          RETRY_SLEEP: '300'

      - name: Report autoupdate failure in summary
        if: steps.autoupdate.outcome == 'failure'
        run: |
          echo "⚠️ Auto-update encountered errors; some PRs may have been skipped." >> "$GITHUB_STEP_SUMMARY"
