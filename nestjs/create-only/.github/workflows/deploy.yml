# This is an example deployment workflow that demonstrates the recommended pattern:
# 1. Call the release.yml workflow to create a release
# 2. Implement your custom deployment logic
# 3. Optionally run load tests for staging deployments
#
# The release.yml workflow is kept separate from deployment to allow:
# - Different deployment strategies per project (AWS, Azure, GCP, etc.)
# - Custom deployment logic without modifying the release workflow
# - Optional load testing based on environment
# - Flexibility to deploy the same release to multiple environments

name: 🚀 Release and Deploy

on:
  push:
    branches:
      - main
      - staging
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - main
          - staging
          - dev

# Prevent concurrent runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Environment setup
  determine_environment:
    name: 🌍 Determine Environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      approval_environment: ${{ steps.approval.outputs.approval_environment }}
      require_approval: ${{ steps.approval.outputs.require_approval }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      - name: 🔄 Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: 🚦 Resolve approval gate from .lisa.config.json
        id: approval
        run: |
          BRANCH="${{ steps.env.outputs.environment }}"
          CONFIG=".lisa.config.json"
          APPROVAL_ENV="$BRANCH"
          REQUIRE="false"
          if [ -f "$CONFIG" ] && jq empty "$CONFIG" 2>/dev/null; then
            # Friendly environment name for the branch: an explicit
            # github.environments[].branch match wins, then the
            # deploy.branches map, then the branch name itself.
            NAME=$(jq -r --arg b "$BRANCH" '[.github.environments // {} | to_entries[] | select(.value.branch == $b) | .key] | first // empty' "$CONFIG")
            if [ -z "$NAME" ]; then
              NAME=$(jq -r --arg b "$BRANCH" '[.deploy.branches // {} | to_entries[] | select(.value == $b) | .key] | first // empty' "$CONFIG")
            fi
            APPROVAL_ENV="${NAME:-$BRANCH}"
            REQUIRE=$(jq -r --arg e "$APPROVAL_ENV" '.github.environments[$e].require_approval // false' "$CONFIG")
          fi
          echo "approval_environment=$APPROVAL_ENV" >> $GITHUB_OUTPUT
          echo "require_approval=$REQUIRE" >> $GITHUB_OUTPUT

  # Step 1: Create a release
  release:
    name: 📦 Release
    uses: CodySwannGT/lisa/.github/workflows/release.yml@main
    needs: [determine_environment]
    permissions:
      contents: write
      pull-requests: read
    with:
      environment: ${{ needs.determine_environment.outputs.environment }}
      release_strategy: 'standard-version'
      skip_jobs: 'test:e2e,test:unit,test:integration,test'
      generate_sbom: true
      override_blackout: true
      require_approval: ${{ needs.determine_environment.outputs.require_approval == 'true' }}
      approval_environment: ${{ needs.determine_environment.outputs.approval_environment }}
      require_signatures: false
      node_version: '22.21.1'
      package_manager: 'bun'
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  verify_aws_credentials:
    name: Verify AWS Credentials
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: read
    outputs:
      has_aws_credentials: ${{ steps.check.outputs.has_aws_credentials }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: noliran/branch-based-secrets@v1
        with:
          secrets: AWS_ACCOUNT_ID
      - id: check
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            echo "has_aws_credentials=false" >> $GITHUB_OUTPUT
          else
            echo "has_aws_credentials=true" >> $GITHUB_OUTPUT
          fi
        shell: bash
        env:
          AWS_ACCOUNT_ID: ${{ secrets[env.AWS_ACCOUNT_ID_NAME] }}

  check_migration_required:
    name: Check Migration Required
    runs-on: ubuntu-latest
    needs: [release, verify_aws_credentials]
    if: needs.verify_aws_credentials.outputs.has_aws_credentials == 'true'
    permissions:
      contents: read
    outputs:
      requires_migration: ${{ steps.check.outputs.requires_migration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - id: check
        run: |
          if [[ -z "${SKIP_MIGRATIONS}" ]]; then
            echo "requires_migration=true" >> $GITHUB_OUTPUT
          else
            echo "requires_migration=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
        env:
          SKIP_MIGRATIONS: ${{ vars.SKIP_MIGRATIONS }}

  verify_vpn:
    name: Verify VPN
    runs-on: ubuntu-latest
    needs: [check_migration_required]
    if: always() && needs.check_migration_required.outputs.requires_migration == 'true'
    permissions:
      contents: read
    outputs:
      has_vpn_setup: ${{ steps.check.outputs.has_vpn_setup }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: noliran/branch-based-secrets@v1
        with:
          secrets: OVPN_CONFIG
      - id: check
        run: |
          if [[ -z "${OVPN_CONFIG}" ]]; then
            echo "has_vpn_setup=false" >> $GITHUB_OUTPUT
          else
            echo "has_vpn_setup=true" >> $GITHUB_OUTPUT
          fi
        env:
          OVPN_CONFIG: ${{ secrets[env.OVPN_CONFIG_NAME] }}
  migrate:
    name: Schema Migrations
    runs-on: ubuntu-latest
    needs: verify_vpn
    if: always() && needs.verify_vpn.outputs.has_vpn_setup == 'true'
    permissions:
      id-token: write # needed to interact with GitHub's OIDC Token endpoint.
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: noliran/branch-based-secrets@v1
        with:
          secrets: AWS_ACCOUNT_ID
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::${{ secrets[env.AWS_ACCOUNT_ID_NAME] }}:role/DeployServiceRole
          role-session-name: fedeploysession
          aws-region: us-east-1
      - name: Install Open VPN
        run: sudo apt-get update; sudo apt-get install openvpn
      - uses: noliran/branch-based-secrets@v1
        with:
          secrets: OVPN_CONFIG
      - name: Setup VPN config
        run: |
          echo -e "${{ secrets[env.OVPN_CONFIG_NAME] }}" > config.ovpn
          sudo chmod 700 config.ovpn
      - name: Connect VPN
        run: |
          sudo openvpn --config "config.ovpn" --log "vpn.log" --daemon
      - name: Wait for a VPN connection
        timeout-minutes: 2
        run: |
          sleep 60s
          sudo cat vpn.log
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'
      - name: Install dependencies
        run: bun install
      - name: Run Schema Migrations
        run: STAGE=${{ github.ref_name != 'main' && github.ref_name || 'production' }} bun run migration:run
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          AWS_PROFILE: '' # Override serverless.yml profile with empty string for CI
  deploy:
    needs:
      [
        determine_environment,
        release,
        check_migration_required,
        migrate,
        verify_aws_credentials,
      ]
    if: |
      always() &&
      needs.verify_aws_credentials.outputs.has_aws_credentials == 'true' &&
      needs.check_migration_required.result == 'success' &&
      (
        needs.migrate.result == 'success' ||
        (needs.check_migration_required.outputs.requires_migration != 'true' && needs.migrate.result == 'skipped')
      )
    name: Deploy
    runs-on: ubuntu-latest
    # Declaring the environment makes GitHub emit deployment /
    # deployment_status events for this run — the substrate that
    # deploy-status-sync listens to. url surfaces the deployed API in the
    # GitHub deployments UI.
    # Mitigation A (double-approval): GitHub environment approvals are
    # per-job, so if this job named the same protected env release_approval
    # already gated, the operator would be prompted twice. On approval-gated
    # runs the deploy job routes to `<env>-deploy` (host projects leave it
    # unprotected — no required reviewers), giving exactly one prompt while
    # still recording a deployment with a Jira-classifiable env name (the
    # dev/staging/production substring is preserved).
    environment:
      name: ${{ needs.determine_environment.outputs.require_approval == 'true' && format('{0}-deploy', needs.determine_environment.outputs.approval_environment) || needs.determine_environment.outputs.approval_environment }}
      url: ${{ steps.deployment_outputs.outputs.environment_url }}
    outputs:
      environment_url: ${{ steps.deployment_outputs.outputs.environment_url }}
      deployment_status: ${{ steps.deployment_outputs.outputs.deployment_status }}
    permissions:
      id-token: write # needed to interact with GitHub's OIDC Token endpoint
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 22.21.1
        uses: actions/setup-node@v6
        with:
          node-version: 22.21.1
          package-manager-cache: false
      - uses: noliran/branch-based-secrets@v1
        with:
          secrets: AWS_ACCOUNT_ID
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::${{ secrets[env.AWS_ACCOUNT_ID_NAME] }}:role/DeployServiceRole
          role-session-name: fedeploysession
          aws-region: us-east-1
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'
      - name: Install dependencies
        run: bun install
      - name: Materialize dotenv env file
        if: ${{ vars.DOTENV_ENV_MATERIALIZATION_KEYS != '' }}
        shell: bash
        env:
          DOTENV_ENV_MATERIALIZATION_KEYS: ${{ vars.DOTENV_ENV_MATERIALIZATION_KEYS }}
          DOTENV_ENV_FILE: ${{ vars.DOTENV_ENV_FILE || '.env.local' }}
          # Optional project mapping for serverless-dotenv-plugin projects:
          # DOTENV_ENV_MATERIALIZATION_KEYS="API_URL JWT_SECRET"
          # API_URL: ${{ vars.API_URL }}
          # JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          : > "$DOTENV_ENV_FILE"
          wrote_any=false

          for key in $DOTENV_ENV_MATERIALIZATION_KEYS; do
            value="${!key:-}"
            if [ -z "$value" ]; then
              echo "::notice::Skipping empty dotenv key: $key"
              continue
            fi
            printf '%s=%s\n' "$key" "$value" >> "$DOTENV_ENV_FILE"
            wrote_any=true
          done

          if [ "$wrote_any" != "true" ]; then
            rm -f "$DOTENV_ENV_FILE"
            echo "::notice::No dotenv values were materialized"
          fi
      - name: serverless deploy
        run: |
          bun run serverless deploy --stage ${{ github.ref_name != 'main' && github.ref_name || 'production' }}
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          AWS_PROFILE: '' # Override serverless.yml profile with empty string for CI
      - name: Post-deploy health smoke
        if: ${{ vars.POST_DEPLOY_HEALTH_CHECK_ENABLED == 'true' }}
        shell: bash
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          AWS_PROFILE: ''
          HEALTH_OUTPUT_KEY: ${{ vars.POST_DEPLOY_HEALTH_OUTPUT_KEY || 'HttpApiUrl' }}
          HEALTH_PATH: ${{ vars.POST_DEPLOY_HEALTH_PATH || '/health' }}
          HEALTH_EXPECTED_BODY: ${{ vars.POST_DEPLOY_HEALTH_EXPECTED_BODY }}
          SERVERLESS_STACK_NAME: ${{ vars.SERVERLESS_STACK_NAME }}
          STAGE: ${{ github.ref_name != 'main' && github.ref_name || 'production' }}
        run: |
          set -euo pipefail

          stack_name="$SERVERLESS_STACK_NAME"
          if [ -z "$stack_name" ]; then
            service_name=$(bun run serverless print --stage "$STAGE" --format json | jq -r '.service // empty')
            if [ -z "$service_name" ]; then
              echo "::error::Set SERVERLESS_STACK_NAME or make serverless print expose .service"
              exit 1
            fi
            stack_name="${service_name}-${STAGE}"
          fi

          base_url=$(aws cloudformation describe-stacks \
            --stack-name "$stack_name" \
            --query "Stacks[0].Outputs[?OutputKey=='${HEALTH_OUTPUT_KEY}'].OutputValue | [0]" \
            --output text)
          if [ -z "$base_url" ] || [ "$base_url" = "None" ]; then
            echo "::error::CloudFormation output ${HEALTH_OUTPUT_KEY} was not found on ${stack_name}"
            exit 1
          fi

          health_url="${base_url%/}/${HEALTH_PATH#/}"
          body=$(curl --fail --silent --show-error --max-time 20 "$health_url")
          if [ -n "$HEALTH_EXPECTED_BODY" ] && ! grep -Fq "$HEALTH_EXPECTED_BODY" <<< "$body"; then
            echo "::error::Health check response did not contain expected body"
            exit 1
          fi
          echo "Health check passed: $health_url"

      - name: Resolve deployment outputs
        id: deployment_outputs
        shell: bash
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          AWS_PROFILE: ''
          DEPLOYMENT_URL: ${{ vars.DEPLOYMENT_URL }}
          HEALTH_OUTPUT_KEY: ${{ vars.POST_DEPLOY_HEALTH_OUTPUT_KEY || 'HttpApiUrl' }}
          SERVERLESS_STACK_NAME: ${{ vars.SERVERLESS_STACK_NAME }}
          STAGE: ${{ github.ref_name != 'main' && github.ref_name || 'production' }}
        run: |
          set -euo pipefail
          environment_url="$DEPLOYMENT_URL"

          if [ -z "$environment_url" ]; then
            stack_name="$SERVERLESS_STACK_NAME"
            if [ -z "$stack_name" ]; then
              service_name=$(bun run serverless print --stage "$STAGE" --format json | jq -r '.service // empty' 2>/dev/null || true)
              if [ -n "$service_name" ]; then
                stack_name="${service_name}-${STAGE}"
              fi
            fi

            if [ -n "$stack_name" ]; then
              environment_url=$(aws cloudformation describe-stacks \
                --stack-name "$stack_name" \
                --query "Stacks[0].Outputs[?OutputKey=='${HEALTH_OUTPUT_KEY}'].OutputValue | [0]" \
                --output text 2>/dev/null || true)
              if [ "$environment_url" = "None" ]; then
                environment_url=""
              fi
            fi
          fi

          echo "environment_url=$environment_url" >> "$GITHUB_OUTPUT"
          echo "deployment_status=success" >> "$GITHUB_OUTPUT"

      - name: 📢 Notify on success
        run: echo "Successfully deployed version ${{ needs.release.outputs.version }} to ${{ needs.determine_environment.outputs.environment }}"

  # Step 3: Load testing for staging deployments
  load_testing:
    name: 🔍 Load Testing
    needs: [determine_environment, release, deploy]
    if: |
      always() && 
      !cancelled() && 
      needs.deploy.result == 'success' && 
      (needs.determine_environment.outputs.environment == 'staging' || needs.determine_environment.outputs.environment == 'stage')
    uses: CodySwannGT/lisa/.github/workflows/load-test.yml@main
    with:
      environment: ${{ needs.determine_environment.outputs.environment }}
      test_scenario: 'smoke' # Start with smoke test after deployment
      base_url: ${{ needs.deploy.outputs.environment_url }}
      test_duration: '5m'
      virtual_users: 50
      fail_on_threshold: false # Don't fail the release if load test fails
      upload_results: true
    secrets:
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      CUSTOM_HEADERS: ${{ secrets.CUSTOM_HEADERS }}

  # Post-deployment monitoring (optional)
  post_deployment_monitoring:
    name: 📊 Post-Deployment Monitoring
    needs: [determine_environment, release, deploy, load_testing]
    if: |
      always() && 
      !cancelled() && 
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Monitor Deployment Health
        run: |
          echo "## 📊 Post-Deployment Monitoring" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.determine_environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Status**: ${{ needs.deploy.outputs.deployment_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment URL**: ${{ needs.deploy.outputs.environment_url }}" >> $GITHUB_STEP_SUMMARY

          # Add load test results for staging
          if [[ "${{ needs.determine_environment.outputs.environment }}" == "staging" || "${{ needs.determine_environment.outputs.environment }}" == "stage" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔍 Load Test Results" >> $GITHUB_STEP_SUMMARY
            echo "- **Test Scenario**: smoke" >> $GITHUB_STEP_SUMMARY
            echo "- **Duration**: 5m" >> $GITHUB_STEP_SUMMARY
            echo "- **Virtual Users**: 50" >> $GITHUB_STEP_SUMMARY
            echo "- **Status**: ${{ needs.load_testing.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          # Add monitoring checks here
          # - Check application metrics
          # - Verify error rates
          # - Monitor response times
          # - Check resource utilization

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Post-deployment monitoring complete" >> $GITHUB_STEP_SUMMARY

          # Basic health check (uncomment and customize)
          # curl -f ${{ needs.deploy.outputs.environment_url }}/health || echo "Health check failed"
