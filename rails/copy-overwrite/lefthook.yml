pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: '*.rb'
      run: bundle exec rubocop --force-exclusion {staged_files}
    bundler-audit:
      # Unset GIT_DIR/GIT_WORK_TREE so `--update`'s internal git pull of the
      # ruby-advisory-db (~/.local/share/ruby-advisory-db) does not inherit the
      # repo's git context. Without this, the command fails when the hook runs
      # inside a git worktree (the inherited GIT_DIR points at the wrong repo).
      run: env -u GIT_DIR -u GIT_WORK_TREE bundle exec bundler-audit check --update

commit-msg:
  commands:
    conventional-commit:
      run: 'head -1 {1} | grep -qE "^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?: .+" || (echo "Commit message must follow conventional format" && exit 1)'

pre-push:
  commands:
    rspec:
      run: bundle exec rspec
    brakeman:
      run: bundle exec brakeman --no-pager --quiet
    reek:
      run: bundle exec reek app/ lib/
    flog:
      run: bundle exec flog --all --group app/ lib/
    flay:
      run: bundle exec flay app/ lib/
