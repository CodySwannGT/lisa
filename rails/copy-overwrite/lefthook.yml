pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: '*.rb'
      run: bundle exec rubocop --force-exclusion {staged_files}
    threshold-ratchet:
      # Quality thresholds (simplecov minimums, rubocop Metrics maximums, …)
      # may tighten, never weaken. Same deterministic comparator as the
      # agent-time hooks and CI; self-skips when node or the script is absent
      # (CI still enforces the gate).
      run: sh -c 'command -v node >/dev/null 2>&1 || exit 0; [ -f scripts/check-threshold-ratchet.mjs ] || exit 0; node scripts/check-threshold-ratchet.mjs --staged'
    bundler-audit:
      # Unset GIT_DIR/GIT_WORK_TREE so `--update`'s internal git pull of the
      # ruby-advisory-db (~/.local/share/ruby-advisory-db) does not inherit the
      # repo's git context. Without this, the command fails when the hook runs
      # inside a git worktree (the inherited GIT_DIR points at the wrong repo).
      run: env -u GIT_DIR -u GIT_WORK_TREE bundle exec bundler-audit check --update

prepare-commit-msg:
  commands:
    work-item-trailer:
      run: node scripts/lisa-work-item.mjs prepare-commit-msg {1} {2} {3}

commit-msg:
  commands:
    work-item:
      run: node scripts/lisa-work-item.mjs validate-commit {1}
    conventional-commit:
      run: 'head -1 {1} | grep -qE "^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?: .+" || (echo "Commit message must follow conventional format" && exit 1)'

pre-push:
  commands:
    work-item:
      run: node scripts/lisa-work-item.mjs validate-push {1}
      use_stdin: true
    rspec:
      run: bundle exec rspec
    brakeman:
      run: bundle exec brakeman --no-pager --quiet
    reek:
      run: bundle exec reek app/ lib/
    flog:
      run: bundle exec flog --all --group app/ lib/
    flay:
      run: bundle exec flay app/ lib/
    mutation:
      # Opt-in, diff-only mutation gate. Self-skips instantly when disabled
      # (mutation.gate.yml: enabled: false), so it adds no cost until opted in.
      run: bash scripts/lisa-mutation.sh
