      let ctlSeq = 0;
      /* Propagate a shared setting to every control bound to the same syncKey:
               first into DATA so a re-render keeps the new value, then into any
               matching control already on screen. A setting surfaced on more than
               one page (the PRD provider, the tracker, the quality thresholds) is
               ONE setting — the surfaces must never be able to disagree. Covers both
               table cells ({t, v, syncKey}) and card rows ({control:{value,
               syncKey}}). */
      function syncControlValue(syncKey, value) {
        Object.values(DATA.sections).forEach(section => {
          (section.blocks || []).forEach(block => {
            if (!Array.isArray(block.rows)) return;
            block.rows.forEach(row => {
              if (Array.isArray(row)) {
                row.forEach(cell => {
                  if (cell && cell.syncKey === syncKey) cell.v = value;
                });
              } else if (
                row &&
                row.control &&
                (row.control.syncKey === syncKey || row.key === syncKey)
              ) {
                row.control.value = value;
              }
            });
          });
        });
        document
          .querySelectorAll('[data-sync-key="' + syncKey + '"]')
          .forEach(node => {
            if (node.value !== String(value)) node.value = value;
          });
      }

      /* Mark a control as one surface of a shared setting. */
      function bindSync(input, control) {
        if (!control || !control.syncKey) return;
        input.dataset.syncKey = control.syncKey;
        input.addEventListener("change", () =>
          syncControlValue(control.syncKey, input.value)
        );
      }

      function buildControl(control, dirtyId) {
        const id = dirtyId || "ctl-" + ++ctlSeq;
        const wrap = el("div", "control");
        const bind = (input, rowFinder) => {
          input.addEventListener("change", () =>
            markDirty(
              id + "·" + ++ctlSeq,
              rowFinder ? rowFinder(input) : input.closest(".row")
            )
          );
        };
        if (!control) return wrap;
        if (control.type === "toggle") {
          const box = el("div", "switch-wrap");
          const label = el("label", "switch");
          const input = document.createElement("input");
          input.type = "checkbox";
          input.checked = !!control.value;
          label.appendChild(input);
          label.appendChild(el("span", "trk"));
          // Spell the state out — a bare track is ambiguous at a glance.
          const state = el("span", "switch-state");
          const paintState = () => {
            state.textContent = input.checked ? "on" : "off";
            state.classList.toggle("on", input.checked);
          };
          paintState();
          input.addEventListener("change", paintState);
          bind(input, i => i.closest(".row") || i.closest("tr"));
          box.appendChild(label);
          box.appendChild(state);
          wrap.appendChild(box);
        } else if (control.type === "select") {
          const s = document.createElement("select");
          s.className = "ctl" + (control.mono ? " mono" : "");
          (control.options || []).forEach(o => {
            const opt = document.createElement("option");
            opt.value = o;
            opt.textContent = o;
            if (o === control.value) opt.selected = true;
            s.appendChild(opt);
          });
          bind(s, i => i.closest(".row") || i.closest("tr"));
          bindSync(s, control);
          wrap.appendChild(s);
        } else if (control.type === "text") {
          const i = document.createElement("input");
          i.type = "text";
          i.className =
            "ctl" +
            (control.mono ? " mono" : "") +
            (control.wide ? " wide" : "");
          i.value = control.value || "";
          if (control.placeholder) i.placeholder = control.placeholder;
          bind(i);
          wrap.appendChild(i);
        } else if (control.type === "number") {
          const i = document.createElement("input");
          i.type = "number";
          i.className = "ctl num";
          i.value = control.value;
          bind(i);
          bindSync(i, control);
          wrap.appendChild(i);
          if (control.unit)
            wrap.appendChild(el("span", "unit", esc(control.unit)));
        } else if (control.type === "multiselect") {
          // Pick one or more providers for a single obligation. Summary shows
          // the current selection; the popover is the checklist of options.
          const box = el("div", "ms");
          const values = new Set(control.values || []);
          const summary = el(
            "button",
            "ms-summary" + (control.mono ? " mono" : "")
          );
          summary.type = "button";
          const paint = () => {
            summary.textContent = values.size ? [...values].join(", ") : "none";
            summary.classList.toggle("ms-empty", values.size === 0);
          };
          paint();
          const pop = el("div", "ms-pop");
          (control.options || []).forEach(o => {
            const lab = el("label", "ms-opt");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.checked = values.has(o);
            cb.addEventListener("change", () => {
              if (cb.checked) values.add(o);
              else values.delete(o);
              paint();
              markDirty(id + "·" + ++ctlSeq, box.closest("tr"));
            });
            lab.appendChild(cb);
            lab.appendChild(el("span", "", esc(o)));
            pop.appendChild(lab);
          });
          summary.addEventListener("click", e => {
            e.stopPropagation();
            const open = box.classList.toggle("open");
            if (open) {
              const close = ev => {
                if (!box.contains(ev.target)) {
                  box.classList.remove("open");
                  document.removeEventListener("click", close);
                }
              };
              document.addEventListener("click", close);
            }
          });
          box.appendChild(summary);
          box.appendChild(pop);
          wrap.appendChild(box);
        } else if (control.type === "tags") {
          const box = el("div", "tagbox");
          (control.values || []).forEach(v => {
            const t = el("span", "tag", esc(v) + " ");
            const x = el("button", "", "×");
            x.type = "button";
            x.title = "Remove (prototype)";
            x.addEventListener("click", () => {
              t.remove();
              markDirty(id + "·" + v, box.closest(".row"));
            });
            t.appendChild(x);
            box.appendChild(t);
          });
          const add = el("button", "tag-add", "+ add");
          add.type = "button";
          add.addEventListener("click", () => {
            const v = prompt("Add value (prototype only):");
            if (!v) return;
            const t = el("span", "tag", esc(v) + " ");
            const x = el("button", "", "×");
            x.type = "button";
            x.addEventListener("click", () => {
              t.remove();
              markDirty(id + "·rm·" + v, box.closest(".row"));
            });
            t.appendChild(x);
            box.insertBefore(t, add);
            markDirty(id + "·add·" + v, box.closest(".row"));
          });
          box.appendChild(add);
          wrap.appendChild(box);
        } else if (control.type === "envmap") {
          const box = el("div", "envmap");
          ["dev", "staging", "production"].forEach(envName => {
            const cell = el("div", "cell");
            cell.appendChild(el("span", "", envName));
            const i = document.createElement("input");
            i.type = "text";
            i.className = "ctl mono";
            i.value = control[envName] || "";
            bind(i, inp => inp.closest(".row"));
            cell.appendChild(i);
            box.appendChild(cell);
          });
          wrap.appendChild(box);
        } else if (control.type === "button") {
          const b = el("button", "action-btn", esc(control.label));
          b.type = "button";
          if (control.id) b.id = control.id;
          if (control.disabled) {
            b.disabled = true;
            if (control.reason) {
              b.title = control.reason;
              b.setAttribute("aria-describedby", id + "-reason");
            }
          } else {
            b.addEventListener("click", () => {
              if (control.action === "run-health") {
                void runHealthCheck();
                return;
              }
              showToast(control.toast || "Prototype action");
            });
          }
          wrap.appendChild(b);
          if (control.statusId) {
            const status = el(
              "span",
              "status-why health-run-status",
              esc(
                control.statusMessage ||
                  "Ready to run deterministic health check"
              )
            );
            status.id = control.statusId;
            status.setAttribute(
              "role",
              control.statusRole === "alert" ? "alert" : "status"
            );
            status.setAttribute(
              "aria-live",
              control.statusRole === "alert" ? "assertive" : "polite"
            );
            wrap.appendChild(status);
          }
          if (control.disabled && control.reason) {
            const reason = el(
              "span",
              "status-why readonly-reason",
              esc(control.reason)
            );
            reason.id = id + "-reason";
            wrap.appendChild(reason);
          }
        } else if (control.type === "static") {
          const value = el(
            "span",
            control.cls === "mono" ? "mono" : "",
            esc(control.value)
          );
          if (control.id) value.id = control.id;
          wrap.appendChild(value);
        }
        return wrap;
      }

      function buildRow(row) {
        const r = el("div", "row");
        const left = el("div");
        const label = el("div", "label");
        label.appendChild(el("span", "", esc(row.label)));
        (row.badges || []).forEach(b => {
          const cls =
            b === "required"
              ? "required"
              : b === "local-only"
                ? "local"
                : "default";
          label.appendChild(el("span", "badge " + cls, esc(b)));
        });
        left.appendChild(label);
        if (row.desc) left.appendChild(el("div", "desc", row.desc));
        if (row.key) left.appendChild(el("span", "keychip", esc(row.key)));
        r.appendChild(left);
        // A row's config key IS its sync key: the same setting surfaced on two
        // pages (a factory page and its owning settings page) stays in step
        // without either surface having to know about the other.
        const control =
          row.key && row.control && !row.control.syncKey
            ? { ...row.control, syncKey: row.key }
            : row.control;
        r.appendChild(buildControl(control, row.key));
        return r;
      }

      function buildCard(block) {
        const card = el("div", "card");
        if (block.card) {
          const head = el("div", "card-head");
          head.appendChild(el("h2", "", esc(block.card)));
          if (block.note) head.appendChild(el("span", "note", esc(block.note)));
          card.appendChild(head);
        }
        const body = el("div", "card-body");
        (block.rows || []).forEach(row => body.appendChild(buildRow(row)));
        card.appendChild(body);
        return card;
      }

      function paintProviderStatus(td, cell) {
        td.innerHTML = "";
        if (cell.v === true || cell.v === "connected") {
          td.appendChild(el("span", "badge pass", "✓ connected"));
          return;
        }
        if (cell.v === "connected-but-empty") {
          td.appendChild(el("span", "badge warn", "◐ connected-but-empty"));
          if (cell.reason) {
            td.appendChild(el("span", "status-why", esc(cell.reason)));
          }
          return;
        }
        if (cell.v === "pending") {
          td.appendChild(el("span", "badge default", "checking…"));
          return;
        }
        if (cell.v === "unknown") {
          td.appendChild(el("span", "badge warn", "unknown"));
          if (cell.reason) {
            td.appendChild(el("span", "status-why", esc(cell.reason)));
          }
          return;
        }
        if (cell.v) {
          td.appendChild(el("span", "badge pass", "✓ active"));
          return;
        }
        td.appendChild(el("span", "badge fail", "✗ off"));
        if (cell.reason) {
          td.appendChild(el("span", "status-why", esc(cell.reason)));
        }
      }
      function buildStatusCell(cell) {
        const td = el("td");
        if (cell.provider) td.dataset.provider = cell.provider;
        if (cell.jobId) td.dataset.jobId = cell.jobId;
        if (cell.provider) {
          paintProviderStatus(td, cell);
          return td;
        }
        if (cell.v === "unknown" || cell.v === null || cell.v === undefined) {
          td.appendChild(el("span", "badge warn", "unknown"));
          if (cell.reason) {
            td.appendChild(el("span", "status-why", esc(cell.reason)));
          }
          return td;
        }
        if (cell.v) {
          td.appendChild(el("span", "badge pass", "✓ active"));
          return td;
        }
        td.appendChild(el("span", "badge fail", "✗ off"));
        if (cell.reason) {
          td.appendChild(el("span", "status-why", esc(cell.reason)));
        }
        return td;
      }

      function buildTable(block) {
        const card = el("div", "card");
        if (block.id) {
          card.id = block.id;
          card.dataset.testid = block.id;

        if (block.card) {
          const head = el("div", "card-head");
          head.appendChild(el("h2", "", esc(block.card)));
          if (block.note) head.appendChild(el("span", "note", esc(block.note)));
          card.appendChild(head);

        if (block.empty && (!block.rows || block.rows.length === 0)) {
          const empty = el(
            "div",
            "status-why automations-empty",
            esc(block.empty.message || "No rows")
          );
          empty.dataset.testid = (block.id || "table") + "-empty";
          if (block.empty.state) empty.dataset.state = block.empty.state;
          card.appendChild(empty);
          return card;
        }
        const scroll = el("div", "table-scroll");
        const table = el("table", "grid");
        const thead = el("thead");
        const trh = el("tr");
        block.cols.forEach(c => {
          // Cols accept either a plain string or {v, tip} — tip renders as a
          // hover tooltip on the header for jargon that needs a definition.
          if (typeof c === "string") {
            trh.appendChild(el("th", "", esc(c)));
            return;
          }
          const th = el("th", c.tip ? "th-help" : "", esc(c.v));
          if (c.tip) th.title = c.tip;
          if (c.center) th.classList.add("center");
          trh.appendChild(th);
        });
        thead.appendChild(trh);
        table.appendChild(thead);
        const tbody = el("tbody");
        block.rows.forEach(cells => {
          const tr = el("tr");
          if (cells && cells._automationId) {
            tr.dataset.automationId = cells._automationId;
          }
          cells.forEach(cell => {
            if (cell.t === "status") {
              tr.appendChild(buildStatusCell(cell));
              return;
            }
            const td = el("td");
            if (cell.t === "mono") td.className = "mono";
            if (cell.t === "text" || cell.t === "mono") {
              td.textContent = cell.v;
            } else if (cell.t === "obl") {
              // An obligation cell. Clickable only when the gate has a gap —
              // clicking opens "how to close it". Fully-enforced rows are
              // plain text with nothing to act on.
              if (cell.how) {
                const btn = el("button", "linklike");
                btn.type = "button";
                btn.title = "How to close this gap";
                btn.textContent = cell.v;
                btn.addEventListener("click", () => openHowto(cell.how));
                td.appendChild(btn);
              } else {
                td.textContent = cell.v;
              }
            } else if (cell.t === "gate") {
              // One enforcement layer for one obligation. The dot says whether
              // the rule fires here; the rightmost such column being green is
              // what makes an obligation unskippable.
              td.className = "gate-cell";
              const cls =
                cell.on === true ? " ok" : cell.on === "warn" ? " warn" : "";
              const dot = el("span", "dot" + cls);
              dot.title =
                cell.title ||
                (cell.on === true
                  ? "enforced here"
                  : cell.on === "warn"
                    ? "runs here, but does not gate the merge"
                    : "not enforced here");
              td.appendChild(dot);
            } else if (cell.t === "layer") {
              // One enforcement layer, as a clickable yes / no / n-a. The modal
              // carries the event it is bound to, the setup and verify
              // commands, and — for CI — whether the check is required to
              // merge. n/a is distinct from no: no is a fixable gap, n/a means
              // the gate does not apply to this project's stack — or to the
              // coding agent currently selected as this factory's staff.
              td.className = "gate-cell";
              const shown = resolveLayerCell(cell);
              const label =
                shown.on === true ? "yes" : shown.on === "na" ? "n/a" : "no";
              const bcls =
                shown.on === true
                  ? "pass"
                  : shown.on === "na"
                    ? "na"
                    : "default";
              const chip = el("span", "badge " + bcls, label);
              const btn = el("button", "badge-btn");
              btn.type = "button";
              btn.title = "Setup, verify and details";
              btn.appendChild(chip);
              btn.addEventListener("click", () => openHowto(shown.how));
              td.appendChild(btn);
            } else if (cell.t === "badge") {
              const chip = el(
                "span",
                "badge " + (cell.cls || "default"),
                esc(cell.v)
              );
              if (cell.how) {
                // Clickable verdict: the badge answers "is it connected?",
                // the modal answers "so how do I connect it?"
                const btn = el("button", "badge-btn");
                btn.type = "button";
                btn.title = "How to connect this";
                btn.appendChild(chip);
                btn.addEventListener("click", () => openHowto(cell.how));
                td.appendChild(btn);
              } else {
                td.appendChild(chip);
              }
            } else if (cell.t === "color") {
              const chip = el("span", "colorchip");
              const sw = el("span", "swatch");
              sw.style.background = cell.v;
              chip.appendChild(sw);
              chip.appendChild(el("span", "", esc(cell.v)));
              td.appendChild(chip);
            } else if (cell.t === "status") {
              if (cell.jobId) td.dataset.jobId = cell.jobId;
              if (cell.v === true) {
                td.appendChild(el("span", "badge pass", "✓ active"));
              } else if (cell.v === false) {
                td.appendChild(el("span", "badge fail", "✗ off"));
                if (cell.reason) {
                  td.appendChild(el("span", "status-why", esc(cell.reason)));
                }
              } else {
                // null/undefined = unknown — never fabricate "off" or "active"
                td.appendChild(el("span", "badge warn", "unknown"));
                if (cell.reason) {
                  td.appendChild(el("span", "status-why", esc(cell.reason)));
                }
              }
            } else if (cell.t === "run") {
              const cls =
                cell.ok === true
                  ? "pass"
                  : cell.ok === "warn"
                    ? "warn"
                    : "fail";
              const mark =
                cell.ok === true ? "✓" : cell.ok === "warn" ? "◐" : "✗";
              td.appendChild(
                el("span", "badge " + cls, mark + " " + esc(cell.v))
              );
              if (cell.reason) {
                td.appendChild(el("span", "status-why", esc(cell.reason)));
              }
            } else if (
              cell.t === "toggle" ||
              cell.t === "select" ||
              cell.t === "multiselect"
            ) {
              // Table cells use {t, v}; buildControl expects {type, value}.
              // multiselect carries {values, options} which spread through.
              td.appendChild(
                buildControl({ ...cell, type: cell.t, value: cell.v }, null)
              );
            }
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        scroll.appendChild(table);
        card.appendChild(scroll);
        return card;
      }

      function buildTiles(block) {
        const grid = el("div", "tile-grid");
        block.tiles.forEach(t => {
          const tile = el("div", "tile");
          tile.appendChild(el("div", "k", esc(t.k)));
          tile.appendChild(el("div", "v", esc(t.v)));
          if (t.s) tile.appendChild(el("div", "s", esc(t.s)));
          grid.appendChild(tile);
        });
        return grid;
      }

      function buildFlow(block) {
        const card = el("div", "card");
        const head = el("div", "card-head");
        head.appendChild(el("h2", "", esc(block.title)));
        card.appendChild(head);
        const flow = el("div", "flow");
        block.states.forEach((s, i) => {
          if (i > 0) flow.appendChild(el("span", "arr", "→"));
          flow.appendChild(
            el("span", "state" + (s.terminal ? " terminal" : ""), esc(s.name))
          );
        });
        card.appendChild(flow);
        return card;
      }

      /* The 8-entry stack metadata, keyed by id. This is a catalog of what each
               stack installs — NOT the detection result; only ids the probe reports
               are rendered from it. */
      function stackCatalog(block) {
        const catalog = new Map();
        block.items.forEach(s => {
          catalog.set(s.id, s);
        });
        return catalog;
      }

      /* A detected id with no catalog entry still gets a card (id as name) so
               detection truth is never dropped just because copy is missing. */
      function minimalStackMeta(id) {
        return {
          id,
          glyph: id.slice(0, 2).toUpperCase(),
          name: id,
          tagline: "",
          detect: "",
          badges: [],
          more: [],
        };
      }

      function stackCard(s) {
        const card = el("div", "stack-card on");
        const head = el("div", "head");
        head.appendChild(el("span", "glyph", esc(s.glyph)));
        const t = el("div", "t");
        t.appendChild(el("b", "", esc(s.name)));
        t.appendChild(el("i", "", esc(s.tagline)));
        head.appendChild(t);
        const toggleWrap = buildControl(
          { type: "toggle", value: true },
          "stack." + s.id
        );
        toggleWrap.querySelector("input").addEventListener("change", e => {
          card.classList.toggle("on", e.target.checked);
          markDirty("stack." + s.id, null);
        });
        head.appendChild(toggleWrap);
        card.appendChild(head);
        const meta = el("div", "meta");
        (s.badges || []).forEach(b =>
          meta.appendChild(el("span", "tag", esc(b)))
        );
        card.appendChild(meta);
        card.appendChild(el("div", "detect", s.detect || ""));
        if (s.more && s.more.length) {
          const det = el("details", "stack-more");
          det.appendChild(el("summary", "", "What this stack installs"));
          const ul = el("ul");
          s.more.forEach(m => ul.appendChild(el("li", "", esc(m))));
          det.appendChild(ul);
          card.appendChild(det);
        }
        return card;
      }

      function renderStacksInto(wrap, block) {
        wrap.innerHTML = "";
        const d = stackDetection;
        if (d.status === "detecting") {
          wrap.appendChild(
            el("div", "stacks-state detecting", "Detecting project stacks…")
          );
          return;
        }
        if (d.status === "unknown") {
          const box = el("div", "stacks-state unknown");
          box.appendChild(el("b", "", "Stack detection unavailable"));
          box.appendChild(
            el("span", "status-why", esc(d.reason + ": " + d.message))
          );
          wrap.appendChild(box);
          return;
        }
        if (!d.ids || d.ids.length === 0) {
          wrap.appendChild(
            el(
              "div",
              "stacks-state empty",
              "No Lisa stack detected in this project."
            )
          );
          return;
        }
        const catalog = stackCatalog(block);
        const grid = el("div", "stack-grid");
        d.ids.forEach(id => {
          grid.appendChild(stackCard(catalog.get(id) || minimalStackMeta(id)));
        });
        wrap.appendChild(grid);
        wrap.appendChild(el("div", "", "&nbsp;"));
      }

      function buildStacks(block) {
        const wrap = el("div", "stacks-block");
        renderStacksInto(wrap, block);
        return wrap;
      }

      /* Re-render the Stacks section in place after detection hydrates. */
      function refreshStacks() {
        const block = DATA.sections.stacks.blocks.find(
          b => b.type === "stacks"
        );
        const wrap = document.querySelector(".stacks-block");
        if (block && wrap) renderStacksInto(wrap, block);
      }

      function buildHooks(block) {
        const grid = el("div", "hooks-grid");
        block.items.forEach(h => {
          const card = el("div", "hook-card");
          const hd = el("div", "hd");
          hd.appendChild(el("span", "nm", esc(h.name)));
          hd.appendChild(el("span", "badge accent", esc(h.runner)));
          card.appendChild(hd);
          const steps = el("div", "steps");
          h.steps.forEach(s => {
            const st = el("div", "hook-step" + (s.optional ? " optional" : ""));
            st.appendChild(el("span", "dot"));
            st.appendChild(el("span", "what", esc(s.what)));
            st.appendChild(el("span", "how", esc(s.how)));
            steps.appendChild(st);
          });
          card.appendChild(steps);
          grid.appendChild(card);
        });
        const wrap = el("div");
        wrap.appendChild(grid);
        wrap.appendChild(el("div", "", "&nbsp;"));
        return wrap;
      }

      function buildCallout(block) {
        const box = el(
          "div",
          "callout" + (block.variant === "warn" ? " warn" : "")
        );
        // Single child span: the callout is flex, and multiple inline nodes
        // would each become flex items and render as broken columns.
        box.appendChild(el("span", "", block.text));
        return box;
      }

      function buildTabs(block) {
        const card = el("div", "card");
        const bar = el("div", "tabs");
        const bodies = [];
        block.tabs.forEach((tab, i) => {
          const btn = el(
            "button",
            "tab" + (i === (block.active || 0) ? " active" : "")
          );
          btn.type = "button";
          btn.innerHTML =
            esc(tab.label) +
            (tab.badge
              ? ' <span class="mini badge on">' + esc(tab.badge) + "</span>"
              : "");
          btn.addEventListener("click", () => {
            bar
              .querySelectorAll(".tab")
              .forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            bodies.forEach((b, j) => {
              b.style.display = j === i ? "" : "none";
            });
          });
          bar.appendChild(btn);
        });
        card.appendChild(bar);
        block.tabs.forEach((tab, i) => {
          const body = el("div", "card-body padded");
          body.style.padding = "14px 14px 6px";
          tab.blocks.forEach(b => body.appendChild(buildBlock(b)));
          if (i !== (block.active || 0)) body.style.display = "none";
          bodies.push(body);
          card.appendChild(body);
        });
        return card;
      }

      function buildChecklist(block) {
        const card = el("div", "card");
        card.dataset.setupChecklist = block.card;
        const head = el("div", "card-head");
        const note = el("span", "note");
        const countDone = () =>
          card.querySelectorAll(".check-item.done").length;
        const refreshNote = () => {
          note.textContent =
            countDone() + " of " + block.items.length + " complete";
        };
        head.appendChild(el("h2", "", esc(block.card)));
        head.appendChild(note);
        card.appendChild(head);
        const body = el("div", "card-body");
        block.items.forEach(item => {
          const finding = setupReadinessState.findings.get(item.id);
          const isDone = finding && finding.status === "pass";
          const reason =
            setupReadinessState.state === "result" && finding
              ? finding.reason
              : setupReadinessState.message;
          const row = el("div", "check-item" + (isDone ? " done" : ""));
          row.dataset.setupCheck = item.id;
          const right = el("div", "check-right");
          right.appendChild(
            el(
              "span",
              "badge " +
                (isDone
                  ? "pass"
                  : finding?.status === "fail"
                    ? "fail"
                    : "warn"),
              isDone ? "done" : "pending"
            )
          );
          if (!isDone) {
            right.appendChild(el("span", "status-why", esc(reason)));
          }
          const ck = el("button", "ck");
          ck.type = "button";
          ck.disabled = true;
          ck.title = reason;
          ck.setAttribute(
            "aria-label",
            item.label + ": " + (isDone ? "done" : "pending") + ". " + reason
          );
          row.appendChild(ck);
          const content = el("div", "check-content");
          const lab = el("div", "check-label", esc(item.label));
          if (item.optional) {
            lab.appendChild(el("span", "badge default", "optional"));
          }
          content.appendChild(lab);
          if (item.desc) content.appendChild(el("div", "desc", esc(item.desc)));
          if (item.command) {
            content.appendChild(el("span", "keychip", esc(item.command)));
          }
          row.appendChild(content);
          row.appendChild(right);
          body.appendChild(row);
        });
        card.appendChild(body);
        refreshNote();
        return card;
      }

      function pluginDescription(id, probeDescription, catalog) {
        if (Object.hasOwn(catalog, id) && typeof catalog[id] === "string") {
          return catalog[id];
        }
        return typeof probeDescription === "string" ? probeDescription : "";
      }

      function pluginTableRows(entries, catalog) {
        return entries.map(plugin => {
          const enabled = plugin.status === "enabled";
          return [
            { t: "mono", v: plugin.id },
            {
              t: "text",
              v: pluginDescription(plugin.id, plugin.description, catalog),
            },
            {
              t: "badge",
              v: enabled ? "enabled" : "available, not enabled",
              cls: enabled ? "on" : "plugin-status-badge available",
            },
          ];
        });
      }

      function renderPluginsInto(wrap, block) {
        wrap.innerHTML = "";
        const state = pluginsLive;
        if (state.status === "loading") {
          wrap.appendChild(
            el("div", "plugins-state loading", "Loading plugin enablement…")
          );
          return;
        }
        if (state.status === "unknown") {
          const box = el("div", "plugins-state unknown");
          box.appendChild(el("b", "", "Plugin enablement unavailable"));
          box.appendChild(
            el(
              "span",
              "status-why",
              esc((state.reason || "unknown") + ": " + (state.message || ""))
            )
          );
          wrap.appendChild(box);
          return;
        }
        if (!state.settingsPresent) {
          wrap.appendChild(
            el(
              "div",
              "plugins-state empty",
              "No .claude/settings.json in this project — plugin enablement is not configured."
            )
          );
          return;
        }
        const plugins = Array.isArray(state.plugins) ? state.plugins : [];
        const lisaCatalog =
          block.lisaCatalog && typeof block.lisaCatalog === "object"
            ? block.lisaCatalog
            : {};
        const thirdPartyCatalog =
          block.thirdPartyCatalog && typeof block.thirdPartyCatalog === "object"
            ? block.thirdPartyCatalog
            : {};
        const lisa = [];
        const thirdParty = [];
        plugins.forEach(plugin => {
          if (!plugin || typeof plugin !== "object") return;
          const id = plugin.id;
          if (typeof id !== "string" || id.trim().length === 0) return;
          if (id.endsWith("@lisa") || Object.hasOwn(lisaCatalog, id)) {
            lisa.push(plugin);
          } else {
            thirdParty.push(plugin);
          }
        });
        if (lisa.length === 0 && thirdParty.length === 0) {
          wrap.appendChild(
            el(
              "div",
              "plugins-state empty",
              "No plugins enabled or available in the marketplace catalog."
            )
          );
          return;
        }
        if (lisa.length > 0) {
          wrap.appendChild(
            buildTable({
              type: "table",
              card: "Lisa plugins",
              cols: ["Plugin", "Bundles", "Status"],
              rows: pluginTableRows(lisa, lisaCatalog),
            })
          );
        }
        if (thirdParty.length > 0) {
          wrap.appendChild(
            buildTable({
              type: "table",
              card: "Third-party plugins",
              note: "Read-only: enablement comes from .claude/settings.json enabledPlugins",
              cols: ["Plugin", "Purpose", "Status"],
              rows: pluginTableRows(thirdParty, thirdPartyCatalog),
            })
          );
        }
      }

      function buildPluginsLive(block) {
        const wrap = el("div", "plugins-live-block");
        renderPluginsInto(wrap, block);
        return wrap;
      }

      function refreshPlugins() {
        const block = DATA.sections.plugins.blocks.find(
          b => b.type === "plugins-live"
        );
        const wrap = document.querySelector(".plugins-live-block");
        if (block && wrap) renderPluginsInto(wrap, block);
      }

      function buildBlock(block) {
        if (block.type === "tiles") return buildTiles(block);
        if (block.type === "flow") return buildFlow(block);
        if (block.type === "stacks") return buildStacks(block);
        if (block.type === "hooks") return buildHooks(block);
        if (block.type === "callout") return buildCallout(block);
        if (block.type === "table") return buildTable(block);
        if (block.type === "tabs") return buildTabs(block);
        if (block.type === "checklist") return buildChecklist(block);
        if (block.type === "plugins-live") return buildPluginsLive(block);
        if (block.type === "staff") return buildStaff(block);
        if (block.type === "environments") return buildEnvironments();
        return buildCard(block);
      }

      /* The staff picker: which coding agent this factory page is read for.
               Single-select — a factory is run by one agent at a time, and its
               readiness is only meaningful with that agent named. */
      function buildStaff() {
        const card = el("div", "card staff-card");
        const head = el("div", "staff-head");
        head.appendChild(el("span", "staff-label", "Run by"));
        const group = el("div", "staff-opts");
        group.setAttribute("role", "radiogroup");
        group.setAttribute("aria-label", "Coding agent running this factory");
        AGENTS.forEach(id => {
          const caps = AGENT_CAPS[id];
          const btn = el("button", "staff-opt");
          btn.type = "button";
          btn.setAttribute("role", "radio");
          const selected = DATA.staff === id;
          btn.setAttribute("aria-checked", selected ? "true" : "false");
          if (selected) btn.classList.add("active");
          btn.textContent = caps.label;
          btn.addEventListener("click", () => {
            if (DATA.staff === id) return;
            DATA.staff = id;
            renderAll();
            showSection(activeSection);
          });
          group.appendChild(btn);
        });
        head.appendChild(group);
        card.appendChild(head);
        // No per-agent "how it works" blurb: how the surface is installed is
        // implementation detail, not something the operator acts on. Only a
        // capability gap earns a line here, because it changes what the page
        // below actually means.
        const caps = currentCaps();
        if (caps.agentHooks !== true) {
          const warn = el("div", "staff-warn");
          if (caps.agentHooks === "unverified") {
            warn.textContent =
              caps.label +
              " has unproven agent-layer enforcement. " +
              caps.hookWhy +
              " Those cells read n/a below — unproven, which is not the same as unsupported.";
          } else {
            warn.textContent =
              caps.label +
              " cannot enforce anything at the agent layer. " +
              caps.hookWhy +
              " Those cells read n/a below — a capability gap, not something to fix.";
          }
          card.appendChild(warn);
        }
        return card;
      }

      function renderAll() {
        syncHealthViewModel();
        $main.innerHTML = "";
        $nav.innerHTML = "";
        ctlSeq = 0;
        DATA.groups.forEach(group => {
          const g = el("div", "nav-group");
          g.appendChild(el("div", "nav-eyebrow", esc(group.label)));
          group.sections.forEach(sid => {
            const section = DATA.sections[sid];
            const btn = el("button", "nav-item");
            btn.type = "button";
            btn.dataset.section = sid;
            btn.innerHTML = "<span>" + esc(section.title) + "</span>";
            btn.addEventListener("click", () => showSection(sid));
            g.appendChild(btn);
          });
          $nav.appendChild(g);
        });
        Object.entries(DATA.sections).forEach(([sid, section]) => {
          const sec = el("section", "section");
          sec.id = "section-" + sid;
          const head = el("div", "section-head");
          head.appendChild(el("h1", "", esc(section.title)));
          head.appendChild(el("p", "", esc(section.desc)));
          if (section.src)
            head.appendChild(el("span", "src-chip", "⚙ " + esc(section.src)));
          sec.appendChild(head);
          section.blocks.forEach(b => sec.appendChild(buildBlock(b)));
          $main.appendChild(sec);
        });
      }

      let activeSection = "overview";
      function showSection(sid) {
        const previousSection = activeSection;
        activeSection = sid;
        document
          .querySelectorAll(".section")
          .forEach(s => s.classList.remove("visible"));
        const sec = document.getElementById("section-" + sid);
        if (sec) sec.classList.add("visible");
        document
          .querySelectorAll(".nav-item")
          .forEach(b =>
            b.classList.toggle("active", b.dataset.section === sid)
          );
        if (location.hash !== "#" + sid)
          history.replaceState(null, "", "#" + sid);
        applyFilter(document.getElementById("search").value);
        window.scrollTo({ top: 0 });
        if (sid === "setup" && previousSection !== "setup") {
          void hydrateSetupReadiness({
            refresh: setupReadinessGeneration > 0,
          });
        }
      }

      function applyFilter(query) {
        const q = (query || "").trim().toLowerCase();
        const sec = document.getElementById("section-" + activeSection);
        if (!sec) return;
        sec
          .querySelectorAll(".row, tbody tr, .stack-card, .hook-card")
          .forEach(node => {
            node.style.display =
              !q || node.textContent.toLowerCase().includes(q) ? "" : "none";
          });
      }

      /* --- live-config hydration (lisa ui injects window.LISA_LIVE_CONFIG) --- */
      function walkRows(blocks, fn) {
        (blocks || []).forEach(block => {
          (block.rows || []).forEach(fn);
          (block.tabs || []).forEach(tab => walkRows(tab.blocks, fn));
        });
      }
      function liveGet(obj, dotPath) {
        return dotPath
          .split(".")
          .reduce(
            (node, seg) =>
              node && typeof node === "object" && !Array.isArray(node)
                ? node[seg]
                : undefined,
            obj
          );
      }
      function hydrateControl(control, value) {
        if (control.type === "toggle") {
          control.value = !!value;
          return;
        }

            typeof value !== "string" ||

              (codePoint >= 0x202a && codePoint <= 0x202e) ||

            "findings",

      /** Run exactly one deterministic Health v1 check through the local server. */
      async function runHealthCheck() {
        const button = document.getElementById("runHealthCheckButton");
        if (!button || button.disabled || healthViewState.state === "running")
          return;
        const previousResult = healthViewState.result;
        healthViewState = {
          state: "running",
          ...(previousResult ? { result: previousResult } : {}),
        };
        repaintHealthResults();
        paintHealthChip();
        try {
          const response = await fetch("/api/health", {
            method: "POST",
            cache: "no-store",
          });
          if (!response.ok) throw new Error("Unable to run Lisa health");
          applyHealthResult(await response.json());
        } catch (error) {
          applyHealthError(
            error instanceof Error ? error.message : "Unable to run Lisa health"
          );
        }
      }
      /**
       * Paint the CI Quality jobs Active column from the ci-quality-jobs probe.
       * Never leaves a fabricated active/off value when the probe is unknown.
       * @param probes - Live-status probe map from /api/status
       */
      function applyCiQualityJobs(probes) {
        const table = (DATA.sections.ci.blocks || []).find(
          block => block.type === "table" && block.card === "Quality jobs"
        );
        if (!table) return;
        const result = normalizeLiveStatusResult(
          probes && Object.hasOwn(probes, "ci-quality-jobs")
            ? probes["ci-quality-jobs"]
            : {
                state: "unknown",
                reason: "missing-probe",
                message: "The ci-quality-jobs probe was not reported",
              }
        );
        const byId = new Map();
        if (
          result.state === "value" &&
          result.value &&
          typeof result.value === "object" &&
          Array.isArray(result.value.jobs)
        ) {
          result.value.jobs.forEach(job => {
            if (job && typeof job.id === "string") byId.set(job.id, job);
          });
        }
        table.rows.forEach(cells => {
          const status = cells.find(cell => cell.t === "status" && cell.jobId);
          if (!status) return;
          if (result.state !== "value") {
            status.v = null;
            status.reason =
              result.reason + (result.message ? ": " + result.message : "");
            return;
          }
          const job = byId.get(status.jobId);
          if (!job) {
            status.v = null;
            status.reason = "missing-job: probe omitted " + status.jobId;
            return;
          }
          status.v = job.active;
          status.reason = typeof job.reason === "string" ? job.reason : "";
        });
        const current = activeSection;
        renderAll();
        showSection(current);
      }
      function githubRepoHostBlock() {
        return {
          card: "Host",
          rows: [
            {
              key: "",
              label: "Git host",
              desc: "Which host this repository lives on. GitHub is the only host Lisa provisions today.",
              control: sel("GitHub", ["GitHub", "GitLab", "Bitbucket"]),
            },
          ],
        };
      }
      function githubRepoSettingsRows(settings) {
        return [
          {
            label: "Allow merge commits",
            desc: "The fleet is merge-only — squash and rebase are disabled because squashing flattens release commits and breaks promotion.",
            control: tog(!!settings.allow_merge_commit),
          },
          {
            label: "Allow squash merge",
            desc: "",
            control: tog(!!settings.allow_squash_merge),
          },
          {
            label: "Allow rebase merge",
            desc: "",
            control: tog(!!settings.allow_rebase_merge),
          },
          {
            label: "Auto-merge",
            desc: "Lisa PRs enable auto-merge and drive themselves to green.",
            control: tog(!!settings.allow_auto_merge),
          },
          {
            label: "Suggest updating PR branches",
            desc: "",
            control: tog(!!settings.allow_update_branch),
          },
          {
            label: "Delete head branch on merge",
            desc: "Environment branches survive via the prevent-delete ruleset.",
            control: tog(!!settings.delete_branch_on_merge),
          },
          {
            label: "Merge commit title",
            desc: "",
            control: sel(String(settings.merge_commit_title || ""), [
              "MERGE_MESSAGE",
              "PR_TITLE",
            ]),
          },
          {
            label: "Issues tab",
            desc: "",
            control: tog(!!settings.has_issues),
          },
          {
            label: "Wiki tab",
            desc: "Off — Lisa uses the in-repo wiki/ directory instead.",
            control: tog(!!settings.has_wiki),
          },
          {
            label: "Secret scanning + push protection",
            desc: "Best-effort; skipped when the plan lacks GitHub Advanced Security.",
            control: tog(!!settings.secret_scanning),
          },
          {
            label: "Default branch",
            desc: "Live default branch from the repository.",
            control: txt(String(settings.default_branch || ""), {
              mono: true,
            }),
          },
        ];
      }
      function applyGithubRepoPanel(result) {
        const host = githubRepoHostBlock();
        if (result.state !== "value") {
          const reason =
            result.state === "unknown"
              ? result.reason + ": " + result.message
              : "not applicable";
          DATA.sections.repository.blocks = [
            host,
            {
              type: "callout",
              variant: "warn",
              text:
                "<b>unknown — not authenticated / unavailable</b> — " +
                esc(reason) +
                ". No setting, ruleset, label, or secret state is shown as a concrete value.",
            },
          ];
          return;
        }
        const value = result.value || {};
        const settings = value.settings || {};
        const rulesets = Array.isArray(value.rulesets) ? value.rulesets : [];
        const labels = Array.isArray(value.labels) ? value.labels : [];
        const secrets = Array.isArray(value.secrets) ? value.secrets : [];
        DATA.sections.repository.blocks = [
          host,
          {
            card: "Repository settings",
            note:
              "Live from gh api repos/" +
              String(value.owner || "") +
              "/" +
              String(value.repo || ""),
            rows: githubRepoSettingsRows(settings),
          },
          {
            type: "table",
            card: "Rulesets",
            note: "Live from gh api repos/{owner}/{repo}/rulesets",
            cols: ["Ruleset", "Applies to", "Enforces", "Active"],
            rows: rulesets.map(row => [
              { t: "mono", v: String(row.name || "") },
              { t: "text", v: String(row.appliesTo || "—") },
              { t: "text", v: String(row.enforces || "—") },
              {
                t: "badge",
                v: row.active ? "active" : "disabled",
                cls: row.active ? "on" : "off",
              },
            ]),
          },
          {
            type: "table",
            card: "Lifecycle labels",
            note: "Config-expected labels vs live gh label list",
            cols: ["Label", "Role", "Color", "Status"],
            rows: labels.map(row => [
              { t: "mono", v: String(row.name || "") },
              { t: "text", v: String(row.role || "") },
              row.present && row.color
                ? {
                    t: "color",
                    v: "#" + String(row.color).replace(/^#/u, ""),
                  }
                : { t: "text", v: "—" },
              {
                t: "badge",
                v: row.present ? "present" : "missing",
                cls: row.present ? "on" : "off",
              },
            ]),
          },
          {
            type: "table",
            card: "Secrets",
            note: "Presence only from gh secret list — values are never read",
            cols: ["Secret", "Purpose", "Status"],
            rows: secrets.map(row => [
              { t: "mono", v: String(row.name || "") },
              { t: "text", v: String(row.purpose || "") },
              {
                t: "badge",
                v: row.set ? "set" : "missing",
                cls: row.set ? "on" : "off",
              },
            ]),
          },
        ];
      }
      function reRenderAfterGithubRepoHydration() {
        const current = activeSection;
        renderAll();
        showSection(current || "overview");
      }
      /**
       * Replace the Deploy pipeline stages table from the live probe.
       * Never leaves demo hold/no-hold claims in place.
       * @param probes - Live-status probe map from /api/status
       */
      function applyDeployPipelineStages(probes) {
        const section = DATA.sections.deploy;
        if (!section || !Array.isArray(section.blocks)) return;
        const block = section.blocks.find(
          candidate =>
            candidate &&
            candidate.type === "table" &&
            candidate.id === "deploy-pipeline-stages"
        );
        if (!block) return;
        const raw =
          probes && Object.hasOwn(probes, "deploy-pipeline-stages")
            ? probes["deploy-pipeline-stages"]
            : undefined;
        const result =
          raw === undefined
            ? {
                state: "unknown",
                reason: "missing-probe",
                message: "The deploy-pipeline-stages probe was not reported",
              }
            : normalizeLiveStatusResult(raw);
        if (result.state === "not-applicable") {
          block.rows = [
            [
              { t: "mono", v: "—" },
              {
                t: "text",
                v: "No deploy.yml or github.environments configured for this project",
              },
              { t: "status", v: "unknown", reason: "not-applicable" },
            ],
          ];
        } else if (
          result.state === "value" &&
          result.value &&
          typeof result.value === "object" &&
          Array.isArray(result.value.stages)
        ) {
          block.rows = result.value.stages.map(stage => [
            {
              t: "mono",
              v: String(stage.name || stage.id || "stage"),
            },
            {
              t: "text",
              v: String(stage.description || ""),
            },
            {
              t: "status",
              v: stage.active === "unknown" ? "unknown" : stage.active === true,
              reason:
                typeof stage.reason === "string" && stage.reason.length > 0
                  ? stage.reason
                  : undefined,
            },
          ]);
          if (block.rows.length === 0) {
            block.rows = [
              [
                { t: "mono", v: "—" },
                { t: "text", v: "Deploy pipeline reported zero stages" },
                {
                  t: "status",
                  v: "unknown",
                  reason: "empty-stages",
                },
              ],
            ];
          }
        } else {
          const reason =
            result.state === "unknown"
              ? result.reason + ": " + result.message
              : "invalid-value: deploy-pipeline-stages probe returned an unusable value";
          block.rows = [
            [
              { t: "mono", v: "—" },
              {
                t: "text",
                v: "Deploy pipeline stages unavailable",
              },
              { t: "status", v: "unknown", reason: reason },
            ],
          ];
        }
        const existing = document.getElementById("deploy-pipeline-stages");
        if (existing) {
          existing.replaceWith(buildTable(block));
        }
      }
      /* Map the detected-stacks probe into stackDetection. A missing probe or a
               non-value/non-array result becomes an explicit unknown state — never a
               false empty and never the metadata catalog. */
      function applyDetectedStacks(probes) {
        const raw =
          probes && Object.hasOwn(probes, "detected-stacks")
            ? probes["detected-stacks"]
            : undefined;
        if (raw === undefined) {
          stackDetection = {
            status: "unknown",
            ids: [],
            reason: "missing-probe",
            message: "The detected-stacks probe was not reported",
          };
          refreshStacks();
          return;
        }
        const result = normalizeLiveStatusResult(raw);
        if (result.state === "value" && Array.isArray(result.value)) {
          const ids = result.value.filter(v => typeof v === "string");
          if (ids.length !== result.value.length) {
            // Any non-string element makes the whole array untrustworthy;
            // an empty state here would fabricate a "no stacks" certainty.
            stackDetection = {
              status: "unknown",
              ids: [],
              reason: "invalid-value",
              message: "detected-stacks did not return a string array",
            };
          } else {
            stackDetection =
              ids.length > 0
                ? { status: "value", ids }
                : { status: "empty", ids: [] };
          }
        } else if (result.state === "value") {
          stackDetection = {
            status: "unknown",
            ids: [],
            reason: "invalid-value",
            message: "detected-stacks did not return a string array",
          };
        } else if (result.state === "not-applicable") {
          stackDetection = {
            status: "unknown",
            ids: [],
            reason: "not-applicable",
            message: "detected-stacks reported not applicable",
          };
        } else {
          stackDetection = {
            status: "unknown",
            ids: [],
            reason: result.reason,
            message: result.message,
          };
        }
        refreshStacks();
      }
      function markStacksUnreachable(error) {
        stackDetection = {
          status: "unknown",
          ids: [],
          reason: "status-unavailable",
          message: error instanceof Error ? error.message : String(error),
        };
        refreshStacks();
      }
      function automationsScheduledJobsBlock() {
        const blocks =
          (DATA.sections.automations && DATA.sections.automations.blocks) || [];
        return blocks.find(block => block.id === "automations-scheduled-jobs");
      }
      function automationRowFromProbe(entry) {
        const cadence =
          typeof entry.cadence === "string" && entry.cadence.trim().length > 0
            ? entry.cadence
            : "unknown";
        const lastRun =
          typeof entry.lastRunAt === "string" &&
          entry.lastRunAt.trim().length > 0
            ? entry.lastRunAt
            : "—";
        const status =
          typeof entry.status === "string" && entry.status.trim().length > 0
            ? entry.status
            : "unknown";
        const runtime =
          entry.runtime === "claude" ? "claude /schedule" : "codex";
        const row = [
          { t: "mono", v: entry.id },
          { t: "badge", v: runtime, cls: "default" },
          { t: "mono", v: cadence },
          { t: "mono", v: lastRun },
          {
            t: "badge",
            v: status,
            cls: status.toUpperCase() === "ACTIVE" ? "pass" : "default",
          },
        ];
        row._automationId = entry.id;
        return row;
      }
      function hydrateAutomationsSection(probeResult) {
        const block = automationsScheduledJobsBlock();
        if (!block) return;
        const result = normalizeLiveStatusResult(probeResult);
        if (result.state === "value") {
          const automations = Array.isArray(result.value.automations)
            ? result.value.automations
            : [];
          block.rows = automations.map(automationRowFromProbe);
          if (block.rows.length === 0) {
            block.empty = {
              state: "empty",
              message:
                "No lisa-auto-<project>- automations found in the harness scheduler",
            };
          } else {
            delete block.empty;
          }
        } else if (result.state === "not-applicable") {
          block.rows = [];
          block.empty = {
            state: "not-applicable",
            message: "Automations are not applicable on this machine",
          };
        } else {
          block.rows = [];
          block.empty = {
            state: "unknown",
            message: result.reason + ": " + result.message,
          };
        }
        renderAll();
        showSection(activeSection);
      }

      async function hydrateLiveStatuses() {
        try {
          const response = await fetch("/api/status", {
            headers: { accept: "application/json" },
          });
          if (!response.ok) throw new Error("HTTP " + response.status);
          const snapshot = await response.json();
          const probes = liveStatusProbeMap(snapshot);
          renderLiveStatuses(probes);
          applyEnabledPlugins(probes);
          applyDetectedStacks(probes);
          // Quality jobs / automations re-render the page; paint the version chip after.
          applyCiQualityJobs(probes);
          hydrateAutomationsSection(
            probes.automations || {
              state: "unknown",
              reason: "probe-missing",
              message: "Automations probe was omitted from /api/status",
            }
          );
          applyLisaVersion(probes);
          const repoResult = normalizeLiveStatusResult(
            probes["github-repo"] || {
              state: "unknown",
              reason: "probe-missing",
              message: "GitHub repository probe did not run",
            }
          );
          applyGithubRepoPanel(repoResult);
          reRenderAfterGithubRepoHydration();
          applyDeployPipelineStages(probes);
          applyObservabilityProviders(probes);
        } catch (error) {
          const message =
            error instanceof Error ? error.message : String(error);
          const unavailable = {
            state: "unknown",
            reason: "status-unavailable",
            message,
          };
          renderLiveStatuses({ transport: unavailable });
          applyEnabledPlugins({ "enabled-plugins": unavailable });
          applyCiQualityJobs({ "ci-quality-jobs": unavailable });
          hydrateAutomationsSection(unavailable);
          applyLisaVersion({ "lisa-version": unavailable });
          applyGithubRepoPanel(unavailable);
          reRenderAfterGithubRepoHydration();
          applyDeployPipelineStages({
            "deploy-pipeline-stages": unavailable,
          });
          applyObservabilityProviders({
            sentry: unavailable,
            "cloudwatch-alarms": unavailable,
            "x-ray": unavailable,
          });
          markStacksUnreachable(error);
        }
      }

      /* --- boot (deferred so an injected live-config tag after this script is seen) --- */
      function boot() {
        hydrateFromLiveConfig();
        renderAll();
        showSection(location.hash ? location.hash.slice(1) : "overview");
        if (!document.getElementById("section-" + activeSection))
          showSection("overview");
        void hydrateLiveStatuses();
        void hydrateHealth();
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }

      window.addEventListener("hashchange", () => {
        const sid = location.hash.slice(1);
        if (DATA.sections[sid]) showSection(sid);
      });

      document
        .getElementById("search")
        .addEventListener("input", e => applyFilter(e.target.value));
      document.getElementById("search").addEventListener("keydown", e => {
        if (e.key === "Escape") {
          e.target.value = "";
          applyFilter("");
        }
      });

      document.getElementById("discardBtn").addEventListener("click", () => {
        clearDirty();
        renderAll();
        showSection(activeSection);
      });

      document.getElementById("howtoClose").addEventListener("click", () => {
        document.getElementById("howto").close();
      });

      // Clicking the backdrop closes: on a <dialog> the click target is the
      // dialog itself only when the press landed outside its content box.
      document.getElementById("howto").addEventListener("click", event => {
        if (event.target === event.currentTarget) event.currentTarget.close();
      });

      document.getElementById("healthChip").addEventListener("click", () => {
        showSection("health");
      });

      document.getElementById("themeToggle").addEventListener("click", () => {
        const root = document.documentElement;
        const current = root.getAttribute("data-theme");
        const preferDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const effective = current || (preferDark ? "dark" : "light");
        root.setAttribute(
          "data-theme",
          effective === "dark" ? "light" : "dark"
        );
      });
    </script>
  </body>
</html>
