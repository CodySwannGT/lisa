<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lisa Console — Project Settings</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230e6272'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='19' font-weight='bold' fill='white' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg: #f4f7f7;
        --surface: #ffffff;
        --surface2: #ecf1f1;
        --ink: #162326;
        --muted: #5b6d72;
        --faint: #8ba0a5;
        --line: #dce4e5;
        --line-strong: #c3cfd1;
        --accent: #0e6272;
        --accent-ink: #ffffff;
        --accent-soft: #e1eef1;
        --good: #22773c;
        --good-soft: #e2f0e6;
        --warn: #93610a;
        --warn-soft: #f6ecd6;
        --crit: #b3372c;
        --crit-soft: #f8e5e2;
        --chip-bg: #eef3f3;
        --shadow:
          0 1px 2px rgba(22, 35, 38, 0.06), 0 4px 16px rgba(22, 35, 38, 0.05);
        --mono:
          ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --sans:
          system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1618;
          --surface: #151f22;
          --surface2: #1b282c;
          --ink: #e6edee;
          --muted: #94a7ab;
          --faint: #6c8085;
          --line: #243438;
          --line-strong: #35494e;
          --accent: #5cb9ca;
          --accent-ink: #06282e;
          --accent-soft: #10373f;
          --good: #63c184;
          --good-soft: #12301c;
          --warn: #d9a441;
          --warn-soft: #33270e;
          --crit: #e07862;
          --crit-soft: #3a1712;
          --chip-bg: #1d2b2f;
          --shadow:
            0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.25);
        }
      }
      :root[data-theme="light"] {
        --bg: #f4f7f7;
        --surface: #ffffff;
        --surface2: #ecf1f1;
        --ink: #162326;
        --muted: #5b6d72;
        --faint: #8ba0a5;
        --line: #dce4e5;
        --line-strong: #c3cfd1;
        --accent: #0e6272;
        --accent-ink: #ffffff;
        --accent-soft: #e1eef1;
        --good: #22773c;
        --good-soft: #e2f0e6;
        --warn: #93610a;
        --warn-soft: #f6ecd6;
        --crit: #b3372c;
        --crit-soft: #f8e5e2;
        --chip-bg: #eef3f3;
        --shadow:
          0 1px 2px rgba(22, 35, 38, 0.06), 0 4px 16px rgba(22, 35, 38, 0.05);
      }
      :root[data-theme="dark"] {
        --bg: #0e1618;
        --surface: #151f22;
        --surface2: #1b282c;
        --ink: #e6edee;
        --muted: #94a7ab;
        --faint: #6c8085;
        --line: #243438;
        --line-strong: #35494e;
        --accent: #5cb9ca;
        --accent-ink: #06282e;
        --accent-soft: #10373f;
        --good: #63c184;
        --good-soft: #12301c;
        --warn: #d9a441;
        --warn-soft: #33270e;
        --crit: #e07862;
        --crit-soft: #3a1712;
        --chip-bg: #1d2b2f;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.25);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.55;
        background: var(--bg);
        color: var(--ink);
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }
      ::placeholder {
        color: var(--faint);
      }

      .proto-strip {
        background: var(--accent);
        color: var(--accent-ink);
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.02em;
        padding: 5px 12px;
      }
      .proto-strip strong {
        font-weight: 650;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        gap: 16px;
        height: 56px;
        padding: 0 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: -0.01em;
        font-size: 15px;
      }
      .brand-mark {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: var(--accent);
        color: var(--accent-ink);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 14px;
        font-family: var(--mono);
      }
      .brand .console-tag {
        color: var(--muted);
        font-weight: 450;
      }
      .project-switch {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 5px 10px;
        background: var(--surface2);
        cursor: pointer;
        font-size: 13px;
      }
      .project-switch .repo {
        font-family: var(--mono);
        font-size: 12.5px;
      }
      .project-switch .caret {
        color: var(--faint);
        font-size: 10px;
      }
      .topbar .spacer {
        flex: 1;
      }
      .search-wrap {
        position: relative;
      }
      .search-wrap input {
        width: 260px;
        padding: 7px 12px 7px 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        outline: none;
      }
      .search-wrap input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .search-wrap .icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--faint);
        font-size: 13px;
      }
      .icon-btn {
        border: 1px solid var(--line);
        background: var(--surface2);
        border-radius: 8px;
        width: 34px;
        height: 34px;
        cursor: pointer;
        display: grid;
        place-items: center;
        font-size: 15px;
      }
      .icon-btn:hover {
        border-color: var(--line-strong);
      }
      .version-chip {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 99px;
        padding: 3px 10px;
      }
      .health-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--surface2);
        cursor: pointer;
      }
      .health-link:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: none;
        background: var(--muted);
      }
      .dot.ok {
        background: var(--good);
      }
      .dot.warn {
        background: var(--warn);
      }
      .dot.fail {
        background: var(--crit);
      }
      .dot.unknown {
        background: var(--muted);
      }
      .badge.pass {
        background: var(--good-soft);
        color: var(--good);
      }
      .badge.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }
      .badge.fail {
        background: var(--crit-soft);
        color: var(--crit);
      }
      .status-why {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        max-width: 26ch;
      }
      .live-status-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 42px;
        padding: 7px 20px;
        background: var(--surface2);
        border-bottom: 1px solid var(--line);
      }
      /* display:flex above would otherwise beat the `hidden` attribute. */
      .live-status-panel[hidden] {
        display: none;
      }
      .live-status-panel h2 {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .live-status-list {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .live-status-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-radius: 99px;
        background: var(--surface);
        font-family: var(--mono);
        font-size: 11px;
      }
      .plugins-state {
        padding: 18px 20px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: var(--surface2);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .plugins-state.unknown {
        border-style: solid;
        border-color: var(--warn, #c9872a);
      }
      .plugins-state.unknown b {
        display: block;
        color: var(--text);
        margin-bottom: 4px;
      }
      .plugins-live-block .plugin-status-badge.available {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .live-status-item .status-why {
        display: inline;
        margin: 0;
        max-width: 48ch;
        overflow-wrap: anywhere;
      }

      .check-item {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 13px 18px;
        border-bottom: 1px solid var(--line);
      }
      .check-item:last-child {
        border-bottom: 0;
      }
      .ck {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--line-strong);
        background: none;
        color: transparent;
        cursor: pointer;
        flex: none;
        margin-top: 1px;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 12px;
        line-height: 1;
      }
      .ck::after {
        content: "✓";
      }
      .ck:hover {
        border-color: var(--good);
      }
      .check-item.done .ck {
        background: var(--good);
        border-color: var(--good);
        color: #fff;
      }
      .ck:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }
      .ck:disabled:hover {
        border-color: var(--line-strong);
      }
      .check-content {
        flex: 1;
        min-width: 0;
      }
      .check-label {
        font-weight: 550;
        font-size: 13.5px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .check-content .desc {
        color: var(--muted);
        font-size: 12.5px;
        margin: 2px 0 5px;
        max-width: 62ch;
      }
      .check-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 3px;
        flex: none;
      }

      .app {
        display: grid;
        grid-template-columns: 250px 1fr;
        min-height: calc(100vh - 90px);
      }
      .sidebar {
        border-right: 1px solid var(--line);
        padding: 18px 12px 120px;
        background: var(--surface);
        position: sticky;
        top: 56px;
        height: calc(100vh - 56px);
        overflow-y: auto;
      }
      .nav-group {
        margin-bottom: 18px;
      }
      .nav-eyebrow {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--faint);
        font-weight: 650;
        padding: 0 10px 6px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        text-align: left;
        padding: 7px 10px;
        border: 0;
        background: none;
        border-radius: 7px;
        cursor: pointer;
        color: var(--ink);
        font-size: 13.5px;
      }
      .nav-item:hover {
        background: var(--surface2);
      }
      .nav-item.active {
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 600;
      }
      .nav-item .count {
        font-size: 11px;
        color: var(--faint);
        font-family: var(--mono);
      }
      .nav-item.active .count {
        color: var(--accent);
      }

      .main {
        padding: 28px 36px 160px;
        min-width: 0;
      }
      .section {
        max-width: 880px;
        display: none;
      }
      .section.visible {
        display: block;
      }
      .section-head {
        margin-bottom: 20px;
      }
      .section-head h1 {
        margin: 0 0 6px;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: -0.015em;
        text-wrap: balance;
      }
      .section-head p {
        margin: 0;
        color: var(--muted);
        max-width: 68ch;
      }
      .src-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        background: var(--chip-bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 8px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: var(--shadow);
        margin-bottom: 18px;
        overflow: hidden;
      }
      .card-head {
        padding: 13px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
      }
      .card-head h2 {
        margin: 0;
        font-size: 14.5px;
        font-weight: 650;
      }
      .card-head .note {
        color: var(--muted);
        font-size: 12.5px;
      }
      .card-body {
        padding: 4px 0;
      }
      .card-body.padded {
        padding: 16px 18px;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px 24px;
        align-items: center;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
      }
      .row:last-child {
        border-bottom: 0;
      }
      .row.modified {
        box-shadow: inset 3px 0 0 var(--accent);
      }
      .row .label {
        font-weight: 550;
        font-size: 13.5px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .row .desc {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 2px;
        max-width: 62ch;
      }
      .keychip {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--muted);
        background: var(--chip-bg);
        border-radius: 5px;
        padding: 1px 6px;
      }
      .row .control {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: flex-end;
      }

      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-radius: 99px;
        padding: 2px 8px;
      }
      .badge.required {
        background: var(--crit-soft);
        color: var(--crit);
      }
      .badge.local {
        background: var(--warn-soft);
        color: var(--warn);
      }
      .badge.default {
        background: var(--chip-bg);
        color: var(--muted);
      }
      .badge.on {
        background: var(--good-soft);
        color: var(--good);
      }
      .badge.off {
        background: var(--chip-bg);
        color: var(--muted);
      }
      .badge.accent {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .badge.na {
        background: transparent;
        color: var(--faint);
        border: 1px dashed var(--line-strong);
      }

      .switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex: none;
        cursor: pointer;
      }
      .switch input {
        position: absolute;
        opacity: 0;
        inset: 0;
        margin: 0;
        cursor: pointer;
      }
      .switch .trk {
        position: absolute;
        inset: 0;
        border-radius: 99px;
        /* Off reads as an empty, recessed well; on reads as a filled accent
           track. Border + inset shadow are what make the off state legible
           against the card background instead of looking like a flat pill. */
        background: var(--surface2);
        border: 1px solid var(--line-strong);
        box-shadow: inset 0 1px 2px rgba(22, 35, 38, 0.12);
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .switch .trk::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--faint);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        transition:
          transform 0.15s,
          background 0.15s;
      }
      .switch input:checked + .trk {
        background: var(--accent);
        border-color: var(--accent);
        box-shadow: none;
      }
      .switch input:checked + .trk::after {
        transform: translateX(16px);
        background: #fff;
      }
      .switch input:focus-visible + .trk {
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      /* The state word is what actually makes on/off unambiguous — the track
         alone reads as decoration at a glance. */
      .switch-wrap {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .switch-state {
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--faint);
        min-width: 22px;
      }
      .switch-state.on {
        color: var(--accent);
      }

      select.ctl,
      input.ctl {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface);
        padding: 6px 10px;
        min-width: 120px;
        outline: none;
        font-size: 13px;
      }
      select.ctl:focus,
      input.ctl:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      input.ctl.num {
        width: 86px;
        min-width: 0;
        text-align: right;
        font-family: var(--mono);
        font-variant-numeric: tabular-nums;
      }
      input.ctl.mono,
      select.ctl.mono {
        font-family: var(--mono);
        font-size: 12.5px;
      }
      input.ctl.wide {
        width: 260px;
      }
      .unit {
        color: var(--faint);
        font-size: 12px;
      }

      .tagbox {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
        max-width: 340px;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: var(--mono);
        font-size: 11.5px;
        background: var(--chip-bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 7px;
      }
      .tag button {
        border: 0;
        background: none;
        color: var(--faint);
        cursor: pointer;
        padding: 0;
        font-size: 12px;
        line-height: 1;
      }
      .tag button:hover {
        color: var(--crit);
      }
      .tag-add {
        border: 1px dashed var(--line-strong);
        background: none;
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 11.5px;
        color: var(--muted);
        cursor: pointer;
      }
      .tag-add:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .action-btn {
        border: 1px solid var(--accent);
        color: var(--accent);
        background: none;
        border-radius: 7px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .action-btn:hover {
        background: var(--accent-soft);
      }
      .action-btn:disabled {
        border-color: var(--line-strong);
        color: var(--muted);
        background: var(--surface2);
        cursor: not-allowed;
      }
      .readonly-reason {
        display: block;
        margin-top: 6px;
        max-width: 28ch;
      }

      .envmap {
        display: grid;
        grid-template-columns: repeat(3, auto);
        gap: 8px;
      }
      .envmap .cell {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .envmap .cell span {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--faint);
        font-weight: 600;
      }
      .envmap input {
        width: 110px;
      }

      .tabs {
        display: flex;
        gap: 4px;
        padding: 10px 18px 0;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      .tab {
        border: 0;
        background: none;
        cursor: pointer;
        padding: 8px 14px 10px;
        font-size: 13.5px;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab:hover {
        color: var(--ink);
      }
      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        font-weight: 600;
      }
      .tab .mini {
        font-size: 10px;
        margin-left: 6px;
        vertical-align: 1px;
      }

      table.grid {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      table.grid th {
        text-align: left;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--faint);
        font-weight: 650;
        padding: 10px 18px 8px;
        border-bottom: 1px solid var(--line);
      }
      table.grid th.th-help {
        cursor: help;
        text-decoration: underline dotted;
        text-underline-offset: 3px;
      }
      table.grid td {
        padding: 9px 18px;
        border-bottom: 1px solid var(--line);
        vertical-align: middle;
      }
      table.grid tr:last-child td {
        border-bottom: 0;
      }
      table.grid td.mono,
      .mono {
        font-family: var(--mono);
        font-size: 12px;
      }
      .table-scroll {
        overflow-x: auto;
      }

      .stack-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 1100px) {
        .stack-grid {
          grid-template-columns: 1fr;
        }
      }
      .stacks-state {
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: var(--surface);
        padding: 16px 18px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .stacks-state.unknown {
        border-color: var(--warn, #c99a2e);
        border-style: solid;
      }
      .stacks-state.unknown b {
        color: var(--ink);
      }
      .stack-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        overflow: hidden;
      }
      .stack-card.on {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .stack-card .head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
      }
      .stack-card .glyph {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        flex: none;
        display: grid;
        place-items: center;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 12px;
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--line);
      }
      .stack-card.on .glyph {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: transparent;
      }
      .stack-card .head .t {
        flex: 1;
        min-width: 0;
      }
      .stack-card .head .t b {
        display: block;
        font-size: 13.5px;
      }
      .stack-card .head .t i {
        display: block;
        font-style: normal;
        color: var(--muted);
        font-size: 11.5px;
      }
      .stack-card .meta {
        padding: 0 14px 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .stack-card .detect {
        padding: 8px 14px;
        border-top: 1px dashed var(--line);
        color: var(--muted);
        font-size: 11.5px;
      }
      .stack-card .detect code {
        font-family: var(--mono);
        font-size: 10.5px;
        background: var(--chip-bg);
        border-radius: 4px;
        padding: 1px 4px;
      }
      details.stack-more {
        border-top: 1px solid var(--line);
      }
      details.stack-more summary {
        cursor: pointer;
        padding: 8px 14px;
        font-size: 12px;
        color: var(--accent);
        list-style: none;
      }
      details.stack-more summary::before {
        content: "▸ ";
      }
      details.stack-more[open] summary::before {
        content: "▾ ";
      }
      details.stack-more ul {
        margin: 0;
        padding: 0 14px 12px 28px;
        color: var(--muted);
        font-size: 12px;
      }
      details.stack-more li {
        margin-bottom: 3px;
      }

      .tile-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 18px;
      }
      @media (max-width: 1100px) {
        .tile-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .tile {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
        box-shadow: var(--shadow);
      }
      .tile .k {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--faint);
        font-weight: 650;
      }
      .tile .v {
        font-size: 19px;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
      }
      .tile .s {
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 2px;
      }
      .tile .v .dim {
        color: var(--faint);
        font-weight: 450;
        font-size: 14px;
      }

      .flow {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 14px 18px;
      }
      .flow .state {
        font-family: var(--mono);
        font-size: 11.5px;
        border: 1px solid var(--line);
        background: var(--chip-bg);
        border-radius: 99px;
        padding: 3px 10px;
      }
      .flow .state.terminal {
        border-color: var(--good);
        color: var(--good);
        background: var(--good-soft);
      }
      .flow .arr {
        color: var(--faint);
        font-size: 11px;
      }

      .colorchip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: var(--mono);
        font-size: 11.5px;
      }
      .colorchip .swatch {
        width: 12px;
        height: 12px;
        border-radius: 4px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        flex: none;
      }

      .callout {
        display: flex;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface2);
        font-size: 12.5px;
        color: var(--muted);
        margin-bottom: 18px;
      }
      .callout.warn {
        background: var(--warn-soft);
        border-color: transparent;
        color: var(--warn);
      }
      .callout b {
        color: inherit;
      }

      .savebar {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translate(-50%, 90px);
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--ink);
        color: var(--bg);
        border-radius: 12px;
        padding: 10px 12px 10px 18px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2),
          visibility 0.25s;
        visibility: hidden;
        z-index: 60;
      }
      .savebar.show {
        transform: translate(-50%, 0);
        visibility: visible;
      }
      .savebar .msg {
        font-size: 13px;
      }
      .savebar .msg b {
        font-variant-numeric: tabular-nums;
      }
      .savebar button {
        border: 0;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
      }
      .savebar .discard {
        background: transparent;
        color: var(--bg);
        opacity: 0.75;
      }
      .savebar .discard:hover {
        opacity: 1;
      }
      .savebar .save {
        background: var(--accent);
        color: var(--accent-ink);
      }
      .savebar .save:disabled {
        background: var(--surface2);
        color: var(--muted);
        cursor: not-allowed;
      }

      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translate(-50%, 20px);
        background: var(--good);
        color: #fff;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 550;
        opacity: 0;
        pointer-events: none;
        transition: all 0.25s;
        z-index: 70;
      }
      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .hooks-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 1100px) {
        .hooks-grid {
          grid-template-columns: 1fr;
        }
      }
      .hook-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
      }
      .hook-card .hd {
        padding: 11px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hook-card .hd .nm {
        font-family: var(--mono);
        font-size: 12.5px;
        font-weight: 650;
      }
      .hook-card .steps {
        padding: 6px 0;
      }
      .hook-step {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        font-size: 12.5px;
      }
      .hook-step .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--good);
        flex: none;
      }
      .hook-step.optional .dot {
        background: var(--faint);
      }
      .hook-step .what {
        flex: 1;
      }
      .hook-step .how {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--faint);
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: static;
          height: auto;
          display: flex;
          flex-wrap: wrap;
          gap: 4px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .nav-group {
          margin: 0 12px 6px 0;
        }
        .search-wrap input {
          width: 140px;
        }
        .main {
          padding: 20px 16px 160px;
        }
        .row {
          grid-template-columns: 1fr;
        }
        .row .control {
          justify-content: flex-start;
        }
        .envmap {
          grid-template-columns: 1fr;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }

      /* --- "how do I connect this?" modal --- */
      .badge-btn {
        border: 0;
        padding: 0;
        background: none;
        font: inherit;
        cursor: pointer;
        border-radius: 99px;
      }
      .badge-btn .badge {
        text-decoration: underline dotted currentColor;
        text-underline-offset: 3px;
      }
      .badge-btn:hover .badge,
      .badge-btn:focus-visible .badge {
        text-decoration: underline solid currentColor;
        outline: none;
      }
      .badge-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .howto {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        padding: 0;
        box-shadow: var(--shadow);
      }
      .howto::backdrop {
        background: rgba(22, 35, 38, 0.42);
      }
      .howto-head {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--line);
      }
      .howto-head h2 {
        margin: 0;
        font-size: 15px;
        line-height: 1.35;
      }
      .howto-head .sub {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        font-weight: 400;
        color: var(--muted);
      }
      .howto-close {
        margin-left: auto;
        flex: none;
        border: 1px solid var(--line);
        background: var(--surface2);
        color: var(--muted);
        border-radius: 6px;
        width: 26px;
        height: 26px;
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
      }
      .howto-close:hover {
        color: var(--ink);
        border-color: var(--line-strong);
      }
      .howto-body {
        padding: 14px 18px 18px;
        font-size: 13px;
        line-height: 1.55;
      }
      .howto-body p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      .howto-body ol {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 10px;
      }
      .howto-body li {
        padding-left: 2px;
      }
      .howto-body code {
        display: block;
        margin-top: 6px;
        padding: 7px 9px;
        background: var(--surface2);
        border: 1px solid var(--line);
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 12px;
        overflow-x: auto;
        white-space: pre;
      }
      .howto-foot {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        font-size: 12px;
        color: var(--muted);
      }

      /* --- gate matrix: clickable obligation + per-layer status dots --- */
      .linklike {
        border: 0;
        padding: 0;
        background: none;
        font: inherit;
        color: inherit;
        cursor: pointer;
        text-align: left;
        text-decoration: underline dotted var(--line-strong);
        text-underline-offset: 3px;
      }
      .linklike:hover,
      .linklike:focus-visible {
        text-decoration: underline solid var(--accent);
        color: var(--accent);
        outline: none;
      }
      .grid th.center,
      .grid td.gate-cell {
        text-align: center;
      }
      .gate-cell .dot {
        display: inline-block;
      }
      .dot.warn {
        background: var(--warn);
      }
      /* --- staff picker: which coding agent a factory page is read for --- */
      .staff-card {
        padding: 12px 16px;
      }
      .staff-head {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .staff-label {
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .staff-opts {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 3px;
        background: var(--surface2);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .staff-opt {
        border: 0;
        background: none;
        font: inherit;
        font-size: 12px;
        color: var(--muted);
        padding: 5px 11px;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
      }
      .staff-opt:hover {
        color: var(--ink);
      }
      .staff-opt.active {
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 600;
      }
      /* The three environment cards are siblings of every other card on the
         page — display:contents keeps them in the section's own flow rather
         than nesting them in a box that would read as one grouped thing. */
      .env-cards {
        display: contents;
      }
      .card.env-gap {
        border-left: 3px solid var(--warn);
      }
      .staff-warn {
        margin-top: 8px;
        padding: 8px 11px;
        border-radius: 7px;
        background: var(--warn-soft);
        color: var(--warn);
        font-size: 12px;
        line-height: 1.5;
      }

      .howto-meta {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 14px;
        margin: 0 0 14px;
        padding: 10px 12px;
        background: var(--surface2);
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 12px;
      }
      .howto-meta .hm-k {
        color: var(--muted);
      }
      .howto-meta .hm-v {
        color: var(--ink);
        font-family: var(--mono);
      }

      /* --- multi-select provider control --- */
      .ms {
        position: relative;
        display: inline-block;
      }
      .ms-summary {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        border-radius: 6px;
        padding: 4px 22px 4px 8px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        text-align: left;
        max-width: 220px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        background-image:
          linear-gradient(45deg, transparent 50%, var(--faint) 50%),
          linear-gradient(135deg, var(--faint) 50%, transparent 50%);
        background-position:
          calc(100% - 12px) 50%,
          calc(100% - 8px) 50%;
        background-size:
          4px 4px,
          4px 4px;
        background-repeat: no-repeat;
      }
      .ms-summary:hover {
        border-color: var(--line-strong);
      }
      .ms-summary.ms-empty {
        color: var(--faint);
      }
      .ms-pop {
        display: none;
        position: absolute;
        z-index: 40;
        top: calc(100% + 4px);
        left: 0;
        min-width: 100%;
        max-height: 240px;
        overflow-y: auto;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 4px;
      }
      .ms.open .ms-pop {
        display: block;
      }
      .ms-opt {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        border-radius: 5px;
        font-size: 12px;
        white-space: nowrap;
        cursor: pointer;
      }
      .ms-opt:hover {
        background: var(--surface2);
      }
    </style>
  </head>
  <body>
    <div class="proto-strip">
      <strong>Prototype</strong> — every setting below is editable in the UI,
      but nothing is persisted yet. Values shown reflect Lisa's real defaults.
    </div>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">L</span> Lisa
        <span class="console-tag">Console</span>
      </div>
      <button
        class="project-switch"
        type="button"
        title="Project switcher (prototype)"
      >
        <span class="repo">acme/acme-app</span> <span class="caret">▼</span>
      </button>
      <div class="spacer"></div>
      <div class="search-wrap">
        <span class="icon">⌕</span>
        <input
          id="search"
          type="search"
          placeholder="Filter settings in this section…"
          aria-label="Filter settings"
        />
      </div>
      <button
        class="version-chip health-link"
        id="healthChip"
        type="button"
        title="Lisa health — click for details"
      >
        <span class="dot" aria-hidden="true"></span> @codyswann/lisa · checking…
      </button>
      <button
        class="icon-btn"
        id="themeToggle"
        type="button"
        title="Toggle theme"
        aria-label="Toggle theme"
      >
        ◐
      </button>
    </header>
    <!-- Live status strip: HIDDEN for now. The probe fetch still runs and still
         paints the pages that consume it (Monitoring providers, CI quality
         jobs, Automations) — only this summary strip is hidden, because it
         renders raw probe payloads as unreadable JSON blobs. Unhide by removing
         the `hidden` attribute once each probe result has a human-readable
         rendering. -->
    <section
      class="live-status-panel"
      aria-labelledby="liveStatusHeading"
      aria-live="polite"
      aria-atomic="true"
      role="status"
      hidden
    >
      <h2 id="liveStatusHeading">Live status</h2>
      <div class="live-status-list" id="liveStatusList" role="list">
        <span class="live-status-item" role="listitem">Loading…</span>
      </div>
    </section>
    <div class="app">
      <nav class="sidebar" id="nav" aria-label="Settings sections"></nav>
      <main class="main" id="main"></main>
    </div>
    <dialog class="howto" id="howto" aria-labelledby="howtoTitle">
      <div class="howto-head">
        <h2 id="howtoTitle"></h2>
        <button
          class="howto-close"
          id="howtoClose"
          type="button"
          aria-label="Close"
        >
          ×
        </button>
      </div>
      <div class="howto-body" id="howtoBody"></div>
    </dialog>
    <div class="savebar" id="savebar" role="status">
      <span class="msg"
        ><b id="dirtyCount">0</b> unsaved change<span id="dirtyPlural"
          >s</span
        ></span
      >
      <button class="discard" id="discardBtn" type="button">Discard</button>
      <button
        class="save"
        id="saveBtn"
        type="button"
        disabled
        title="read-only: the write-path has not shipped yet"
        aria-describedby="saveReadonlyReason"
      >
        Save changes
      </button>
      <span class="status-why readonly-reason" id="saveReadonlyReason">
        read-only: the write-path has not shipped yet
      </span>
    </div>
    <div class="toast" id="toast"></div>
    <script>
      "use strict";
      document.title = "Lisa Console — Project Settings";

      /* ------------------------------------------------------------------ *
       * Catalog data. Shapes:
       *  section: { id, group, title, desc, src, blocks: [block] }
       *  block:   { card, note?, rows } | { type: 'tabs'|'table'|'tiles'|'stacks'|'flow'|'hooks'|'callout', ... }
       *  row:     { key, label, desc, badges?, control }
       *  control: { type: 'toggle'|'select'|'text'|'number'|'tags'|'envmap'|'static', ... }
       * ------------------------------------------------------------------ */

      const sel = (value, options) => ({ type: "select", value, options });
      const tog = value => ({ type: "toggle", value });
      const txt = (value, opts) =>
        Object.assign({ type: "text", value }, opts || {});
      const num = (value, unit) => ({ type: "number", value, unit });
      const tags = values => ({ type: "tags", values });
      const envmap = (dev, staging, production) => ({
        type: "envmap",
        dev,
        staging,
        production,
      });
      const stat = (value, cls) => ({ type: "static", value, cls });

      const SEVERITIES = ["error", "warn", "off"];

      const DATA = {
        groups: [
          {
            label: "Project",
            sections: [
              "overview",
              "setup",
              "health",
              "general",
              "stacks",
              "starters",
              "remote",
            ],
          },
          {
            label: "Factories",
            sections: [
              "factory-research",
              "factory-plan",
              "factory-implement",
              "factory-verify",
              "signals",
              "credentials",
              "environments",
              // The staff that run the factories — every factory page picks
              // one of these, and its capabilities change what that page shows.
              "agents",
            ],
          },
          {
            label: "Delivery",
            sections: [
              "workflow",
              "tracker",
              "prd",
              "deploy",
              "pipelines",
              "automations",
              "monitor",
            ],
          },
          {
            label: "Quality",
            sections: ["linting", "testing", "hooks", "ci", "qa"],
          },
          { label: "Distribution", sections: ["repository", "plugins"] },
          { label: "Advanced", sections: ["advanced"] },
        ],
        sections: {},
      };

      /* ---------------------------------- Overview ---------------------------------- */

      /* ---------------------------------- Factories ---------------------------------- */
      /* MOCK ONLY. The factory pages illustrate the readiness model —
               obligation × provider × enforcement point, then the same obligations
               re-asked across staff (which coding agent) and environment (where it
               runs). None of these cells are wired to a probe yet; every value below
               is illustrative. Wiring them means replacing the literal rows with
               probe-painted cells, the way Monitoring's "Connected providers" table
               already works. */

      /* ===================================================================
               PROPOSED-CAPABILITY MARKER — read this before implementing anything
               these pages describe.
               ===================================================================
               Some of this UI shows Lisa capabilities that DO NOT EXIST YET. The
               mock is the spec for them. Every such spot is marked with a comment
               beginning `PROPOSED:` so they can all be found with one grep:

                   rg "PROPOSED:" ui/index.html

               A PROPOSED block always states four things, in this order:
                 1. What to build   — the command/behaviour the UI implies.
                 2. Why             — the problem it solves that today's surface
                                      does not.
                 3. Today           — what actually exists right now, so the
                                      implementer can see the delta.
                 4. Replaces        — existing skills/commands that should be
                                      folded in or retired, if any.

               Rule: never quietly "fix" the UI to match what Lisa can do today.
               The gap is deliberate. Build the capability, then delete the marker.
               =================================================================== */

      /* Cell states are deliberately tri-state-plus: green means proven, amber
               means partial, red means a real gap, grey means either not-applicable
               or never-exercised. Grey is NOT a pass — an obligation that has never
               been run must never render as green. */
      function fCell(v, how) {
        const cls =
          v === "yes" || v === "ready" || v === "proven"
            ? "pass"
            : v === "partial"
              ? "warn"
              : v === "no" || v === "gap"
                ? "fail"
                : "default";
        return how ? { t: "badge", v, cls, how } : { t: "badge", v, cls };
      }

      /* Bypassability is its own vocabulary because "no" is the good answer:
               only server-side enforcement is unskippable, everything earlier is a
               fast-feedback mirror of the same rule. */
      function fBypass(v, how) {
        const cls =
          v === "blocked" ? "pass" : v === "possible" ? "warn" : "fail";
        return how ? { t: "badge", v, cls, how } : { t: "badge", v, cls };
      }

      /* Gate matrix cells. gObl = the obligation name (clickable when the gate
               has a gap). gGate = one enforcement layer's status: true enforced,
               "warn" runs-but-does-not-gate, false not-here. Bypassability is not a
               column any more — it is read off the row: the rightmost server-side
               layer being green is what makes an obligation unskippable. */
      function gObl(v, how) {
        return how ? { t: "obl", v, how } : { t: "obl", v };
      }
      function gGate(on) {
        return { t: "gate", on };
      }
      function gProv(values, options) {
        return { t: "multiselect", values, options, mono: true };
      }

      /* A single enforcement layer as a clickable yes/no. Setup and verify
               commands default per layer kind; the caller supplies the event binding
               (and, for CI, whether the check is required to merge) plus any
               obligation-specific note. When a wired version replaces this, these
               defaults become whatever the probe reports about the installed hook. */
      const LAYER_DEFS = {
        agent: {
          name: "Agent hook",
          setup: "/lisa:apply",
          verify: "/lisa:doctor",
        },
        git: {
          name: "Git hook",
          setup: "/lisa:apply",
          verify: "/lisa:doctor",
        },
        ci: {
          name: "CI",
          setup: "/lisa:apply",
          verify: "/lisa:verify:workflow-change",
          note: null,
        },
      };
      function layerCell(kind, on, opts) {
        opts = opts || {};
        const d = LAYER_DEFS[kind];
        // Per-gate setup/verify commands when a slug is supplied; the generic
        // apply/doctor commands otherwise.
        const setup = opts.slug ? "/lisa:setup:gate:" + opts.slug : d.setup;
        const verify = opts.slug ? "/lisa:verify:gate:" + opts.slug : d.verify;
        const enabled = on === true;
        const na = on === "na";
        const meta = [];
        if (enabled && opts.event) meta.push({ k: "Event", v: opts.event });
        if (kind === "ci" && enabled) {
          meta.push({
            k: "Required to merge",
            v: opts.required ? "Yes" : "No",
          });
        }
        let steps;
        if (na) {
          steps = [
            {
              text: "Not applicable to this project — there is no deployed web or API surface to scan. It becomes a gate on a stack that has one.",
              cmd: setup,
            },
          ];
        } else if (enabled) {
          steps = [
            {
              text: "Set up this gate — the command asks which layers to enforce it at, and with which provider.",
              cmd: setup,
            },
            { text: "Verify it fires.", cmd: verify },
          ];
        } else {
          steps = [
            {
              text: "Not enforced at this layer. Set the gate up and enable it here.",
              cmd: setup,
            },
          ];
        }
        const subState = enabled
          ? " — enforced here"
          : na
            ? " — not applicable"
            : " — not enforced here";
        return {
          t: "layer",
          kind, // read at render time so the cell can defer to the selected agent
          on,
          how: {
            title: opts.for || d.name,
            sub: d.name + subState,
            intro: opts.intro,
            meta,
            steps,
            foot: opts.foot || (na ? null : d.note) || undefined,
          },
        };
      }

      /* An agent-layer cell is only as real as the agent running the factory.
               Where the selected agent has no working hook surface, the cell reports
               n/a with the capability reason — never "no", which would imply the
               operator forgot to turn something on. */
      function resolveLayerCell(cell) {
        if (cell.kind !== "agent") return cell;
        const caps = currentCaps();
        if (caps.agentHooks === true) return cell;

        // Unproven. Never rendered as enforced, never as a flat capability gap.
        if (caps.agentHooks === "unverified") {
          return {
            ...cell,
            on: "na",
            how: {
              title: cell.how ? cell.how.title : "Agent hook",
              sub: caps.label + " — unverified",
              intro: caps.hookWhy,
              meta: [
                { k: "Agent", v: caps.label },
                { k: "Agent-layer hooks", v: "unproven" },
              ],
              steps: [
                {
                  text: "Prove it either way by tripping the rule in a real headless run for this agent.",
                  cmd: "/lisa:verify:gate:<name>",
                },
              ],
              foot: "Unverified is not the same as unsupported. Rendering it as enforced would be a lie; rendering it as a capability gap would be a different lie.",
            },
          };
        }

        return {
          ...cell,
          on: "na",
          how: {
            title: cell.how ? cell.how.title : "Agent hook",
            sub: caps.label + " — capability gap",
            intro:
              caps.hookWhy +
              " This is a property of the agent, not of your configuration, so there is nothing here to switch on.",
            meta: [
              { k: "Agent", v: caps.label },
              { k: "Agent-layer hooks", v: "unsupported" },
            ],
            steps: [
              {
                text: "Nothing to set up for this agent. The rule still holds — it is enforced at the layers below, which every agent shares.",
                cmd: "the Git hook and CI columns",
              },
            ],
            foot: "Lisa's parity rule: where a capability cannot be represented on an agent, the gap is documented rather than silently dropped. This cell is that documentation.",
          },
        };
      }
      /* Build a full gate row. layers = {agent, git, ci}, each an opts object
               carrying at least {on}. The obligation string is threaded into every
               cell's modal title so each layer modal names what it enforces. */
      function gateRow(obl, slug, provider, layers) {
        // o.on is tri-state: true | false | "na" — pass it through raw.
        const withFor = (kind, o) =>
          layerCell(kind, o.on, Object.assign({ for: obl, slug }, o));
        return [
          { t: "text", v: obl },
          provider,
          withFor("agent", layers.agent),
          withFor("git", layers.git),
          withFor("ci", layers.ci),
        ];
      }

      function fGates(rows) {
        return {
          type: "table",
          card: "Flows and gates",
          note: "The obligation is fixed; the provider is swappable. Change the tool, not the rule.",
          cols: [
            {
              v: "Obligation",
              tip: "What must be true. This does not change when you change tools.",
            },
            {
              v: "Provider",
              tip: "The tool currently satisfying the obligation. Swappable.",
            },
            {
              v: "Enforced at",
              tip: "Where the gate actually fires. Only server-side enforcement cannot be skipped.",
            },
            {
              v: "Bypass",
              tip: "blocked = the worker cannot skip it · possible = local-only, skippable · unenforced = nothing stops it",
            },
            { v: "State" },
          ],
          rows: rows.map(r => [
            { t: "text", v: r[0] },
            { t: "mono", v: r[1] },
            { t: "text", v: r[2] },
            fBypass(r[3]),
            fCell(r[4]),
          ]),
        };
      }

      function fStaff(rows) {
        return {
          type: "table",
          card: "Staff readiness — is this factory ready for each agent?",
          note: "A red cell here is sometimes not fixable by config: if the agent lacks the surface entirely, the gap is declared, never silently dropped.",
          cols: [
            { v: "Agent", tip: "The staff that runs the factory." },
            {
              v: "Commands",
              tip: "Native slash-command surface for this factory's flows.",
            },

            },

            },
            { v: "Verdict" },
          ],
          rows: rows.map(r => [
            { t: "mono", v: r[0] },
            fCell(r[1]),
            fCell(r[2]),

      function fEnv(rows) {
        return {
          type: "table",
          card: "Environment readiness — where can this factory run?",
          note: "Interactive OAuth is the usual killer: a factory that is green locally can be red headless for reasons no config inspection reveals.",

            { v: "Where it runs" },

              tip: "The factory's tokens and keys are present in this environment.",

            },
            {
              v: "Gate enforcement",
              tip: "The gates for this factory still fire in this environment.",
            },
            { v: "Tooling", tip: "Every provider above is reachable here." },
            { v: "Verdict" },
          ],
          rows: rows.map(r => [
            { t: "text", v: r[0] },
            fCell(r[1]),
            fCell(r[2]),
            fCell(r[3]),
            fCell(r[4]),
            fCell(r[5]),
          ]),
        };
      }

      function fLegend(text) {
        return { type: "callout", text: text };
      }

      /* ===== Staff: which coding agent runs this factory =====================
               PROPOSED: per-agent factory readiness.
               1. What to build — every factory page is read FOR A PARTICULAR AGENT.
                  The factories are the production line; the coding agents are the
                  staff that run them. A factory that is fully wired for Claude can
                  be partly unusable for Codex, because the agent lacks a surface —
                  not because anything is misconfigured. Selecting an agent must
                  repaint the page against that agent's real capabilities.
               2. Why — "is this factory ready?" is not answerable without naming the
                  staff. Today the console implies one universal answer, which is
                  wrong in a fleet: a green agent-hook cell is a lie for an agent
                  whose hooks never fire.
               3. Today — the harness setting installs surfaces for every agent, and
                  the parity subsystem knows which capabilities each one lacks, but
                  none of that is surfaced as readiness. Nothing tells an operator
                  that a gate they are relying on is inert for the agent that will
                  actually run tonight.
               4. Replaces — nothing. This reads the same parity knowledge that
                  already governs artifact generation.
               DISTINCTION worth preserving: a capability GAP (this agent cannot do
               this at all) is not a configuration gap (this is not set up yet). The
               first is never actionable by the operator, so it renders n/a with the
               reason — never red, which would imply something to fix. */
      const AGENTS = [
        "claude",
        "codex",
        "cursor",
        "agy",
        "copilot",
        "opencode",
      ];
      /* agentHooks is tri-state:
                 true        — hooks fire. Whatever invocation flags that requires are
                               Lisa's problem, not the operator's, so they live in
                               code comments rather than on screen.
                 "unverified"— docs neither confirm nor deny; last empirical check
                               showed no fire. Never claim either way without proof.
                 false       — genuinely unsupported by the agent.
               Verified against vendor docs 2026-07-24. Codex and Copilot both moved:
               they previously appeared to have no headless hook support, and both now
               document it. Re-check on a cadence — this is the fastest-moving surface
               in the whole console, and a stale "false" here silently tells an
               operator a gate is inert when it is not. */
      const AGENT_CAPS = {
        claude: {
          label: "Claude Code",
          agentHooks: true,
          commands: true,
        },
        codex: {
          // Hooks fire in `codex exec`, but only when the invocation passes
          // `--dangerously-bypass-hook-trust` (hook trust is granted
          // interactively, so an unattended run without the flag silently runs
          // zero hooks while still reporting success). That is Lisa's job to
          // get right in how it invokes Codex — not something to surface to an
          // operator, who has no action to take. Kept here as an
          // implementation note for whoever wires the invocation.
          label: "Codex",
          agentHooks: true,
          commands: false,
        },
        cursor: {
          label: "Cursor",
          agentHooks: true,
          commands: true,
        },
        agy: {
          label: "Antigravity",
          agentHooks: "unverified",
          commands: true,
          hookWhy:
            "Antigravity documents plugin hooks (hooks.json) and a headless mode, but nothing states whether hooks fire in a non-TTY run, and the last empirical check showed they did not. Treat as unproven until a run proves otherwise.",
        },
        copilot: {
          label: "Copilot",
          agentHooks: true,
          commands: true,
        },
        opencode: {
          label: "OpenCode",
          agentHooks: true,
          commands: true,
        },
      };
      /* The currently-selected staff. Every factory page renders against it. */
      DATA.staff = "claude";
      function currentCaps() {
        return AGENT_CAPS[DATA.staff] || AGENT_CAPS.claude;
      }
      function fStaffPicker() {
        return { type: "staff" };
      }

                /* PROPOSED: /lisa:setup:prd-source and /lisa:verify:prd-source

      /* ---------------------------------- Credentials ---------------------------------- */
      /* PROPOSED: the credential map — /lisa:setup:credentials and
               /lisa:verify:credentials, plus per-connection identity provisioning
               ------------------------------------------------------------------
               1. What to build — a central inventory of every credential the
                  factories use, keyed by (connection × surface), recording: does the
                  AGENT have its own identity for this connection, which store holds
                  it, which identity path each surface uses (OIDC federation /
                  human session / service-account token), and when it was last
                  PROVEN by being exercised from that surface. Plus the two
                  infrastructure choices below: which credential store, and whether
                  an egress proxy substitutes values so the agent never reads them.
               2. Why — Lisa already refuses to put secret values in config, but it
                  has no idea whether a given surface can actually authenticate. That
                  gap is the whole "green locally, red headless" failure class, and
                  it is what makes intake's "provable access to tooling" gate
                  aspirational rather than real. A vault can tell you a secret
                  exists; only exercising it from the surface tells you the factory
                  can run there.
               3. Today — credentials live in env vars, the OS keychain, and CI
                  secrets, provisioned by hand per vendor. Nothing enumerates them,
                  nothing knows which surface each serves, and nothing proves them.
               4. Replaces — nothing. Lisa does NOT become a vault; storage stays
                  with whatever store is chosen below. Lisa owns the map and the
                  proof, not the secrets.
               DEFAULT STANCE (load-bearing): the agent gets its own identity for
               every connection, on EVERY surface including the local workstation.
               The human's credentials are not the agent's ambient authority.
               "Driving" — the agent acting as the human — is an explicit, bounded
               elevation, never the default. This is what makes a local run predict a
               headless run: same identity, same path, same result. */

      /* ---------------------------------- Environments ---------------------------------- */
      /* PROPOSED: environments as a first-class, per-agent concept.
               1. What to build — a roster of the places a factory can run, where
                  "Remote" is NOT one thing: every coding agent ships its own hosted
                  runtime, so the remote row changes identity with the staff. Lisa
                  needs to know which environments are provisioned, how credentials
                  reach each one, and which scheduler drives unattended work there.
               2. Why — the console keeps asking "local or headless?" as if headless
                  were a single place. It is not: Claude's hosted runtime, Codex's,
                  and a GitHub Actions runner are different substrates with different
                  credential paths and different schedulers. Collapsing them hides the
                  question an operator actually has — "will tonight's run work, on the
                  thing that will actually run it?"
               3. Today — `harness` picks which agents get surfaces installed, and CI
                  is configured per workflow. Nothing models the vendor remotes at
                  all, and nothing records which environments are proven.
               4. Replaces — nothing. This is the axis the factory Connections tables
                  already imply with their Local/Headless columns; those columns
                  should eventually be generated from this roster.
               NOTE: OpenCode has no vendor cloud — it is self-hosted, so its remote
               row is whatever infrastructure you provide. That is a real difference
               in kind, not a gap, and the page must say so rather than showing a
               missing product as a red cell. */

      /* Each environment gets its own card, because each one is independently
         configured — most importantly its own credential gateway. A gateway
         deployed locally but not in the remote leaves the remote unprotected,
         and a single shared setting would hide exactly that.

         Every environment is described by the same three trigger types, because
         "where it runs" and "what starts it" are independent questions that get
         conflated constantly. Local is NOT manual-only: every agent can be
         scheduled on your workstation, it just needs the machine awake. And the
         vendor remotes are not schedule-only: Claude routines, for instance,
         also fire on GitHub events and on an authenticated POST.
         Verified against vendor docs 2026-07-24. */
      const GATEWAYS = [
        "none — direct injection",
        "Vault Agent",
        "1Password Connect",
        "Infisical Agent",
        "custom egress proxy",
      ];
      /* Local schedulers are per-agent: some ship a native one, and cron always
         works. All of them share one constraint — the machine has to be awake. */
      const LOCAL_SCHED = {
        claude: "Local routines · /loop · cron",
        codex: "local automations (~/.codex/automations) · cron",
        agy: "Antigravity schedules · cron",
        cursor: "cron",
        copilot: "cron",
        opencode: "cron",
      };
      function buildEnvironments() {
        const caps = currentCaps();
        const remote = REMOTE_ENVS[DATA.staff] || REMOTE_ENVS.claude;
        const wrap = el("div", "env-cards");
        const trig = (label, desc, value) => ({
          key: "",
          label,
          desc,
          control: stat(value, "mono"),
        });
        const gatewayRows = (scope, gatewayDesc, egressDesc) => [
          {
            key: "environments." + scope + ".gateway",
            label: "Credential gateway",
            desc: gatewayDesc,
            control: sel("none — direct injection", GATEWAYS),
          },
          {
            key: "environments." + scope + ".egressLock",
            label: "Restrict egress to the gateway",
            desc: egressDesc,
            control: tog(false),
          },
        ];

        wrap.appendChild(
          buildCard({
            card: "Local — your workstation",
            note: "Not a privileged environment. The same factories, the same agent identity — just better latency, worse uptime, and a human nearby who could intervene.",
            rows: [
              trig(
                "Manual runs",
                "You invoke a factory in a session.",
                "a CLI session"
              ),
              trig(
                "Scheduled runs",
                "Local scheduling is a first-class feature, not a workaround — Claude creates these from the same Routines page, choosing Local instead of Cloud. It only runs while the app is open and the machine is awake; a run that falls during sleep is skipped, then caught up once on wake. In exchange it gets access to local files and a 1-minute minimum interval.",
                LOCAL_SCHED[DATA.staff] || "cron"
              ),
              trig(
                "Event-driven runs",
                "Local routines take a schedule only. Anything that has to start from an API call or a repository event needs the hosted runtime instead — that is the documented reason to reach for a remote routine rather than a local one.",
                "— none —"
              ),
              {
                key: "",
                label: "Credential path",
                desc: "The agent authenticates as itself, not as you. That is what makes a local pass predict a headless pass.",
                control: stat("agent service account", "mono"),
              },
              ...gatewayRows(
                "local",
                "Substitutes real values into outbound requests so the agent only handles placeholders. None means secrets land in the agent's environment where it — and anything reaching its context — can read them.",
                "A gateway only protects what passes through it. Without this, an agent that can run shell reaches the network directly and bypasses it."
              ),
            ],
          })
        );

        wrap.appendChild(
          buildCard({
            card: "CI — the authoritative tier",
            note: "Where the gates actually gate: every check marked required to merge fires here, server-side, where the worker cannot skip it. Also the one environment that can usually hold no secret at all.",
            rows: [
              {
                key: "ci.provider",
                label: "Provider",
                desc: "The gate workflows are generated for whichever system is selected.",
                control: sel("GitHub Actions", [
                  "GitHub Actions",
                  "GitLab CI",
                  "Jenkins",
                  "CircleCI",
                  "Buildkite",
                ]),
              },
              trig(
                "Manual runs",
                "A workflow can be dispatched by hand from the UI or the CLI, with inputs.",
                "workflow_dispatch"
              ),
              trig(
                "Scheduled runs",
                "Cron in the workflow itself. Runs against the default branch, not your local one.",
                "schedule (cron)"
              ),
              trig(
                "Event-driven runs",
                "The common case — repository activity starts the run. This is what makes CI the tier that can gate a merge.",
                "push · pull_request · release"
              ),
              {
                key: "",
                label: "Credential path",
                desc: "Federation mints a short-lived token the provider already trusts — nothing stored, nothing to rotate, nothing to leak.",
                control: stat("OIDC federation", "mono"),
              },
              ...gatewayRows(
                "ci",
                "Less load-bearing here than elsewhere: where federation is in use there is no long-lived secret for a gateway to hide.",
                "Runners have broad network access by default. Locking egress is what turns a gateway from advisory into enforcement."
              ),
            ],
          })
        );

        const remoteCard = buildCard({
          card: "Remote — " + remote.name,
          note: remote.blurb,
          rows: [
            {
              key: "",
              label: "Provider",
              desc:
                "Vendor-provided by " +
                caps.label +
                ". This is the card that changes with the agent selected above.",
              control: stat(remote.name, "mono"),
            },
            trig(
              "Manual runs",
              "Dispatching a one-off run to the hosted runtime without waiting for a trigger.",
              remote.manual
            ),
            trig(
              "Scheduled runs",
              remote.scheduled === "— none —"
                ? "No vendor scheduler for this runtime."
                : "Runs on the vendor's own scheduler, so it keeps working with your laptop closed — the thing local scheduling cannot do. The tradeoff runs the other way on granularity: hosted schedulers impose a floor that local scheduling does not.",
              remote.scheduled
            ),
            trig(
              "Event-driven runs",
              remote.event === "— none —"
                ? "Nothing external can start a run here."
                : "External systems can start a run. This is what lets a monitor or a deploy pipeline hand work to a factory directly.",
              remote.event
            ),
            {
              key: "",
              label: "Credential path",
              desc:
                remote.state === "na"
                  ? "No vendor runtime, so no vendor secret store — the identity is whatever your own infrastructure provides."
                  : "The structural weak link: no human to authenticate and usually no federation, so a long-lived token in the runtime's secret store. Scope it narrowly and rotate it often.",
              control: stat(
                remote.state === "na"
                  ? "yours to provide"
                  : "service account token",
                "mono"
              ),
            },
            ...gatewayRows(
              "remote",
              "Matters most here, precisely because this is where the long-lived credentials live. A gateway configured locally does nothing for this environment.",
              "Vendor sandboxes vary in how much network they allow. Without a restriction the gateway is advisory."
            ),
          ],
        });
        if (remote.state === "gap") remoteCard.classList.add("env-gap");
        wrap.appendChild(remoteCard);
        return wrap;
      }

      function openHowto(how) {

          how.meta.forEach(m => {
            dl.appendChild(el("span", "hm-k", esc(m.k)));

          });

        }
        if (Array.isArray(how.steps) && how.steps.length > 0) {

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function markDirty(id, rowEl) {
        dirty.add(id);
        if (rowEl) rowEl.classList.add("modified");
        updateSavebar();
      }
      function updateSavebar() {
        const n = dirty.size;
        document.getElementById("dirtyCount").textContent = n;
        document.getElementById("dirtyPlural").textContent = n === 1 ? "" : "s";
        $savebar.classList.toggle("show", n > 0);
      }
      const toastState = { timer: 0 };
      function showToast(message) {
        $toast.textContent = message;
        $toast.classList.add("show");
        clearTimeout(toastState.timer);
        toastState.timer = setTimeout(
          () => $toast.classList.remove("show"),
          2600
        );
      }
      function clearDirty() {
        dirty.clear();
        updateSavebar();
