<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lisa Console — Project Settings</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230e6272'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='19' font-weight='bold' fill='white' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg: #f4f7f7;
        --surface: #ffffff;
        --surface2: #ecf1f1;
        --ink: #162326;
        --muted: #5b6d72;
        --faint: #8ba0a5;
        --line: #dce4e5;
        --line-strong: #c3cfd1;
        --accent: #0e6272;
        --accent-ink: #ffffff;
        --accent-soft: #e1eef1;
        --good: #22773c;
        --good-soft: #e2f0e6;
        --warn: #93610a;
        --warn-soft: #f6ecd6;
        --crit: #b3372c;
        --crit-soft: #f8e5e2;
        --chip-bg: #eef3f3;
        --shadow:
          0 1px 2px rgba(22, 35, 38, 0.06), 0 4px 16px rgba(22, 35, 38, 0.05);
        --mono:
          ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --sans:
          system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1618;
          --surface: #151f22;
          --surface2: #1b282c;
          --ink: #e6edee;
          --muted: #94a7ab;
          --faint: #6c8085;
          --line: #243438;
          --line-strong: #35494e;
          --accent: #5cb9ca;
          --accent-ink: #06282e;
          --accent-soft: #10373f;
          --good: #63c184;
          --good-soft: #12301c;
          --warn: #d9a441;
          --warn-soft: #33270e;
          --crit: #e07862;
          --crit-soft: #3a1712;
          --chip-bg: #1d2b2f;
          --shadow:
            0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.25);
        }
      }
      :root[data-theme="light"] {
        --bg: #f4f7f7;
        --surface: #ffffff;
        --surface2: #ecf1f1;
        --ink: #162326;
        --muted: #5b6d72;
        --faint: #8ba0a5;
        --line: #dce4e5;
        --line-strong: #c3cfd1;
        --accent: #0e6272;
        --accent-ink: #ffffff;
        --accent-soft: #e1eef1;
        --good: #22773c;
        --good-soft: #e2f0e6;
        --warn: #93610a;
        --warn-soft: #f6ecd6;
        --crit: #b3372c;
        --crit-soft: #f8e5e2;
        --chip-bg: #eef3f3;
        --shadow:
          0 1px 2px rgba(22, 35, 38, 0.06), 0 4px 16px rgba(22, 35, 38, 0.05);
      }
      :root[data-theme="dark"] {
        --bg: #0e1618;
        --surface: #151f22;
        --surface2: #1b282c;
        --ink: #e6edee;
        --muted: #94a7ab;
        --faint: #6c8085;
        --line: #243438;
        --line-strong: #35494e;
        --accent: #5cb9ca;
        --accent-ink: #06282e;
        --accent-soft: #10373f;
        --good: #63c184;
        --good-soft: #12301c;
        --warn: #d9a441;
        --warn-soft: #33270e;
        --crit: #e07862;
        --crit-soft: #3a1712;
        --chip-bg: #1d2b2f;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.25);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.55;
        background: var(--bg);
        color: var(--ink);
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }
      ::placeholder {
        color: var(--faint);
      }

      .proto-strip {
        background: var(--accent);
        color: var(--accent-ink);
        text-align: center;
        font-size: 12px;
        letter-spacing: 0.02em;
        padding: 5px 12px;
      }
      .proto-strip strong {
        font-weight: 650;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        gap: 16px;
        height: 56px;
        padding: 0 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: -0.01em;
        font-size: 15px;
      }
      .brand-mark {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: var(--accent);
        color: var(--accent-ink);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 14px;
        font-family: var(--mono);
      }
      .brand .console-tag {
        color: var(--muted);
        font-weight: 450;
      }
      .project-switch {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 5px 10px;
        background: var(--surface2);
        cursor: pointer;
        font-size: 13px;
      }
      .project-switch .repo {
        font-family: var(--mono);
        font-size: 12.5px;
      }
      .project-switch .caret {
        color: var(--faint);
        font-size: 10px;
      }
      .topbar .spacer {
        flex: 1;
      }
      .search-wrap {
        position: relative;
      }
      .search-wrap input {
        width: 260px;
        padding: 7px 12px 7px 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        outline: none;
      }
      .search-wrap input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .search-wrap .icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--faint);
        font-size: 13px;
      }
      .icon-btn {
        border: 1px solid var(--line);
        background: var(--surface2);
        border-radius: 8px;
        width: 34px;
        height: 34px;
        cursor: pointer;
        display: grid;
        place-items: center;
        font-size: 15px;
      }
      .icon-btn:hover {
        border-color: var(--line-strong);
      }
      .version-chip {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 99px;
        padding: 3px 10px;
      }
      .health-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--surface2);
        cursor: pointer;
      }
      .health-link:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: none;
        background: var(--muted);
      }
      .dot.ok {
        background: var(--good);
      }
      .dot.warn {
        background: var(--warn);
      }
      .dot.fail {
        background: var(--crit);
      }
      .dot.unknown {
        background: var(--muted);
      }
      .badge.pass {
        background: var(--good-soft);
        color: var(--good);
      }
      .badge.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }
      .badge.fail {
        background: var(--crit-soft);
        color: var(--crit);
      }
      .status-why {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        max-width: 26ch;
      }
      .live-status-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 42px;
        padding: 7px 20px;
        background: var(--surface2);
        border-bottom: 1px solid var(--line);
      }
      .live-status-panel h2 {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .live-status-list {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .live-status-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-radius: 99px;
        background: var(--surface);
        font-family: var(--mono);
        font-size: 11px;
      }
      .plugins-state {
        padding: 18px 20px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: var(--surface2);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .plugins-state.unknown {
        border-style: solid;
        border-color: var(--warn, #c9872a);
      }
      .plugins-state.unknown b {
        display: block;
        color: var(--text);
        margin-bottom: 4px;
      }
      .plugins-live-block .plugin-status-badge.available {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .live-status-item .status-why {
        display: inline;
        margin: 0;
        max-width: 48ch;
        overflow-wrap: anywhere;
      }

      .check-item {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 13px 18px;
        border-bottom: 1px solid var(--line);
      }
      .check-item:last-child {
        border-bottom: 0;
      }
      .ck {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--line-strong);
        background: none;
        color: transparent;
        cursor: pointer;
        flex: none;
        margin-top: 1px;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 12px;
        line-height: 1;
      }
      .ck::after {
        content: "✓";
      }
      .ck:hover {
        border-color: var(--good);
      }
      .check-item.done .ck {
        background: var(--good);
        border-color: var(--good);
        color: #fff;
      }
      .ck:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }
      .ck:disabled:hover {
        border-color: var(--line-strong);
      }
      .check-content {
        flex: 1;
        min-width: 0;
      }
      .check-label {
        font-weight: 550;
        font-size: 13.5px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .check-content .desc {
        color: var(--muted);
        font-size: 12.5px;
        margin: 2px 0 5px;
        max-width: 62ch;
      }
      .check-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 3px;
        flex: none;
      }

      .app {
        display: grid;
        grid-template-columns: 250px 1fr;
        min-height: calc(100vh - 90px);
      }
      .sidebar {
        border-right: 1px solid var(--line);
        padding: 18px 12px 120px;
        background: var(--surface);
        position: sticky;
        top: 56px;
        height: calc(100vh - 56px);
        overflow-y: auto;
      }
      .nav-group {
        margin-bottom: 18px;
      }
      .nav-eyebrow {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--faint);
        font-weight: 650;
        padding: 0 10px 6px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        text-align: left;
        padding: 7px 10px;
        border: 0;
        background: none;
        border-radius: 7px;
        cursor: pointer;
        color: var(--ink);
        font-size: 13.5px;
      }
      .nav-item:hover {
        background: var(--surface2);
      }
      .nav-item.active {
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 600;
      }
      .nav-item .count {
        font-size: 11px;
        color: var(--faint);
        font-family: var(--mono);
      }
      .nav-item.active .count {
        color: var(--accent);
      }

      .main {
        padding: 28px 36px 160px;
        min-width: 0;
      }
      .section {
        max-width: 880px;
        display: none;
      }
      .section.visible {
        display: block;
      }
      .section-head {
        margin-bottom: 20px;
      }
      .section-head h1 {
        margin: 0 0 6px;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: -0.015em;
        text-wrap: balance;
      }
      .section-head p {
        margin: 0;
        color: var(--muted);
        max-width: 68ch;
      }
      .src-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        background: var(--chip-bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 8px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: var(--shadow);
        margin-bottom: 18px;
        overflow: hidden;
      }
      .card-head {
        padding: 13px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
      }
      .card-head h2 {
        margin: 0;
        font-size: 14.5px;
        font-weight: 650;
      }
      .card-head .note {
        color: var(--muted);
        font-size: 12.5px;
      }
      .card-body {
        padding: 4px 0;
      }
      .card-body.padded {
        padding: 16px 18px;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px 24px;
        align-items: center;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
      }
      .row:last-child {
        border-bottom: 0;
      }
      .row.modified {
        box-shadow: inset 3px 0 0 var(--accent);
      }
      .row .label {
        font-weight: 550;
        font-size: 13.5px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .row .desc {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 2px;
        max-width: 62ch;
      }
      .keychip {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--muted);
        background: var(--chip-bg);
        border-radius: 5px;
        padding: 1px 6px;
      }
      .row .control {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: flex-end;
      }

      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-radius: 99px;
        padding: 2px 8px;
      }
      .badge.required {
        background: var(--crit-soft);
        color: var(--crit);
      }
      .badge.local {
        background: var(--warn-soft);
        color: var(--warn);
      }
      .badge.default {
        background: var(--chip-bg);
        color: var(--muted);
      }
      .badge.on {
        background: var(--good-soft);
        color: var(--good);
      }
      .badge.off {
        background: var(--chip-bg);
        color: var(--muted);
      }
      .badge.accent {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex: none;
        cursor: pointer;
      }
      .switch input {
        position: absolute;
        opacity: 0;
        inset: 0;
        margin: 0;
        cursor: pointer;
      }
      .switch .trk {
        position: absolute;
        inset: 0;
        border-radius: 99px;
        background: var(--line-strong);
        transition: background 0.15s;
      }
      .switch .trk::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        transition: transform 0.15s;
      }
      .switch input:checked + .trk {
        background: var(--accent);
      }
      .switch input:checked + .trk::after {
        transform: translateX(16px);
      }
      .switch input:focus-visible + .trk {
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      select.ctl,
      input.ctl {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface);
        padding: 6px 10px;
        min-width: 120px;
        outline: none;
        font-size: 13px;
      }
      select.ctl:focus,
      input.ctl:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      input.ctl.num {
        width: 86px;
        min-width: 0;
        text-align: right;
        font-family: var(--mono);
        font-variant-numeric: tabular-nums;
      }
      input.ctl.mono,
      select.ctl.mono {
        font-family: var(--mono);
        font-size: 12.5px;
      }
      input.ctl.wide {
        width: 260px;
      }
      .unit {
        color: var(--faint);
        font-size: 12px;
      }

      .tagbox {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
        max-width: 340px;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: var(--mono);
        font-size: 11.5px;
        background: var(--chip-bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 7px;
      }
      .tag button {
        border: 0;
        background: none;
        color: var(--faint);
        cursor: pointer;
        padding: 0;
        font-size: 12px;
        line-height: 1;
      }
      .tag button:hover {
        color: var(--crit);
      }
      .tag-add {
        border: 1px dashed var(--line-strong);
        background: none;
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 11.5px;
        color: var(--muted);
        cursor: pointer;
      }
      .tag-add:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .action-btn {
        border: 1px solid var(--accent);
        color: var(--accent);
        background: none;
        border-radius: 7px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .action-btn:hover {
        background: var(--accent-soft);
      }
      .action-btn:disabled {
        border-color: var(--line-strong);
        color: var(--muted);
        background: var(--surface2);
        cursor: not-allowed;
      }
      .readonly-reason {
        display: block;
        margin-top: 6px;
        max-width: 28ch;
      }

      .envmap {
        display: grid;
        grid-template-columns: repeat(3, auto);
        gap: 8px;
      }
      .envmap .cell {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .envmap .cell span {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--faint);
        font-weight: 600;
      }
      .envmap input {
        width: 110px;
      }

      .tabs {
        display: flex;
        gap: 4px;
        padding: 10px 18px 0;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      .tab {
        border: 0;
        background: none;
        cursor: pointer;
        padding: 8px 14px 10px;
        font-size: 13.5px;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab:hover {
        color: var(--ink);
      }
      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        font-weight: 600;
      }
      .tab .mini {
        font-size: 10px;
        margin-left: 6px;
        vertical-align: 1px;
      }

      table.grid {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      table.grid th {
        text-align: left;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--faint);
        font-weight: 650;
        padding: 10px 18px 8px;
        border-bottom: 1px solid var(--line);
      }
      table.grid th.th-help {
        cursor: help;
        text-decoration: underline dotted;
        text-underline-offset: 3px;
      }
      table.grid td {
        padding: 9px 18px;
        border-bottom: 1px solid var(--line);
        vertical-align: middle;
      }
      table.grid tr:last-child td {
        border-bottom: 0;
      }
      table.grid td.mono,
      .mono {
        font-family: var(--mono);
        font-size: 12px;
      }
      .table-scroll {
        overflow-x: auto;
      }

      .stack-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 1100px) {
        .stack-grid {
          grid-template-columns: 1fr;
        }
      }
      .stacks-state {
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: var(--surface);
        padding: 16px 18px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .stacks-state.unknown {
        border-color: var(--warn, #c99a2e);
        border-style: solid;
      }
      .stacks-state.unknown b {
        color: var(--ink);
      }
      .stack-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        overflow: hidden;
      }
      .stack-card.on {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .stack-card .head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
      }
      .stack-card .glyph {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        flex: none;
        display: grid;
        place-items: center;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 12px;
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--line);
      }
      .stack-card.on .glyph {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: transparent;
      }
      .stack-card .head .t {
        flex: 1;
        min-width: 0;
      }
      .stack-card .head .t b {
        display: block;
        font-size: 13.5px;
      }
      .stack-card .head .t i {
        display: block;
        font-style: normal;
        color: var(--muted);
        font-size: 11.5px;
      }
      .stack-card .meta {
        padding: 0 14px 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .stack-card .detect {
        padding: 8px 14px;
        border-top: 1px dashed var(--line);
        color: var(--muted);
        font-size: 11.5px;
      }
      .stack-card .detect code {
        font-family: var(--mono);
        font-size: 10.5px;
        background: var(--chip-bg);
        border-radius: 4px;
        padding: 1px 4px;
      }
      details.stack-more {
        border-top: 1px solid var(--line);
      }
      details.stack-more summary {
        cursor: pointer;
        padding: 8px 14px;
        font-size: 12px;
        color: var(--accent);
        list-style: none;
      }
      details.stack-more summary::before {
        content: "▸ ";
      }
      details.stack-more[open] summary::before {
        content: "▾ ";
      }
      details.stack-more ul {
        margin: 0;
        padding: 0 14px 12px 28px;
        color: var(--muted);
        font-size: 12px;
      }
      details.stack-more li {
        margin-bottom: 3px;
      }

      .tile-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 18px;
      }
      @media (max-width: 1100px) {
        .tile-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .tile {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
        box-shadow: var(--shadow);
      }
      .tile .k {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--faint);
        font-weight: 650;
      }
      .tile .v {
        font-size: 19px;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
      }
      .tile .s {
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 2px;
      }
      .tile .v .dim {
        color: var(--faint);
        font-weight: 450;
        font-size: 14px;
      }

      .flow {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 14px 18px;
      }
      .flow .state {
        font-family: var(--mono);
        font-size: 11.5px;
        border: 1px solid var(--line);
        background: var(--chip-bg);
        border-radius: 99px;
        padding: 3px 10px;
      }
      .flow .state.terminal {
        border-color: var(--good);
        color: var(--good);
        background: var(--good-soft);
      }
      .flow .arr {
        color: var(--faint);
        font-size: 11px;
      }

      .colorchip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: var(--mono);
        font-size: 11.5px;
      }
      .colorchip .swatch {
        width: 12px;
        height: 12px;
        border-radius: 4px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        flex: none;
      }

      .callout {
        display: flex;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface2);
        font-size: 12.5px;
        color: var(--muted);
        margin-bottom: 18px;
      }
      .callout.warn {
        background: var(--warn-soft);
        border-color: transparent;
        color: var(--warn);
      }
      .callout b {
        color: inherit;
      }

      .savebar {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translate(-50%, 90px);
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--ink);
        color: var(--bg);
        border-radius: 12px;
        padding: 10px 12px 10px 18px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2),
          visibility 0.25s;
        visibility: hidden;
        z-index: 60;
      }
      .savebar.show {
        transform: translate(-50%, 0);
        visibility: visible;
      }
      .savebar .msg {
        font-size: 13px;
      }
      .savebar .msg b {
        font-variant-numeric: tabular-nums;
      }
      .savebar button {
        border: 0;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
      }
      .savebar .discard {
        background: transparent;
        color: var(--bg);
        opacity: 0.75;
      }
      .savebar .discard:hover {
        opacity: 1;
      }
      .savebar .save {
        background: var(--accent);
        color: var(--accent-ink);
      }
      .savebar .save:disabled {
        background: var(--surface2);
        color: var(--muted);
        cursor: not-allowed;
      }

      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translate(-50%, 20px);
        background: var(--good);
        color: #fff;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 550;
        opacity: 0;
        pointer-events: none;
        transition: all 0.25s;
        z-index: 70;
      }
      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .hooks-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 1100px) {
        .hooks-grid {
          grid-template-columns: 1fr;
        }
      }
      .hook-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
      }
      .hook-card .hd {
        padding: 11px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hook-card .hd .nm {
        font-family: var(--mono);
        font-size: 12.5px;
        font-weight: 650;
      }
      .hook-card .steps {
        padding: 6px 0;
      }
      .hook-step {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        font-size: 12.5px;
      }
      .hook-step .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--good);
        flex: none;
      }
      .hook-step.optional .dot {
        background: var(--faint);
      }
      .hook-step .what {
        flex: 1;
      }
      .hook-step .how {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--faint);
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: static;
          height: auto;
          display: flex;
          flex-wrap: wrap;
          gap: 4px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .nav-group {
          margin: 0 12px 6px 0;
        }
        .search-wrap input {
          width: 140px;
        }
        .main {
          padding: 20px 16px 160px;
        }
        .row {
          grid-template-columns: 1fr;
        }
        .row .control {
          justify-content: flex-start;
        }
        .envmap {
          grid-template-columns: 1fr;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="proto-strip">
      <strong>Prototype</strong> — every setting below is editable in the UI,
      but nothing is persisted yet. Values shown reflect Lisa's real defaults.
    </div>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">L</span> Lisa
        <span class="console-tag">Console</span>
      </div>
      <button
        class="project-switch"
        type="button"
        title="Project switcher (prototype)"
      >
        <span class="repo">acme/acme-app</span> <span class="caret">▼</span>
      </button>
      <div class="spacer"></div>
      <div class="search-wrap">
        <span class="icon">⌕</span>
        <input
          id="search"
          type="search"
          placeholder="Filter settings in this section…"
          aria-label="Filter settings"
        />
      </div>
      <button
        class="version-chip health-link"
        id="healthChip"
        type="button"
        title="Lisa health — click for details"
      >
        <span class="dot" aria-hidden="true"></span> @codyswann/lisa · checking…
      </button>
      <button
        class="icon-btn"
        id="themeToggle"
        type="button"
        title="Toggle theme"
        aria-label="Toggle theme"
      >
        ◐
      </button>
    </header>
    <section
      class="live-status-panel"
      aria-labelledby="liveStatusHeading"
      aria-live="polite"
      aria-atomic="true"
      role="status"
    >
      <h2 id="liveStatusHeading">Live status</h2>
      <div class="live-status-list" id="liveStatusList" role="list">
        <span class="live-status-item" role="listitem">Loading…</span>
      </div>
    </section>
    <div class="app">
      <nav class="sidebar" id="nav" aria-label="Settings sections"></nav>
      <main class="main" id="main"></main>
    </div>
    <div class="savebar" id="savebar" role="status">
      <span class="msg"
        ><b id="dirtyCount">0</b> unsaved change<span id="dirtyPlural"
          >s</span
        ></span
      >
      <button class="discard" id="discardBtn" type="button">Discard</button>
      <button
        class="save"
        id="saveBtn"
        type="button"
        disabled
        title="read-only: the write-path has not shipped yet"
        aria-describedby="saveReadonlyReason"
      >
        Save changes
      </button>
      <span class="status-why readonly-reason" id="saveReadonlyReason">
        read-only: the write-path has not shipped yet
      </span>
    </div>
    <div class="toast" id="toast"></div>
    <script>
      "use strict";
      document.title = "Lisa Console — Project Settings";

      /* ------------------------------------------------------------------ *
       * Catalog data. Shapes:
       *  section: { id, group, title, desc, src, blocks: [block] }
       *  block:   { card, note?, rows } | { type: 'tabs'|'table'|'tiles'|'stacks'|'flow'|'hooks'|'callout', ... }
       *  row:     { key, label, desc, badges?, control }
       *  control: { type: 'toggle'|'select'|'text'|'number'|'tags'|'envmap'|'static', ... }
       * ------------------------------------------------------------------ */

      const sel = (value, options) => ({ type: "select", value, options });
      const tog = value => ({ type: "toggle", value });
      const txt = (value, opts) =>
        Object.assign({ type: "text", value }, opts || {});
      const num = (value, unit) => ({ type: "number", value, unit });
      const tags = values => ({ type: "tags", values });
      const envmap = (dev, staging, production) => ({
        type: "envmap",
        dev,
        staging,
        production,
      });
      const stat = (value, cls) => ({ type: "static", value, cls });

      const SEVERITIES = ["error", "warn", "off"];

      const DATA = {
        groups: [
          {
            label: "Project",
            sections: [
              "overview",
              "setup",
              "health",
              "general",
              "stacks",
              "starters",
              "agents",
              "remote",
            ],
          },
          {
            label: "Delivery",
            sections: [
              "workflow",
              "tracker",
              "prd",
              "deploy",
              "pipelines",
              "automations",
              "monitor",
            ],
          },
          {
            label: "Quality",
            sections: ["linting", "testing", "hooks", "ci", "qa"],
          },
          { label: "Distribution", sections: ["repository", "plugins"] },
          { label: "Advanced", sections: ["advanced"] },
        ],
        sections: {},
      };

      /* ---------------------------------- Overview ---------------------------------- */
      DATA.sections.overview = {
        title: "Overview",
        desc: "Lisa runs this project as a set of software factories — agent-operated production lines that build, verify, and ship with as few humans as possible. Everything below is what the factories are governed by.",
        src: ".lisa.config.json · .lisa.config.local.json",
        blocks: [
          {
            type: "flow",
            title:
              "The four factories — humans hand off at the gates, never inside",
            states: [
              { name: "Research → PRDs" },
              { name: "⛩ gate" },
              { name: "Plan → work units" },
              { name: "⛩ gate" },
              { name: "Implement → software" },
              { name: "⛩ gate" },
              { name: "Verify → go/no-go", terminal: true },
            ],
          },
          {
            type: "callout",
            text: "<b>The gates are adversarial.</b> Agents, humans, and automations submit inputs; an intake agent admits only work that is unambiguous and that the factory has provable tooling access to execute — everything else is rejected and raised. Three loops feed the pipeline on schedule: <b>QA</b> (exploratory bugs), <b>Product Planning</b> (ideated PRDs), and <b>Monitoring</b> (observability regressions). Verify failures flow straight back into Implement as build-ready tickets. The goal: <b>non-technical people creating scalable software</b> — everything that crosses a gate is written for them, and end users never talk to a coding agent.",
          },
          {
            type: "tiles",
            tiles: [
              { k: "Project types", v: "2", s: "typescript · expo" },
              { k: "Work tracker", v: "JIRA", s: "project ACME" },
              { k: "PRD source", v: "Notion", s: "PRD queue database" },
              { k: "Harness", v: "fleet", s: "all 6 coding agents" },
              { k: "Plugins enabled", v: "11", s: "4 Lisa + 7 curated" },
              {
                k: "Coverage floor",
                v: "70%",
                s: "statements · branches · functions · lines",
              },
              {
                k: "Required CI checks",
                v: "9",
                s: "incl. CodeRabbit + GitGuardian",
              },
              {
                k: "Automations",
                v: "6",
                s: "intake, repair, loops — all healthy",
              },
            ],
          },
          {
            type: "flow",
            title:
              "Build lifecycle (fixed — only the status names are configurable)",
            states: [
              { name: "ready" },
              { name: "claimed" },
              { name: "review?", opt: true },
              { name: "done", terminal: true },
            ],
          },
          {
            type: "flow",
            title: "PRD lifecycle (fixed)",
            states: [
              { name: "draft" },
              { name: "ready" },
              { name: "in_review" },
              { name: "blocked | ticketed" },
              { name: "shipped" },
              { name: "verified", terminal: true },
            ],
          },
          {
            card: "How configuration resolves",
            rows: [
              {
                key: "",
                label: "Resolution order",
                desc: "Skill arguments always win, then the per-developer local file, then the committed file, then Lisa’s built-in default.",
                control: stat(
                  "$ARGUMENTS → .lisa.config.local.json → .lisa.config.json → default",
                  "mono"
                ),
              },
              {
                key: "",
                label: "Secrets",
                desc: "Tokens never live in config — only IDs, keys and slugs. Secrets stay in env vars or the OS keychain.",
                control: stat(
                  "ATLASSIAN_API_TOKEN · NOTION_API_TOKEN · LINEAR_API_KEY · GH_TOKEN",
                  "mono"
                ),
              },
            ],
          },
        ],
      };

      /* ---------------------------------- General ---------------------------------- */
      /* ---------------------------------- Health ---------------------------------- */
      /* ---------------------------------- Setup checklist ---------------------------------- */
      DATA.sections.setup = {
        title: "Setup checklist",
        desc: "Everything a host project needs to be fully governed, in the order it usually happens. Each step is idempotent — re-running it is always safe.",
        src: "lisa apply · lisa sync · /lisa:setup:* skills",
        blocks: [
          {
            type: "checklist",
            card: "Required",
            items: [
              {
                label: "Install Lisa and apply templates",
                desc: "Detects the project’s stacks, applies their templates, installs plugins and git hooks.",
                command: "bun add -d @codyswann/lisa && bunx lisa",

                label: "Populate configuration",

              {

                command: ".lisa.config.json exploration.*",

          },

            type: "checklist",
            card: "Optional",
            items: [
              {
                label: "Install the LLM wiki",
                desc: "In-repo knowledge base agents read and maintain.",
                command: "/lisa:wiki:install",
                done: false,
                optional: true,
              },
              {
                label: "Record starter provenance",
                desc: "Which starter repo(s) this project descends from, enabling starter sync (planned).",
                command: ".lisa.config.json starter.*",

                optional: true,

            ],
          },
          {
            type: "callout",
            text: "The Health section’s in-band scan re-verifies most of these continuously once setup is complete; lisa doctor diagnoses any step that went sideways.",
          },
        ],
      };

      /* ---------------------------------- Core workflow ---------------------------------- */
      // Shared header for the command tables: "Automation" is Lisa jargon, so
      // the column carries a hover tooltip defining it.
      const AUTOMATION_COL = {
        v: "Automation",
        tip: "The scheduled automation (created by /lisa:setup-automations) that already runs this command on a cadence. — means manual-only; “via intake” / “via implement” means it runs inside that command’s cycle. Invoke the command yourself to force a cycle now.",
      };
      DATA.sections.workflow = {
        title: "Core workflow",
        desc: "The slash commands that run the delivery loop — what each one does, when to reach for it yourself, and which scheduled automation already runs it for you.",
        src: "plugins/src/base/commands/lisa/ · plugins/src/base/skills/",
        blocks: [
          {
            type: "flow",
            title: "The delivery loop these commands drive",
            states: [
              { name: "PRD ready" },
              { name: "intake → plan" },
              { name: "tickets ready" },
              { name: "intake → implement" },
              { name: "PR merged + deployed" },
              { name: "verify-prd" },
              { name: "verified", terminal: true },
            ],
          },
          {
            type: "table",
            card: "Delivery loop",
            note: "Commands marked with an automation run on a schedule — invoke them manually to force a cycle",
            cols: ["Command", "What it does", "When to use it", AUTOMATION_COL],
            rows: [
              [
                { t: "mono", v: "/lisa:intake" },
                {
                  t: "text",
                  v: "Scans the ready queues and processes one eligible item: a ready PRD is validated and ticketed; a ready ticket is built end-to-end; shipped PRDs roll forward to verification",
                },
                {
                  t: "text",
                  v: "Rarely by hand — the crons run it; invoke to force an immediate cycle",
                },
                { t: "mono", v: "intake-prd · intake-tickets" },
              ],
              [
                { t: "mono", v: "/lisa:repair-intake" },
                {
                  t: "text",
                  v: "Finds stuck or half-closed work — stalled builds, missed transitions, unreconciled rollups — and repairs each one",
                },
                {
                  t: "text",
                  v: "When something looks wedged; the hourly cron usually gets there first",
                },
                { t: "mono", v: "intake-repair" },
              ],
              [
                { t: "mono", v: "/lisa:plan" },
                {
                  t: "text",
                  v: "Turns a PRD or epic into a reviewed implementation plan and build-ready tickets",
                },
                {
                  t: "text",
                  v: "Plan one specific PRD now instead of waiting for intake",
                },
                { t: "mono", v: "via intake" },
              ],
              [
                { t: "mono", v: "/lisa:implement" },
                {
                  t: "text",
                  v: "Builds one ticket end-to-end: TDD implementation, parallel reviews, empirical verification, PR driven to merge",
                },
                { t: "text", v: "Build one specific ticket now" },
                { t: "mono", v: "via intake" },
              ],
              [
                { t: "mono", v: "/lisa:verify" },

      /* Live enabled-plugins state, hydrated from GET /api/status. Starts as
         "loading" so the Plugins section never presents demo toggles as truth. */
      let pluginsLive = {
        status: "loading",
        settingsPresent: false,
        plugins: [],
      };
      /* Live detected-stacks state, hydrated from GET /api/status. Starts as
         "detecting" so the Stacks section never presents the metadata catalog
         as if it were the detection result. */
      let stackDetection = { status: "detecting", ids: [] };
      /* Version context and Health v1 verdict are painted together. Health
         takes priority once measured without erasing the update context. */
      let lisaVersionChipState = {
        dotClass: "",

      };
