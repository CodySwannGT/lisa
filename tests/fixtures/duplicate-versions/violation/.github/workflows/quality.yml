# Fixture: the violating shape. Both the install pin and the toolchain pin copy
# a literal the canonical manifest already owns, so a manifest bump silently
# leaves this workflow behind.
name: Quality

on: [pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'
      - name: Install ast-grep
        run: npm install -g @ast-grep/cli@0.40.4
      - name: Unmanaged tools are not manifest drift
        run: npm install -g some-unmanaged-tool@9.9.9
      # A commented-out pin is prose, not an active policy pin:
      #   run: npm install -g @ast-grep/cli@0.40.4
